body:
  text: 欽定四庫全書經部八四書通㫖目録四書類巻一天天地命性仁義禮智信仁義禮智仁義仁知禮義知仁禮知仁勇卷二徳道徳中中和中庸敬附恭附戒懼慎獨一誠心身志附志氣意思情附性情恥樂好惡剛勇道孝弟又見人倫忠恕恕忠信聖卷三氣氣質才類附才鬼神徳附禮樂樂禮制權人人品道統堯舜禹湯文武周公孔子孔門弟子子思孟子古今人物大人君子士善人狂狷鄉原君子小人卷四教學知行師道諸經義利附利祭祀喪祭附葬文質文言行言辭過節操名聞異端卷五人倫父子又見孝弟類君臣君位君道又見治道王道臣道附賓師朋友名分世俗知人用人交際義命富貴貧賤困窮患難辭受取予卷六出處去就治道又見君道王道臣等謹按四書通㫖六卷元朱公遷撰公遷即作詩傳疏義者是編之例取四書之文條分縷析以類相從凡為九十八門每門之中又以語意相近者聨綴列之而一一辨别異同各以右明某義云云標立言之宗㫖盖昔程子嘗以此法教學者而公遷推廣其意以成是書其間門目既多間涉冗碎故朱彛尊經義考謂讀者微嫌其緐又如樊遲請學稼不過局於末業乃列之於異端門與許行同譏上士一位中士一位下士一位本周室班爵之制乃列之於士門與處士一例亦頗傷踳駁堯舜禹湯文武周公孔子孔門弟子子思孟子諸門以人𨽻事體近類書尤為無所發明然於天人性命之微道徳學問之要多能剖其疑似詳其次序使讀者因此證彼渙然冰釋於學者不為無助要非融㑹貫通不能言之成理如是也所引諸家之説獨稱饒魯為饒子其淵源盖有自矣明正統中何英作詩傳疏義序稱永樂乙酉因閲四書通㫖而語及疏義則是書行世在疏義之前顧明以来説四書者罕見徵引近通志堂經解始刋行之盖乆微而復出也句下間别異同如喜怒哀樂一條謂右以體言而註亦曰以性言允執其中一條謂右以用言而註亦曰以事理言如是者不一疑刋是書者參校諸本所附非公遷之舊其出自誰手則不可考矣乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
