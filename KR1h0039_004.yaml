body:
  text: 欽定四庫全書四書通㫖卷四元朱公遷撰教脩道之謂教中庸一章治國必先齊其家者其家不可教而能教人者無之故君子不出家而成教於國孝者所以事君也弟者所以事長也慈者所以使衆也大學傳九章設為庠序學校以教之庠者養也校者教也序者射也夏曰校殷曰序周曰庠學則三代共之皆所以明人倫也人之有道也飽食煖衣逸居而無教則近於禽獸聖人有憂之使契為司徒教以人倫父子有親君臣有義夫婦有别長㓜有序朋友有信並滕文公上右自立教之本而言之已上皆主君道而言愚謂脩道謂教兼以政言教以人倫專以教言脩道者教之綱也五品者教之目也孟子專言教之之道大學主言感化之機又見治道類有教無類衛靈公自行束脩以上吾未甞無誨焉述而吾有知乎哉無知也有鄙夫問於我空空如也我叩其兩端而竭焉子罕互鄊難與言童子見門人惑子曰與其進也不與其退也唯何甚人潔已以進與其潔也不保其徃也述而孟子之滕館於上宫有業屨於牖上館人求之弗得或問之曰若是乎從者之廖也曰子以是為竊屨來與曰殆非也夫子之設科也徃者不追來者不拒茍以是心至斯受之而已矣盡心下右自設教之心而言之已下皆主師道而言子以四教文行忠信述而夫子循循然善誘人博我以文約我以禮子罕中人以上可以語上也中人以下不可以語上也雍也不憤不啟不悱不發舉一隅不以三隅反則不復也述而道則高矣美矣宜若登天然似不可及也何不使彼為可㡬及而日孳孳也孟子曰大匠不為拙工改廢繩墨羿不為拙射變其彀率君子引而不發躍如也中道而立能者從之君子之所以教者五有如時雨化之者有成徳者有達財者有答問者有私淑艾者此五者君子之所以教也並盡心上教亦多術矣予不屑之教誨也者是亦教誨之而已矣告子下右自施教之道而言之愚謂文行忠信博文約禮是其教人之具也繩墨彀率即此而在矣至其所以教人之法則抑揚進退千變萬化而皆有以造就之所謂曲成萬物而不遺也羿之教人射必志於彀學者亦必志於彀大匠誨人必以規矩學者亦必以規矩告子上梓匠輪輿能與人規矩不能使人巧盡心下右兼為施教受教者言之愚案一章主言下學之法一章主言心得之妙二三子以我為隠乎吾無隠乎爾吾無行而不與二三子者是丘也述而予欲無言子貢曰子如不言則小子何述焉子曰天何言哉四時行焉百物生焉天何言哉陽貨右即其行事而示之已下皆施教之道饒子曰無隠乎爾是就行處無非至理别無深晦㡳道理予欲無言是說行處都是實理不必於吾言語上求愚謂無言之故即無隠之費子貢之問有益哉季路問事鬼神子曰未能事人焉能事鬼敢問死曰未知生焉知死先進陳亢問於伯魚曰子亦有異聞乎對曰未也甞獨立鯉趨而過庭曰學詩乎對曰未也不學詩無以言鯉退而學詩他日又獨立鯉趨而過庭曰學禮乎對曰未也不學禮無以立鯉退而學禮聞斯二者陳亢退而喜曰問一得三聞詩聞禮又聞君子之逺其子也季氏右循其序而進之愚謂此所謂教不躐等者興詩立禮之序即此而可見性與天道不可聞者又因此而可知子路問成人子曰若臧武仲之知公綽之不欲卞莊子之勇冉求之藝文之以禮樂亦可以為成人矣曰今之成人者何必然見利思義見危授命久要不忘平生之言亦可以為成人矣憲問子貢問曰何如斯可謂之士矣子曰行己有恥使於四方不辱君命可謂士矣曰敢問其次曰宗族稱孝焉郷黨稱弟焉曰敢問其次曰言必信行必果硜硜然小人哉抑亦可以為次矣子路右因其材而篤之愚謂即其施教而言則中人以上可以語上正此類要其成功而言則十子之列四科又可騐也孟懿子問孝子曰無違樊遲御子告之曰孟孫問孝於我我對曰無違樊遲曰何謂也子曰生事之以禮死葬之以禮祭之以禮孟武伯問孝子曰父母惟其疾之憂子游問孝子曰今之孝者是謂能養至於犬馬皆能有養不敬何以别乎子夏問孝子曰色難有事弟子服其勞有酒食先生饌曽是以為孝乎並為政女為君子儒無為小人儒雍也子夏為莒父宰問政子曰無欲速無見小利欲速則不達見小利則大事不成子路由誨女知之乎知之為知之不知為不知是知也為政子行三軍則誰與子曰暴虎馮河死而無悔者吾不與也必也臨事而懼好謀而成者也述而子路問聞斯行諸子曰有父兄在如之何其聞斯行之冉有問聞斯行諸子曰聞斯行之公西華曰由也問聞斯行諸子曰有父兄在求也問聞斯行諸子曰聞斯行之赤也惑敢問子曰求也退故進之由也兼人故退之先進子路問政子曰先之勞之請益曰無倦何如斯可謂之士矣子曰切切偲偲怡怡如也可謂士矣朋友切切偲偲兄弟怡怡並子路子路問事君子曰勿欺也而犯之憲問由也女聞六言六蔽矣乎對曰未也居吾語女好仁不好學其蔽也愚好知不好學其蔽也蕩好信不好學其蔽也賊好直不好學其蔽也絞好勇不好學其蔽也亂好剛不好學其蔽也狂君子尚勇乎子曰君子義以為上君子有勇而無義為亂小人有勇而無義為盗並陽貨子路問强子曰南方之强與北方之强與抑而强與寬柔以教不報無道南方之强也君子居之衽金革死而不厭北方之强也而强者居之故君子和而不流强哉矯中立而不倚强哉矯國有道不變塞焉强哉矯國無道至死不變强哉矯中庸十章子貢問君子子曰先行其言而後從之為政如有博施於民而能濟衆何如可謂仁乎子曰何事於仁必也聖乎堯舜其猶病諸夫仁者己欲立而立人己欲達而達人能近取譬可謂仁之方也已雍也工欲善其事必先利其器居是邦也事其大夫之賢者友其士之仁者衛靈公子張學干禄子曰多聞闕疑慎言其餘則寡尤多見闕殆慎行其餘則寡悔言寡尤行寡悔禄在其中矣為政子張問明子曰浸潤之譖膚受之愬不行焉可謂明也已矣浸潤之譖膚受之愬不行焉可謂逺也已矣子張問崇徳辨惑子曰主忠信徙義崇徳也愛之欲其生惡之欲其死既欲其生又欲其死是惑也子張問士何如斯可謂之達矣子曰何哉爾所謂達者子張對曰在邦必聞在家必聞子曰是聞也非達也夫達也者質直而好義察言而觀色慮以下人在邦必達在家必達夫聞也者色取仁而行違居之不疑在邦必聞在家必聞子張問政子曰居之無倦行之以忠並顔淵子張問行子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉立則見其参於前也在輿則見其倚於衡也夫然後行衛靈公子張問仁於孔子孔子曰能行五者於天下為仁矣請問之曰恭寬信敏恵恭則不侮寬則得衆信則人任焉敏則有功恵則足以使人陽貨樊遲問知子曰務民之義敬鬼神而逺之可謂知矣問仁曰仁者先難而後獲可謂仁矣雍也樊遲從遊於舞雩之下曰敢問崇徳脩慝辨惑子曰善哉問先事後得非崇徳與攻其惡無攻人之惡非脩慝與一朝之忿忘其身以及其親非惑與司馬牛問仁子曰仁者其言也訒曰其言也訒斯謂之仁矣乎子曰為之難言之得無訒乎司馬牛問君子子曰君子不憂不懼曰不憂不懼斯謂之君子矣乎子曰内省不疚夫何憂何懼並顔淵仲尼亟稱於水曰水哉水哉何取於水也孟子曰原泉混混不舍晝夜盈科而後進放乎四海有本者如是是之取爾苟為無本七八月之間雨集溝澮皆盈其涸也可立而待也故聲聞過情君子恥之離婁下徐行後長者謂之弟疾行先長者謂之不弟夫徐行者豈人所不能哉所不為也堯舜之道孝弟而已矣告子下右因其失而救之孺悲欲見孔子孔子辭以疾將命者出戸取瑟而歌使之聞之陽貨滕更之在門也若在所禮而不答何也孟子曰挾貴而問挾賢而問挾長而問挾有勲勞而問挾故而問皆所不答也滕更有二焉盡心上右因其過失而儆教之愚謂孟子之待曹交是即所以待滕更之意然於交則欲矯其麤陋之習於更則欲消其長傲之心蓋教之多術也如此闕黨童子將命或問之曰益者與子曰吾見其居於位也見其與先生並行也非求益者也欲速成者也憲問子夏之門人小子當洒掃應對進退則可矣抑末也本之則無如之何子夏聞之曰噫言游過矣君子之道孰先傳焉孰後倦焉譬諸草木區以别矣君子之道焉可誣也有始有卒者其惟聖人乎子張右教小子之道愚案子夏之言是緫教以小子之事孔子之言是因其失而教以隅坐隨行之禮也又二章皆是學必有序教不躐等之意然本末一貫者也游夏分為兩段事則二子之言皆有病故集注引程子之說以助之學學問之道無他求其放心而已矣告子上右為學之本愚案學問二字蓋兼知行而言之然此章則以求放心為本若大學三綱領之中則以明明徳為本論語首章言學集註又發其藴而以明善復初為之本但求放心是先立其本學必由此而後進也明徳明善復其初是務此以為本學必至此而後成也志於道據於徳依於仁游於藝述而右為學之序自其用功而言也愚案此章専以行言觀集注釋志字之義可見其為致知以後事興於詩立於禮成於樂㤗伯右為學之序自其成功而言也愚案此章兼知行言興於詩是知之功立禮成樂是行之功況知之而後能之三者皆有知行兼備之意也愚案此二章是學者為學之序若十五志學一章是聖人自言所得之序又志學至不踰矩是聖人希天徹首徹尾是聖人善信至聖神是希賢希聖至於希天自首至尾是學者至於聖人又十五志學與可與共學一章其等第亦不同志學則適道在其中不惑則理明義精可與權矣不踰矩則聲為律身為度權有不必言者矣由也女聞六言六蔽矣乎對曰未也居吾語女好仁不好學其蔽也愚好知不好學其蔽也蕩好信不好學其蔽也賊好直不好學其蔽也絞好勇不好學其蔽也亂好剛不好學其蔽也狂陽貨博學而篤志切問而近思仁在其中矣仕而優則學學而優則仕並子張博學而詳說之將以反說約也離婁下右以知言愚案仕與學對則仕屬乎行六蔽與六言相對則六言屬乎行博學詳說承深造以道而言則深造之者重在行也仁在其中雖未及乎行而篤志二字亦篤行之漸也此聖賢之言所以無敝也君子不重則不威學則不固主忠信無友不如己者過則勿憚改君子食無求飽居無求安敏於事而慎於言就有道而正焉可謂好學也已並學而右以行言亦曰以行言而知在其中愚謂前章言進徳之事後章言篤志力行之事是皆主於行而言但致知力行皆為學而學問思辨亦為事故學則不固是統言之敏於事亦是兼言之其所包者亦廣矣又案此二章是汎為學者言之若吾甞終日不食一章是專為思而不學者言之惟其有為而言故其語勢抑揚又如彼也賢賢易色事父母能竭其力事君能致其身與朋友交言而有信雖曰未學吾必謂之學矣學而士見危致命見得思義祭思敬喪思哀其可已矣子張右緫論為學而専以行言饒子曰子夏是揀許多大底說子張是揀許多難底說愚案子夏之言有敝先儒論之已詳子張言其可已矣而朱子以庶乎其可少抑之微意亦可見也學而時習之不亦說乎學而學如不及猶恐失之泰伯百工居肆以成其事君子學以致其道日知其所亡月無忘其所能可謂好學也已矣並子張君子深造之以道欲其自得之也自得之則居之安居之安則資之深資之深則取之左右逢其原故君子欲其自得之也離婁下右兼知行言學而不思則罔思而不學則殆為政博學於文約之以禮亦可以弗畔矣夫雍也如切如磋者道學也如琢如磨者自脩也大學傳三章好學近乎知力行近乎仁誠之者擇善而固執之者也博學之審問之慎思之明辨之篤行之有弗學學之弗能弗措也有弗問問之弗知弗措也有弗思思之弗得弗措也有弗辨辨之弗明弗措也有弗行行之弗篤弗措也人一能之已百之人十能之已千之果能此道矣雖愚必明雖柔必强中庸二十章君子尊徳性而道問學致廣大而盡精微極高明而道中庸温故而知新敦厚以崇禮中庸二十七章右以知行對言専以功夫言之也愚謂學以會其理則學字屬乎知學以習其事則學字屬乎行惟觀其對待之語何如耳又案致知力行與存心致知其先後次序不同必也明此理而後能盡此理此致知所以居力行之先也必使一念全而萬理具然後可使念慮精而萬理明此存心所以居致知之先也蓋存心是全此理之統體致知是各隨其理而察之故與知行之序不同古之欲明明徳於天下者先治其國欲治其國者先齊其家欲齊其家者先脩其身欲脩其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物物格而后知至知至而后意誠意誠而后心正心正而后身脩身脩而后家齊家齊而后國治國治而后天下平大學經一章盡其心者知其性也知其性則知天矣存其心養其性所以事夭也殀夀不貳脩身以俟之所以立命也盡心上右以知行對言兼舉用功成功而言也愚案大學上一節反而推之是用功下一節順而達之是成功孟子盡心知性是成功存心養性是用功莫我知也夫憲問予一以貫之衛靈公十室之邑必有忠信如丘者焉不如丘之好學也公冶我非生而知之者好古敏以求之者也述而衛公孫朝問於子貢曰仲尼焉學子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫子焉不學而亦何常師之有子張右聖人希天之學屬乎智者也愚案孔子所自言者凡四章二章是勉人為學二章是𤼵子貢使知聖人之學若子貢之答公孫朝則遡孔子之所傳而明道統之有自也參乎吾道一以貫之曽子曰唯子出門人問曰何謂也曽子曰夫子之道忠恕而已矣里仁右聖人希天之學屬乎仁者也湯之盤銘曰苟日新日日新又日新大學傳二章穆穆文王於緝熈敬止大學傳三章仲尼祖述堯舜憲章文武上律天時下襲水土中庸三十章孔子之謂集大成集大成也者金聲而玉振之也金聲也者始條理也玉振之也者終條理也始條理者智之事也終條理者聖之事也萬章下吾十有五而志於學三十而立四十而不惑五十而知天命六十而耳順七十而從心所欲不踰矩為政𤼵憤忘食樂以忘憂不知老之將至云爾述而右聖人希天之學仁智兼備者也愚案成湯之日新又新文王之緝熈敬止孔子不知老之將至皆所謂無閒斷者但以氣象觀之成湯若出於有意文王孔子實本於自然性之反之有不同也又祖述憲章是上遡孔子之所傳金聲玉振是極言孔子之所藴志學至不踰矩是孔子自言其所得又以聖人之事参之好問察言明物察倫屬乎智仰而思之亦屬乎智執中用中由仁義行屬乎仁樂取諸人若決江河亦屬乎仁身之反之亦屬乎仁此皆希天之學而於仁智各有所屬也回也聞一以知十賜也聞一以知二子曰弗如也吾與女弗如也公冶右大賢希聖之學知之事也顔淵問仁子曰克己復禮為仁一日克己復禮天下歸仁焉為仁由己而由人乎哉顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰回雖不敏請事斯語矣顔淵哀公問弟子孰為好學孔子對曰有顔回者好學不遷怒不貳過不幸短命死矣今也則亡未聞好學者也雍也仲弓問仁子曰出門如見大賔使民如承大祭己所不欲勿施於人在邦無怨在家無怨仲弓曰雍雖不敏請事斯語矣顔淵吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎學而右大賢希聖之學行之事也愚案夫子告顔冉子外甞以恭敬忠信語樊遲忠信篤敬語子張是皆主於力行而言皆徹上徹下之道也顔淵喟然歎曰仰之彌高鑚之彌堅瞻之在前忽焉在後夫子循循然善誘人博我以文約我以禮欲罷不能既竭吾才如有所立卓爾雖欲從之末由也已子罕以能問於不能以多問於寡有若無實若虚犯而不校昔者吾友甞從事於斯矣㤗伯我知言我善養吾浩然之氣公孫丑上右大賢希聖之學知行兼備者也愚案克己復禮主敬行恕皆以用功言顔淵喟然之歎與曽子三省之云亦自以用功言顔子不遷怒貳過孟子知言善養氣皆以成功言若子貢之論已與顔子則兼才學而言之曽子之稱顔子則於學問之中畧兼徳行而言之也又見孔門弟子類大學之道在明明徳在親民在止於至善知止而后有定定而后能静静而后能安安而后能慮慮而后能得物有本末事有終始知所先後則近道矣古之欲明明徳於天下者先治其國欲治其國者先齊其家欲齊其家者先脩其身欲脩其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物物格而后知至知至而后意誠意誠而后心正心正而后身脩身脩而后家齊家齊而后國治國治而后天下平自天子以至於庶人壹是皆以脩身為本其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也大學經一章右大人之學愚謂知行兼備體用具全綱領條目功夫效驗莫不殫舉無如此章又案對小子之學而言則此為大人之學通其餘諸章而言則惟入孝出弟為小子之學餘則皆為大人之學也弟子入則孝出則弟謹而信汎愛衆而親仁行有餘力則以學文學而右小子之學愚案此章知行兼備而行為重也大抵大人之學先乎理小子之學先乎事此其次第所以有不同也人不知而不愠不患人之不已知患不知人也並學而不患無位患所以立不患莫已知求為可知也里仁患其不能也憲問君子病無能焉不病人之不已知也衛靈公三年學不至於榖不易得也㤗伯君子謀道不謀食耕也餒在其中矣學也禄在其中矣君子憂道不憂貧衛靈公右為己之學愚謂此皆自學者立心處言之或堅其心而使之不近名或定其心而使之不近利此其所以不同者中庸末章所引尚絅之詩亦宜與不患不知之類相從也吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎學而曽子有疾召門弟子曰啟予足啟予手詩云戰戰兢兢如臨深淵如履薄氷而今而後吾知免夫小子㤗伯君子有九思視思明聽思聰色思温貌思恭言思忠事思敬疑思問忿思難見得思義季氏躬自厚而薄責於人則逺怨矣衛靈公所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也中庸十三章見賢思齊焉見不賢而内自省也里仁三人行必有我師焉擇其善者而從之其不善者而改之述而君子所以異於人者以其存心也君子以仁存心以禮存心仁者愛人有禮者敬人愛人者人恒愛之敬人者人恒敬之有人於此其待我以横逆則君子必自反也我必不仁也必無禮也此物奚宜至哉其自反而仁矣自反而有禮矣其横逆由是也君子必自反也我必不忠自反而忠矣其横逆由是也君子曰此亦妄人也已矣如此則與禽獸奚擇哉於禽獸又何難焉是故君子有終身之憂無一朝之患也乃若所憂則有之舜人也我亦人也舜為法於天下可傳於後世我由未免為鄉人也是則可憂也憂之如何如舜而已矣若夫君子所患則亡矣非仁無為也非禮無行也如有一朝之患則君子不患矣離婁下愛人不親反其仁治人不治反其智禮人不答反其敬行有不得者皆反求諸已其身正而天下歸之詩云永言配命自求多福離婁上右反身脩省之學愚謂此有専心於自治者有因事而自儆者又有自省與自責不同而皆為力行之事也徳之不脩學之不講聞義不能徙不善不能改是吾憂也述而後生可畏焉知來者之不如今也四十五十而無聞焉斯亦不足畏也已子罕年四十而見惡焉其終也已陽貨右勉人進學之辭為不知學者言之餘如十室之邑章我非生知章及孟子道性善人皆可為堯舜諸章皆是此類但於世子曹交則因其人而言之其餘則汎為學者言之也知之者不如好之者好之者不如樂之者雍也可與共學未可與適道可與適道未可與立可與立未可與權苖而不秀者有矣夫秀而不實者有矣夫譬如為山未成一簣止吾止也譬如平地雖覆一簣進吾徃也並子罕有為者譬若掘井盡心上右勉人進學之辭為學而未至者言之餘如學如不及逝者如斯日知其所亡深造之以道及人一已百人十已千知之成功一也凡教人以不可自畫者皆此類羣居終日言不及義好行小慧難矣哉衛靈公飽食終日無所用心難矣哉不有博奕者乎為之猶賢乎已陽貨自暴者不可與有言也自棄者不可與有為也言非禮義謂之自暴也吾身不能居仁由義謂之自棄也仁人之安宅也義人之正路也曠安宅而弗居舍正路而不由哀哉離婁上仁人心也義人路也舍其路而弗由放其心而不知求哀哉人有雞犬放則知求之有放心而不知求學問之道無他求其放心而已矣告子上右儆戒學者之辭愚謂言不及義好行小慧是不能矯輕也飽食終日無所用心是不能儆惰也言不及義則近於自暴而不肯居仁由義無所用心則甘於自棄而不能求其放心夫子兩言難矣哉孟子兩言哀哉盖深歎人之不可以不學也而其言可以互相𤼵明如此古之學者為己今之學者為人憲問右明學者用心得失之機知生而知之者上也學而知之者次也困而學之又其次也困而不學民斯為下矣季氏我非生而知之者好古敏以求之者也蓋有不知而作之者我無是也多聞擇其善者而從之多見而識之知之次也並述而由誨女知之乎知之為知之不知為不知是知也為政右汎以義理而言之愚謂夫子之汎言是為學者言之以盡精微為主其告子路是因其人而言之以無自欺為主或生而知之或學而知之或困而知之及其知之一也中庸二十章右専以達道而言之饒子曰有格物之知有聞見之知故有知之至與知之次不同愚謂聞見之知與格物之知不同而格物之知又有不同者曰知至曰知止曰知性曰知天曰知天命蓋知至主乎吾心而言知止主乎事理而言知性主乎理之㑹於吾心而言知天主乎理之根於太虛而言知性然後知至知至則明其所當然而知止識其所以然而知天而所謂天命者不外是矣若知之者不如好之者則理猶在彼我但知其有此理而已此雖不屬乎聞見之知而去聞見之知未逺也又思知人不可不知天天人相貫所知有淺深無彼此質鬼神俟百世則天人相對所知有彼此無淺深行子路有聞未之能行唯恐有聞公冶子路問聞斯行諸子曰有父兄在如之何其聞斯行之冉有問聞斯行諸子曰聞斯行之公西華曰由也問聞斯行諸子曰有父兄在求也問聞斯行諸子曰聞斯行之赤也惑敢問子曰求也退故進之由也兼人故退之先進右以體諸身者言之子張問行子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉立則見其参於前也在輿則見其倚於衡也夫然後行子張書諸紳衛靈公右以達諸事者言之愚案此章行字不與知字相對而子張問行問達二章自相對行無所礙之謂行行無不得之謂達夫子告之皆以徳孚於人為本也師道温故而知新可以為師矣為政右為為人師者言之愚案温故知新論語中庸兩見之論語之所謂故是聞於人者中庸之所謂故是存於已者論語是即其一理而推見衆理之無窮中庸是全其統體而益見脉絡之精微論語是一件事中庸是兩件事人之患在好為人師離婁上右為好為人師者言之愚謂論語正言為師之道孟子自是儆戒學者之辭蓋師莫病止於記問學莫病易於自足自足者且不足為學況可為人師乎諸經詩三百一言以蔽之曰思無邪為政王者之迹熄而詩亡詩亡然後春秋作晉之乗楚之檮杌魯之春秋一也其事則齊桓晉文其文則史孔子曰其義則丘竊取之矣離婁下世衰道微邪說暴行有作臣弑其君者有之子弑其父者有之孔子懼作春秋春秋天子之事也是故孔子曰知我者其惟春秋乎罪我者其惟春秋乎滕文公下右緫論一經之㫖愚案孔子之論詩是欲人知其要孟子之論春秋是欲人知其義王者迹熄一章是明孔子作春秋之法世衰道微一節是明孔子作春秋之本義又如孟子春秋無義戰之云亦緫論一經之㫖是又主征伐而言者也關雎樂而不淫哀而不傷八佾高子曰小弁小人之詩也孟子曰何以言之曰怨曰固哉高叟之為詩也有人於此越人關弓而射之則已談笑而道之無他䟽之也其兄關弓而射之則已垂涕泣而道之無他戚之也小弁之怨親親也親親仁也固矣夫高叟之為詩也曰凱風何以不怨曰凱風親之過小者也小弁親之過大者也親之過大而不怨是愈䟽也親之過小而怨是不可磯也愈䟽不孝也不可磯亦不孝也孔子曰舜其至孝矣五十而慕告子下右專論一篇之㫖愚案孔子論關雎是因關雎之詩而見文王后妃之徳孟子論小弁是因高子之言而明太子之心子貢曰貧而無諂富而無驕何如子曰可也未若貧而樂富而好禮者也子貢曰詩云如切如磋如琢如磨其斯之謂與子曰賜也始可與言詩已矣告諸徃而知來者學而子夏問曰巧笑倩兮美目盼兮素以為絢兮何謂也子曰繪事後素曰禮後乎子曰起子者商也始可與言詩已矣八佾詩曰不素餐兮君子之不耕而食何也孟子曰君子居是國也其君用之則安富尊榮其子弟從之則孝弟忠信不素餐兮孰大於是盡心上右専明一節之義愚謂此皆主乎一事而言者也舜之不臣堯則吾既得聞命矣詩云普天之下莫非王土率土之濵莫非王臣而舜既為天子矣敢問瞽瞍之非臣如何曰是詩也非是之謂也勞於王事而不得養父母也曰此莫非王事我獨賢勞也故說詩者不以文害辭不以辭害志以意逆志是為得之如以辭而已矣雲漢之詩曰周餘黎民靡有孑遺信斯言也是周無遺民也孝子之至莫大乎尊親尊親之至莫大乎以天下養為天子父尊之至也以天下養養之至也詩曰永言孝思孝思維則此之謂也書曰祗載見瞽瞍䕫䕫齊栗瞽瞍亦允若是為父不得而子也萬章上盡信書則不如無書吾於武城取二三䇿而已矣仁人無敵於天下以至仁伐至不仁而何其血之流杵也盡心下右専明讀書之法加我數年五十以學易可以無大過矣述而誦詩三百授之以政不達使於四方不能専對雖多亦奚以為子路小子何莫學夫詩詩可以興可以觀可以羣可以怨邇之事父逺之事君多識於鳥獸草木之名女為周南召南矣乎人而不為周南召南其猶正牆面而立也與並陽貨右明窮經致用之道義利附利因民之所利而利之斯不亦恵而不費乎擇可勞而勞之又誰怨欲仁而得仁又焉貪君子無衆寡無小大無敢慢斯不亦泰而不驕乎君子正其衣冠尊其瞻視儼然人望而畏之斯不亦威而不猛乎子張曰何謂四惡子曰不教而殺謂之虐不戒視成謂之暴慢令致期謂之賊猶之與人也出納之吝謂之有司堯曰小人樂其樂而利其利大學傳三章右以天理自然之利言之君子喻於義小人喻於利里仁亦將有以利吾國乎孟子對曰王何必曰利亦有仁義而已矣王曰何以利吾國大夫曰何以利吾家士庶人曰何以利吾身上下交征利而國危矣萬乗之國弑其君者必千乗之家千乗之國弑其君者必百乗之家萬取千焉千取百焉不為不多矣苟為後義而先利不奪不饜未有仁而遺其親者也未有義而後其君者也王亦曰仁義而已矣何必曰利梁恵王上孳孳為利者蹠之徒也欲知舜與蹠之分無他利與善之間也盡心上我將言其不利也曰先生之志則大矣先生之號則不可先生以利說秦楚之王秦楚之王悅於利以罷三軍之師是三軍之士樂罷而悅於利也為人臣者懐利以事其君為人子者懐利以事其父為人弟者懐利以事其兄是君臣父子兄弟終去仁義懐利以相接然而不亡者未之有也先生以仁義說秦楚之王秦楚之王悅於仁義而罷三軍之師是三軍之士樂罷而悅於仁義也為人臣者懐仁義以事其君為人子者懐仁義以事其父為人弟者懐仁義以事其兄是君臣父子兄弟去利懐仁義以相接也然而不王者未之有也何必曰利告子下放於利而行多怨里仁右以狥私便己之利言之愚案聖賢言利或與義對或與善對或與仁義為對蓋仁者義之體善者仁義之緫名言之雖若不同其為理欲之反對則一也又義與利對以處事言善與利對以存心言仁義與利為對兼存心處事言餘如見小利及枉尺直尋之利皆是此類此謂國不以利為利以義為利也大學傳十章右兼天理人欲之利言之愚謂以義利相對而言則是人欲之利以義利相貫而言則是天理中自然之利已上利字皆以利便言若故者以利為本是以利順言知者利仁利而行之皆以貪利言利字之訓其不同如此祭祀祭如在祭神如神在子曰吾不與祭如不祭八佾子之所慎齊戰疾述而齊必有明衣布齊必變食居必遷坐鄉黨右祭祀之正者亦曰聖人祭祀之誠餘凡喪祭之祭皆是此類今於葬祭之下詳之與其媚於奥寧媚於竈何謂也子曰不然獲罪於天無所禱也八佾子路請禱子曰有諸子路對曰有之誄曰禱爾於上下神祇子曰丘之禱久矣述而右禱祀以求福者子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮八佾右當祭而不祭者非其鬼而祭之諂也為政季氏旅於泰山子謂冉有曰女弗能救與對曰不能子曰嗚呼曽謂泰山不如林放乎禘自既灌而徃者吾不欲觀之矣或問禘之說子曰不知也知其說者之於天下也其如示諸斯乎指其掌並八佾右不當祭而祭者愚案夫子謂不知者諱之也謂不欲觀者歎之也為父母之國而諱之為先王之禮而歎之皆所以正名分為世道計也喪祭附葬吾聞諸夫子人未有自致者也必也親喪乎喪致乎哀而止並子張墨者夷之因徐辟而求見孟子孟子曰吾固願見今吾尚病病愈我且徃見夷子不來他日又求見孟子孟子曰吾今則可以見矣不直則道不見我且直之吾聞夷子墨者墨之治喪也以薄為其道也夷子思以易天下豈以為非是而不貴也然而夷子葬其親厚則是以所賤事親也徐子以告夷子夷子曰儒者之道古之人若保赤子此言何謂也之則以為愛無差等施由親始徐子以告孟子孟子曰夫夷子信以為人之親其兄之子為若親其鄰之赤子乎彼有取爾也赤子匍匐將入井非赤子之罪也且天之生物也使之一本而夷子二本故也蓋上世甞有不葬其親者其親死則舉而委之於壑他日過之狐狸食之蠅蚋姑嘬之其顙有泚睨而不視夫泚也非為人泚中心達於面目蓋歸反虆梩而掩之掩之誠是也則孝子仁人之掩其親亦必有道矣徐子以告夷子夷子憮然為閒曰命之矣滕文公上養生者不足以當大事惟送死可以當大事離婁下右本乎人心而言高宗諒隂三年不言何謂也子曰何必高宗古之人皆然君薨百官總已以聽於冢宰三年憲問滕定公薨世子謂然友曰昔者孟子甞與我言於宋於心終不忘今也不幸至於大故吾欲使子問於孟子然後行事然友之鄒問於孟子孟子曰不亦善乎親喪固所自盡也曽子曰生事之以禮死𦵏之以禮祭之以禮可謂孝矣諸侯之禮吾未之學也雖然吾甞聞之矣三年之喪齊䟽之服飦粥之食自天子達於庶人三代共之然友反命定為三年之喪父兄百官皆不欲曰吾宗國魯先君莫之行吾先君亦莫之行也至於子之身而反之不可且志曰喪祭從先祖曰吾有所受之也謂然友曰吾他日未甞學問好馳馬試劒今也父兄百官不我足也恐其不能盡於大事子為我問孟子然友復之鄒問孟子孟子曰然不可以他求者也孔子曰君薨聽於冢宰歠粥面深墨即位而哭百官有司莫敢不哀先之也上有好者下必有甚焉者矣君子之徳風也小人之徳草也草上之風必偃是在世子然友反命世子曰然是誠在我五月居廬未有命戒百官族人可謂曰知及至葬四方來觀之顔色之戚哭泣之哀弔者大悅滕文公上齊宣王欲短喪公孫丑曰為期之喪猶愈於已乎孟子曰是猶或紾其兄之臂子謂之姑徐徐云爾亦教之孝弟而已矣王子有其母死者其傅為之請數月之喪公孫丑曰若此者何如也曰是欲終之而不可得也雖加一日愈於已謂夫莫之禁而弗為者也盡心上無憂者其惟文王乎以王季為父以武王為子父作之子述之武王纉太王王季文王之緒壹戎衣而有天下身不失天下之顯名尊為天子富有四海之内宗廟饗之子孫保之武王末受命周公成文武之徳追王大王王季上祀先公以天子之禮斯禮也達乎諸侯大夫及士庶人父為大夫子為士葬以大夫祭以士父為士子為大夫葬以士祭以大夫期之喪達乎大夫三年之喪達乎天子父母之喪無貴賤一也中庸十八章武王周公其達孝矣乎夫孝者善繼人之志善述人之事者也春秋脩其祖廟陳其宗器設其裳衣薦其時食宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也旅酬下為上所以逮賤也燕毛所以序齒也踐其位行其禮奏其樂敬其所尊愛其所親事死如事生事亡如事存孝之至也郊社之禮所以事上帝也宗廟之禮所以祀乎其先也明乎郊社之禮禘甞之義治國其如示諸掌乎中庸十九章孟子之後喪踰前喪是以不徃見也曰何哉君所謂踰者前以士後以大夫前以三鼎而後以五鼎與曰否謂棺槨衣衾之美也曰非所謂踰也貧富不同也樂正子見孟子曰克告於君君為來見也嬖人有臧倉者沮君君是以不果來也曰行或使之止或尼之行止非人所能也吾之不遇魯侯天也臧氏之子焉能使予不遇哉梁恵王下子疾病子路使門人為臣病閒曰久矣哉由之行詐也無臣而為有臣吾誰欺欺天乎且予與其死於臣之手也無寧死於二三子之手乎且予縱不得大葬予死於道路乎子罕顔淵死顔路請子之車以為之椁子曰才不才亦各言其子也鯉也死有棺而無椁吾不徒行以為之椁以吾從大夫之後不可徒行也門人欲厚葬之子曰不可門人厚葬之子曰回也視予猶父也予不得視猶子也非我也夫二三子也並先進右主乎禮制而言宰我問三年之喪期已久矣君子三年不為禮禮必壊三年不為樂樂必崩舊穀既没新穀既升鑚燧改火期可已矣子曰食夫稻衣夫錦於女安乎曰安女安則為之夫君子之居喪食㫖不甘聞樂不樂居處不安故不為也今女安則為之宰我出子曰予之不仁也子生三年然後免於父母之懐夫三年之喪天下之通喪也予也有三年之愛於其父母乎陽貨孟子自齊葬於魯反於齊止於嬴充虞請曰前日不知虞之不肖使虞敦匠事嚴虞不敢請今願竊有請也木若以美然曰古者棺椁無度中古棺七寸椁稱之自天子達於庶人非直為觀美也然後盡於人心不得不可以為悅無財不可以為悅得之為有財古之人皆用之吾何為獨不然且比化者無使土親膚於人心獨無恔乎吾聞之也君子不以天下儉其親公孫丑下右兼人心禮制而言慎終追逺民徳歸厚矣學而右自其效騐而言文質質勝文則野文勝質則史文質彬彬然後君子雍也右以内外相對而言之繪事後素曰禮後乎子曰起予者商也始可與言詩已矣八佾右以先後相對而言之林放問禮之本子曰大哉問禮與其奢也寧儉喪與其易也寧戚八佾先進於禮樂野人也後進於禮樂君子也如用之則吾從先進先進右矯其偏勝而言之君子質而已矣何以文為子貢曰惜乎夫子之說君子也駟不及舌文猶質也質猶文也虎豹之鞟猶犬羊之鞟顔淵右各倚於一偏而言之文子畏於匡曰文王既没文不在兹乎天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如予何子罕右以道言文王之徳之純盖曰文王之所以為文也中庸二十六章右以徳言孔文子何以謂之文也子曰敏而好學不恥下問是以謂之文也公冶公叔文子之臣大夫僎與文子同升諸公子聞之曰可以為文矣憲問右以事言饒子曰二章皆因謚法而言但是以謂之文是正言所以為文之義可以為文但言如此者可無愧於文之謚也郁郁乎文哉吾從周八佾右以禮樂制度言餘有以典籍言者易辨今不録言行君子欲訥於言而敏於行里仁君子恥其言而過其行憲問古者言之不出恥躬之不逮也里仁其言之不怍則為之也難憲問右汎為學者言之先行其言而後從之子張學干禄子曰多聞闕疑慎言其餘則寡尤多見闕殆慎行其餘則寡悔言寡尤行寡悔禄在其中矣並為政言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉立則見其参於前也在輿則見其倚於衡也夫然後行衛靈公右各因其人而言之大人者言不必信行不必果惟義所在離婁下庸徳之行庸言之謹有所不足不敢不勉有餘不敢盡言顧行行顧言君子胡不慥慥爾中庸十三章言近而指逺者善言也守約而施博者善道也君子之言也不下帶而道存焉君子之守脩其身而天下平盡心下右自成徳者言之愚謂不必信果者由其徳行之自然所以為大人也必信必果者由其識量之淺狹所以為小人也邦有道危言危行邦無道危行言孫憲問右為為人臣者言之言辭人之易其言也無責耳矣離婁上辭達而已矣衛靈公我於辭命則不能也公孫丑上右汎為學者言之仁者其言也訒曰其言也訒斯謂之仁矣乎子曰為之難言之得無訒乎顔淵右因其人而言之餘如孔門弟子有能言者有能謹言者皆見本類可與言而不與之言失人不可與言而與之言失言知者不失人亦不失言衛靈公言未及之而言謂之躁言及之而不言謂之隠未見顔色而言謂之瞽季氏右自交際而言之過周公弟也管叔兄也周公之過不亦宜乎公孫丑下丘也幸茍有過人必知之述而右仁厚之極為之愚謂孔子自受以為過似若有過而實無過也孟子不以周公為無過周公本無過而似若不免有過也欲知二聖人之心者當各隨其事而觀之加我數年五十以學易可以無大過矣述而不貳過雍也子路人告之以有過則喜公孫丑上太甲悔過自怨自艾於桐萬章上夫子欲寡其過而未能也憲問君子之過也如日月之食焉過也人皆見之更也人皆仰之子張見不善而不能退退而不能逺過也大學傳十章過則勿憚改學而人恒過然後能改告子下吾未見能見其過而内自訟者也公冶過而不改是謂過矣衛靈公右義理之未純者為之愚謂亞聖之過質之未化者為之大賢之過氣質之偏為之衆人之過氣質私心雜揉而為之太甲之過亦衆人之過也惟能悔過所以為賢餘有陳賈為齊王文過一章見臣道類小人之過也必文子張右人欲之私為之觀過斯知仁矣里仁右兼君子小人之過而言節操故君子和而不流强哉矯中立而不倚强哉矯國有道不變塞焉强哉矯國無道至死不變强哉矯中庸十章居天下之廣居立天下之正位行天下之大道得志與民由之不得志獨行其道富貴不能淫貧賤不能移威武不能屈此之謂大丈夫滕文公下右通以立身之道言之亦曰平居自守之節餘如孟子論栁下恵之介亦是此類但君子大丈夫是學問之功栁下恵之可稱者只是資質之美未必義理之純全也可以託六尺之孤可以寄百里之命臨大節而不可奪也君子人與君子人也泰伯歳寒然後知松栢之後凋也子罕右専以處變之道言之亦曰臨難自守之節朱子曰託孤寄命是才不可奪是節餘如論孟子之言守死善道殺身成仁見危致命舍生取義皆此類也名聞是以聲名洋溢乎中國施及蠻貊中庸三十一章令聞廣譽施於身所以不願人之文繡也告子上君子疾没世而名不稱焉衛靈公四十五十而無聞焉子罕右積於中而𤼵於外者饒子曰中庸稱舜曰必得其名稱武王曰不失天下之顯名蓋反之不若性之之純征伐不若揖讓之順又曰武王殺紂似乎失名而實不失名夫聞也者色取仁而行違居之不疑在邦必聞在家必聞顔淵仲尼亟稱於水曰水哉水哉何取於水也孟子曰源泉混混不舍晝夜盈科而後進放乎四海有本者如是是之取爾苟為無本七八月之閒雨集溝澮皆盈其涸也可立而待也故聲聞過情君子恥之離婁下右暴於外而無其實者愚謂子張有違道干譽之失徐子有躐等干譽之病聖賢是以各因其人而言之異端攻乎異端斯害也已為政外人皆稱夫子好辯敢問何也孟子曰予豈好辯哉予不得已也天下之生久矣一治一亂當堯之時水逆行氾濫於中國蛇龍居之民無所定下者為巢上者為營窟書曰洚水警余洚水者洪水也使禹治之禹掘地而注之海驅蛇龍而放之菹水由地中行江淮河漢是也險阻既逺鳥獸之害人者消然後人得平土而居之堯舜既没聖人之道衰暴君代作壊宫室以為汙池民無所安息棄田以為園囿使民不得衣食邪説暴行又作園囿汙池沛澤多而禽獸至及紂之身天下又大亂周公相武王誅紂伐奄三年討其君驅飛廉於海隅而戮之滅國者五十驅虎豹犀象而逺之天下大悅書曰丕顯哉文王謨丕承哉武王烈佑啟我後人咸以正無缺世衰道微邪說暴行有作臣弑其君者有之子弑其父者有之孔子懼作春秋春秋天子之事也是故孔子曰知我者其惟春秋乎罪我者其惟春秋乎聖王不作諸侯放恣處士横議楊朱墨翟之言盈天下天下之言不歸楊則歸墨楊氏為我是無君也墨氏兼愛是無父也無父無君是禽獸也公明儀曰庖有肥肉廐有肥馬民有饑色野有餓莩此率獸而食人也楊墨之道不息孔子之道不著是邪說誣民充塞仁義也仁義充塞則率獸食人人將相食吾為此懼閑先聖之道距楊墨放淫辭邪說者不得作作於其心害於其事作於其事害於其政聖人復起不易吾言矣昔者禹抑洪水而天下平周公兼夷狄驅猛獸而百姓寧孔子成春秋而亂臣賊子懼詩云戎狄是膺荆舒是懲則莫我敢承無父無君是周公所膺也我亦欲正人心息邪說距詖行放淫辭以承三聖者豈好辯哉予不得已也能言距楊墨者聖人之徒也滕文公下楊子取為我㧞一毛而利天下不為也墨子兼愛摩頂放踵利天下為之子莫執中執中為近之執中無權猶執一也所惡執一者為其賊道也舉一而廢百也盡心上雖小道必有可觀者焉致逺恐泥是以君子不為也子張樊遲請學稼子曰吾不如老農請學為圃曰吾不如老圃樊遲出子曰小人哉樊須也上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情夫如是則四方之民襁負其子而至矣焉用稼子路有為神農之言者許行自楚之滕踵門而告文公曰逺方之人聞君行仁政願受一㕓而為氓文公與之處其徒數十人皆衣褐捆屨織席以為食陳良之徒陳相與其弟辛負耒耜而自宋之滕曰聞君行聖人之政是亦聖人也願為聖人氓陳相見許行而大悅盡棄其學而學焉陳相見孟子道許行之言曰滕君則誠賢君也雖然未聞道也賢者與民並耕而食饔飱而治今也滕有倉廩府庫則是厲民而以自養也惡得賢孟子曰許子必種粟而後食乎曰然許子必織布而後衣乎曰否許子衣褐許子冠乎曰冠曰奚冠曰冠素曰自織之與曰否以粟易之曰許子奚為不自織曰害於耕曰許子以釜甑爨以鐵耕乎曰然自為之與曰否以粟易之以粟易械器者不為厲陶冶陶冶亦以其械器易粟者豈為厲農夫哉且許子何不為陶冶舍皆取諸其宫中而用之何為紛紛然與百工交易何許子之不憚煩曰百工之事固不可耕且為也然則治天下獨可耕且為與有大人之事有小人之事且一人之身而百工之所為備如必自為而後用之是率天下而路也故曰或勞心或勞力勞心者治人勞力者治於人治於人者食人治人者食於人天下之通義也當堯之時天下猶未平洪水横流氾濫於天下草木暢茂禽獸繁殖五穀不登禽獸偪人獸蹄鳥跡之道交於中國堯獨憂之舉舜而敷治焉舜使益掌火益烈山澤而焚之禽獸逃匿禹䟽九河瀹濟漯而注諸海決汝漢排淮泗而注之江然後中國可得而食也當是時也禹八年於外三過其門而不入雖欲耕得乎后稷教民稼穡樹藝五穀五穀熟而民人育人之有道也飽食煖衣逸居而無教則近於禽獸聖人有憂之使契為司徒教以人倫父子有親君臣有義夫婦有别長幼有序朋友有信放勲曰勞之來之匡之直之輔之翼之使自得之又從而振徳之聖人之憂民如此而暇耕乎堯以不得舜為己憂舜以不得禹臯陶為己憂夫以百畆之不易為己憂者農夫也分人以財謂之恵教人以善謂之忠為天下得人者謂之仁是故以天下與人易為天下得人難孔子曰大哉堯之為君惟天為大惟堯則之蕩蕩乎民無能名焉君哉舜也巍巍乎有天下而不與焉堯舜之治天下豈無所用其心哉亦不用於耕耳吾聞用夏變夷者未聞變於夷者也陳良楚産也悅周公仲尼之道北學於中國北方之學者未能或之先也彼所謂豪傑之士也子之兄弟事之數十年師死而遂倍之昔者孔子没三年之外門人治任將歸入揖於子貢相嚮而哭皆失聲然後歸子貢反築室於場獨居三年然後歸他日子夏子張子游以有若似聖人欲以所事孔子事之彊曽子曽子曰不可江漢以濯之秋陽以暴之皜皜乎不可尚已今也南蠻鴃舌之人非先王之道子倍子之師而學之亦異於曽子矣吾聞出於幽谷遷於喬木者未聞下喬木而入於幽谷者魯頌曰戎狄是膺荆舒是懲周公方且膺之子是之學亦為不善變矣從許子之道則市賈不貳國中無偽雖使五尺之童適市莫之或欺布帛長短同則賈相若麻縷絲絮輕重同則賈相若五穀多寡同則賈相若屨大小同則賈相若曰夫物之不齊物之情也或相倍蓰或相什伯或相千萬子比而同之是亂天下也巨屨小屨同賈人豈為之哉從許子之道相率而為偽者也惡能治國家滕文公上公孫衍張儀豈不誠大丈夫哉一怒而諸侯懼安居而天下熄孟子曰是焉得為大丈夫乎子未學禮乎丈夫之冠也父命之女子之嫁也母命之徃送之門戒之曰徃之女家必敬必戒無違夫子以順為正者妾婦之道也居天下之廣居立天下之正位行天下之大道得志與民由之不得志獨行其道富貴不能淫貧賤不能移威武不能屈此之謂大丈夫滕文公下丹之治水也愈於禹孟子曰子過矣禹之治水水之道也是故禹以四海為壑今吾子以鄰國為壑水逆行謂之洚水洚水者洪水也仁人之所惡也吾子過矣告子下求也為季氏宰無能改於其徳而賦粟倍他日孔子曰求非我徒也小子鳴鼓而攻之可也由此觀之君不行仁政而富之皆棄於孔子者也况於為之强戰争地以戰殺人盈野争城以戰殺人盈城此所謂率土地而食人肉罪不容於死故善戰者服上刑連諸侯者次之辟草萊任土地者次之離婁上吾欲二十而取一何如孟子曰子之道貉道也萬室之國一人陶則可乎曰不可器不足用也曰夫貉五穀不生惟黍生之無城郭宫室宗廟祭祀之禮無諸侯幣帛饔飧無百官有司故二十取一而足也今居中國去人倫無君子如之何其可也陶以寡且不可以為國况無君子乎欲輕之於堯舜之道者大貉小貉也欲重之於堯舜之道者大桀小桀也今之事君者曰我能為君辟土地充府庫今之所謂良臣古之所謂民賊也君不鄉道不志於仁而求富之是富桀也我能為君約與國戰必克今之所謂良臣古之所謂民賊也君不鄉道不志於仁而求為之强戰是輔桀也由今之道無變今之俗雖與之天下不能一朝居也並告子下有人曰我善為陳我善為戰大罪也國君好仁天下無敵焉南面而征北狄怨東面而征西夷怨曰奚為後我武王之伐殷也革車三百兩虎賁三千人王曰無畏寧爾也非敵百姓也若崩厥角稽首征之為言正也各欲正已也焉用戰盡心下右聖賢闢之以義愚謂孟子之時楊墨二家最為害道其次則有兵家農家縱横家及貨殖之徒各専一業以聾瞽天下大抵惑人心者莫如兼愛為我快君心者莫如强兵富國而皆足以重斯世之禍也故深闢之墨者夷之因徐辟而求見孟子孟子曰吾固願見今吾尚病病愈我且徃見夷子不來他日又求見孟子孟子曰吾今則可以見矣不直則道不見我且直之吾聞夷子墨者墨之治喪也以薄為其道也夷子思以易天下豈以為非是而不貴也然而夷子葬其親厚則是以所賤事親也徐子以告夷子夷子曰儒者之道古之人若保赤子此言何謂也之則以為愛無差等施由親始徐子以告孟子孟子曰夫夷子信以為人之親其兄之子為若親其鄰之赤子乎彼有取爾也赤子匍匐將入井非赤子之罪也且天之生物也使之一本而夷子二本故也蓋上世甞有不葬其親者其親死則舉而委之於壑他日過之狐狸食之蠅蚋姑嘬之其顙有泚睨而不視夫泚也非為人泚中心達於面目蓋歸反虆梩而掩之掩之誠是也則孝子仁人之掩其親亦必有道矣徐子以告夷子夷子憮然為閒曰命之矣滕文公上逃墨必歸於楊逃楊必歸於儒歸斯受之而已矣今之與楊墨辯者如追放豚既入其苙又從而招之盡心下右聖賢誘之以仁愚謂陳相夷之均之為習異端者也然陳相倍師而之能受命之之加於相數等矣冝孟子責相之深而納約自牖之誨於夷之不隠也四書通㫖卷之四
