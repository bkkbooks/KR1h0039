body:
  text: 欽定四庫全書四書通㫖卷二元朱公遷撰徳民之秉夷好是懿徳告子上知仁勇三者天下之達徳也中庸二十章成己仁也成物知也性之徳也中庸二十五章在明明徳大學尊徳性中庸二十七章右得於天者愚謂明徳徳性懿徳皆舉徳之全體而言也若知仁勇之為達徳仁知之為性之徳則即以其徳而言也據於徳述而主忠信徙義崇徳也先事後得非崇徳與並顔淵右行道有得於心者以進徳功夫言之愚謂據於徳是汎為學者言之其告子張樊遲者是各因其人而言之又案大學之明明徳中庸之尊徳性亦是進徳之功夫但明徳兼知行言據徳崇徳尊徳性則專以行言也徳潤身大學傳六章為政以徳譬如北辰居其所而衆星共之道之以徳齊之以禮有耻且格並為政周於利者凶年不能殺周於徳者邪世不能亂盡心下右行道有得於心者以成徳效驗言之餘如有徳有言亦是徳之見於外者蓋亦效驗之一端也大徳不踰閑小徳出入可也子張右行道有得於心者指其節目而言之愚案大徳小徳語孟中庸凡三見之子夏以大略細行分大小子思以本根脈絡分大小孟子以成徳淺深分大小此其言之所以不同也鄉原徳之賊也道聽而塗說徳之棄也並陽貨右行道有得於心者以其反對而言之胡氏曰似徳而亂徳則曰徳之賊可以進徳而不進則曰徳之棄愚謂徳之棄此徳字是即人心之徳而言之徳之賊此徳字是指有徳之人而言之此類最難所以其語勢相同而義略不同也如尊徳樂義斯可囂囂是即人心之徳而言尊徳樂道不如是不足與有為是指有徳之人而言推而觀之可見徳不孤必有鄰里仁吾未見好徳如好色者也子罕天下有道小徳役大徳離婁上右行道有得於心者指有徳之人而言之案陳氏謂行道有得於心者皆是因人用功處論如孝弟忠信之類是也愚謂行道有得於心不能有加於明徳懿徳徳性之外正以復其明全其懿盡其性而已是得於天者其本然之統體行道有得於心者乃其修之復之之條目也已上得於天者與行道有得於心者其不同如此若知徳者鮮不恒其徳之類則又汎言義理之得於己者其所包者又甚廣也克明峻徳大學傳一章嘉樂君子憲憲令徳故大徳者必受命並中庸十七章克明徳大學傳一章文王之徳之純中庸二十六章天生徳於予述而小徳川流大徳敦化中庸三十章動容周旋中禮者盛徳之至也盡心下苟不固聰明聖知達天徳者中庸三十二章不顯惟徳百辟其刑之予懐明徳不大聲以色並中庸末章苟不至徳至道不凝焉中庸二十七章右徳之極其盛者舉其統體而言之愚謂此所謂徳者仁義禮智無不全百行萬善無不備也自其不貳不息而言曰純徳自其允合天命而言曰天徳舉天下無以加之曰大徳至徳峻徳盛徳極天下之美而言曰令徳原夫天之所予獨異於人曰天生徳推聖學極功而言曰克明徳分體用而言曰小徳大徳因其篤恭氣象幽深𤣥逺而言曰不顯惟徳所言雖不同而皆為聖人之徳也泰伯其可謂至徳也已矣三以天下讓民無得而稱焉三分天下有其二以服事殷周之徳其可謂至徳也已矣並泰伯右徳之極其盛者即其一事而言之愚謂文王是盡臣道泰伯是兼盡臣子之道故皆以至徳稱之餘有訓恩恵者易辨此不録道徳志於道據於徳述而右自為學之道言之愚案此與中庸至徳至道次第不同此為學者之事彼為聖人之舉志道而後據徳則道猶在彼而我志之至徳能凝至道則道為我有而我凝之執徳不𢎞信道不篤焉能為有焉能為亡子張右以為學之敝言之中喜怒哀樂之未發謂之中中庸一章右以體言亦曰以性言允執其中堯曰執其兩端用其中於民中庸六章湯執中離婁下君子而時中中庸二章右以用言亦曰以事理言愚謂舜之用中是用言之道其餘則皆處事之道若孟子中道而立亦以事理言是又教人之道也中也養不中離婁下右以徳言餘如中立而不倚則兼徳行言不得中行而與之則兼才徳言中行本於性質中立主於事理子莫執中執中為近之執中無權猶執一也盡心上右以為我兼愛兩間言愚謂子莫執中與聖人之中不同聖人隨事即理而有自然之中子莫則膠於一定以為中所以然者以其無權故也若有權以稱之斯得事理自然之中矣中和喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也致中和天地位焉萬物育焉中庸一章右以性情言和而不流强哉矯中立而不倚强哉矯中庸十章右以徳行言中庸中庸之為徳也雍也中庸其至矣乎中庸三章君子中庸小人反中庸君子之中庸也君子而時中小人之中庸也小人而無忌憚也中庸二章天下國家可均也爵禄可辭也白刃可蹈也中庸不可能也中庸九章素隠行怪後世有述焉吾弗為之矣君子遵道而行半塗而廢吾弗能已矣君子依乎中庸遯世不見知而不悔惟聖者能之中庸十一章右以徳行言而事理之中在其中趙氏曰有之為徳也四字則不必言能而能在其中無之為徳也四字則有能與不能之分故下句著一能字饒子曰中庸為徳以徳言中庸至矣以道言今案如饒子之說則中庸至矣一章當與下一類相從但比章句之㫖小異觀者擇焉可也敎不立故民鮮能學不至故中庸不可能備知仁勇之徳無過不及之敝故惟聖者能彼小人反之則能之而不欲也人皆曰予知驅而納諸罟擭陷阱之中而莫之知辟也人皆曰予知擇乎中庸而不能期月守也中庸七章囘之為人也擇乎中庸得一善則拳拳服膺而弗失之矣中庸八章極髙明而道中庸中庸二十七章右以事理言而徳行之中在其中愚案擇之屬乎知守之屬乎行拳拳服膺亦屬乎行惟道中庸為致知之事若可疑者然行之而著習矣而察蓋於行事之中又加致知之功也敬附恭附戒懼慎獨穆穆文王於緝熈敬止大學傳三章無為而治者其舜也與夫何為哉恭己正南面而已矣衞靈公不顯惟徳百辟其刑之是故君子篤恭而天下平中庸三十三章子路問君子子曰修己以敬曰如斯而已乎曰修己以安人曰如斯而已乎曰修己以安百姓修己以安百姓堯舜其猶病諸憲問右舉其統體而言亦曰専言之者愚謂緝熈敬止是聖學之極功恭己篤恭是致治之極功修己以敬則徹上徹下之道也又案恭己以正南面修己以安百姓篤恭而天下平皆以敬之功用言恭己篤恭是臨民氣象恭而安是一身氣象恭敬之心是本心著見者餘則因其著見而充積之者為人臣止於敬大學傳三章居處恭執事敬子路其行已也恭其事上也敬公冶責難於君謂之恭陳善閉邪謂之敬離婁上右主乎一事而言亦曰偏言之者餘如行篤敬事思敬祭思敬及敬事而信之類皆是愚案恭敬二字専言敬則恭在其中専言恭則敬在其中分主内外而對言之則恭在外而敬在内皆主乎事而並言之則敬為謹畏而恭為卑下也戒慎乎其所不睹恐懼乎其所不聞中庸一章右持敬之功以静存而言之莫見乎隠莫顯乎微故君子慎其獨也中庸一章故君子必慎其獨也大學傳六章右持敬之功以動察而言之朱子曰大學誠意章兩言慎獨先言慎獨欲其自謙也後言慎獨防其自欺也愚謂中庸言君子慎其獨大學言君子必慎其獨語勢有輕重不同蓋所謂君子者其等第不能無不同也出門如見大賔使民如承大祭顔淵君子所貴乎道者三動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣籩豆之事則有司存泰伯右持敬之功貫乎動静而言之愚案孔子之言存養之意多曽子之言省察之意多二章皆即其氣象之中而見其功夫之所在若論語之正其衣冠尊其瞻視中庸之齊明盛服非禮不動則又専以功夫言而氣象因可見也彭氏圭曰論語言正其衣冠尊其瞻視中庸言齊明盛服非禮不動皆敬也而有不同蓋中庸是徹内外言専言之敬也論語専主容貌言偏言之敬五美中之一也上天之載無聲無臭至矣中庸末章右持敬之功該動静貫始終兼入徳成徳功夫效驗而言之愚案中庸首末兩章不同先言存養是體道之功先言省察是入徳之序一則由體以及用一則斂費而歸隠也大學誠意専欲審夫實與不實之幾故以省察為主焉然涵養用敬已在致知之前矣一參乎吾道一以貫之曽子曰唯子出門人問曰何謂也曽子曰夫子之道忠恕而已矣里仁賜也女以予為多學而識之者與對曰然非與曰非也予一以貫之衞靈公右以一理言愚謂吾道一以貫之是以一理而應萬事予一以貫之是以一理而該萬理此知行不同之㫖也執中無權猶執一也盡心上右以執一不變言誠誠之不可揜如此夫中庸十六章右以理言唯天下至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育可以贊天地之化育則可以與天地參矣中庸二十二章至誠之道可以前知國家將興必有禎祥國家將亡必有妖孽見乎蓍龜動乎四體禍福將至善必先知之不善必先知之故至誠如神中庸二十四章故至誠無息不息則久久則徴徴則悠逺悠逺則博厚博厚則髙明博厚所以載物也髙明所以覆物也悠久所以成物也博厚配地髙明配天悠久無疆如此者不見而章不動而變無為而成天地之道可一言而盡也其為物不貳則其生物不測天地之道博也厚也髙也明也悠也久也今夫天斯昭昭之多及其無窮也日月星辰繫焉萬物覆焉今夫地一撮土之多及其廣厚載華嶽而不重振河海而不洩萬物載焉今夫山一卷石之多及其廣大草木生之禽獸居之寳藏興焉今夫水一勺之多及其不測黿鼉蛟龍魚龞生焉貨財殖焉詩云維天之命於穆不已蓋曰天之所以為天也於乎不顯文王之徳之純蓋曰文王之所以為文也純亦不已中庸二十六章唯天下至誠為能經綸天下之大經立天下之大本知天地之化育夫焉有所倚肫肫其仁淵淵其淵浩浩其天苟不固聰明聖知達天徳者其孰能知之中庸三十二章右以心言亦曰以徳言聖人之事也愚案至誠前知言至誠之能事至誠贊化及至誠經綸言至誠之功用至誠無息言其徳徴則悠逺以下指其驗於天下之氣象功效而言也又無息則與天地相配贊化則與天地相參知化則與天地相合無息則與天地合其徳前知則與鬼神合其吉凶所謂誠其意者毋自欺也如惡惡臭如好好色此之謂自謙故君子必慎其獨也小人閒居為不善無所不至見君子而后厭然揜其不善而著其善人之視已如見其肺肝然則何益矣此謂誠於中形於外故君子必慎其獨也曽子曰十目所視十手所指其嚴乎富潤屋徳潤身心廣體胖故君子必誠其意大學傳六章其次致曲曲能有誠誠則形形則著著則明明則動動則變變則化唯天下至誠為能化中庸二十三章誠者自成也而道自道也誠者物之終始不誠無物是故君子誠之為貴誠者非自成己而已也所以成物也成己仁也成物知也性之徳也合外内之道也故時措之宜也中庸二十五章右以心言學以至於聖人之事也愚謂誠意即致曲之功即誠之為貴之意此入徳之事也自謙即曲能有誠之謂即成已仁也之云此成徳之事也心廣則自然體胖成已則自然成物誠形著明則自然有動變化之理此成德之效驗又不期然而然也但至誠能化是聖人事心廣體胖與時措之宜是通為聖人與大賢以上事其效驗不同又如此云自誠明謂之性自明誠謂之教中庸二十一章凡事豫則立不豫則廢言前定則不跲事前定則不困行前定則不疚道前定則不窮在下位不獲乎上民不可得而治矣獲乎上有道不信乎朋友不獲乎上矣信乎朋友有道不順乎親不信乎朋友矣順乎親有道反諸身不誠不順乎親矣誠身有道不明乎善不誠乎身矣誠者天之道也誠之者人之道也誠者不勉而中不思而得從容中道聖人也誠之者擇善而固執之者也中庸二十章居下位而不獲於上民不可得而治也獲於上有道不信於友弗獲於上矣信於友有道事親弗悅弗信於友矣悅親有道反身不誠不悅於親矣誠身有道不明乎善不誠其身矣是故誠者天之道也思誠者人之道也至誠而不動者未之有也不誠未有能動者也離婁上右以心言兼言聖人學者之事也餘如反身而誠與强恕而行相對亦入徳成徳之不同也但誠明謂性誠者天道則専為聖人事反身而誠則通為聖人與大賢以上事在下位不獲乎上說從人事上來萬物皆備於我說從天理上來誠之者知行兼備者也明誠謂敎先知後行而知為本也思誠强恕則致知以後行之事也又案平居之日講求踐履以實其實是曰誠之行事之際加之慎獨以審實與不實之幾是曰思誠誠者自成也而道自道也誠者物之終始不誠無物中庸二十五章右兼理與心而言愚案此章之㫖本以心言而此三誠字則兼理與心而言此謂誠於中形於外大學傳六章右以人欲之私言心人皆有不忍人之心先王有不忍人之心斯有不忍人之政矣以不忍人之心行不忍人之政治天下可運之掌上所以謂人皆有不忍人之心者今人乍見孺子將入於井皆有怵惕惻隠之心非所以内交於孺子之父母也非所以要譽於鄉黨朋友也非惡其聲而然也由是觀之無惻隠之心非人也無羞惡之心非人也無辭讓之心非人也無是非之心非人也惻隠之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也人之有是四端也猶其有四體也有是四端而自謂不能者自賊者也謂其君不能者賊其君者也凡有四端於我者知皆擴而充之矣若火之始然泉之始達苟能充之足以保四海苟不充之不足以事父母公孫丒上惻隠之心人皆有之羞惡之心人皆有之恭敬之心人皆有之是非之心人皆有之惻隠之心仁也羞惡之心義也恭敬之心禮也是非之心智也告子上人能充無欲害人之心而仁不可勝用也人能充無穿踰之心而義不可勝用也盡心下右以道心言所謂修身在正其心者身有所忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正心不在焉視而不見聽而不聞食而不知其味此謂修身在正其心大學傳七章右以人心言已上皆専以用言愚聞之伯兄克履曰大學經言正心是兼體用言傳言所以正心之道是専以用言葢制於外所以養其内也富嵗子弟多賴凶嵗子弟多暴非天之降才爾殊也其所以䧟溺其心者然也今夫麰麥播種而耰之其地同樹之時又同浡然而生至於日至之時皆熟矣雖有不同則地有肥磽雨露之養人事之不齊也故凡同類者舉相似也何獨至於人而疑之聖人與我同類者故龍子曰不知足而為屨我知其不為蕢也屨之相似天下之足同也口之於味有同耆也易牙先得我口之所耆者也如使口之於味也其性與人殊若犬馬之與我不同類也則天下何耆皆從易牙之於味也至於味天下期於易牙是天下之口相似也惟耳亦然至於聲天下期於師曠是天下之耳相似也惟目亦然至於子都天下莫不知其姣也不知子都之姣者無目者也故曰口之於味也有同耆焉耳之於聲也有同聽焉目之於色也有同美焉至於心獨無所同然乎心之所同然者何也謂理也義也聖人先得我心之所同然耳故理義之悅我心猶芻豢之悅我口告子上右因論性善而以理義之心言之已下皆兼體用言牛山之木嘗美矣以其郊於大國也斧斤伐之可以為美乎是其日夜之所息雨露之所潤非無萌蘖之生焉牛羊又從而牧之是以若彼濯濯也人見其濯濯也以為未嘗有材焉此豈山之性也哉雖存乎人者豈無仁義之心哉其所以放其良心者亦猶斧斤之於木也旦旦而伐之可以為美乎其日夜之所息平旦之氣其好惡與人相近也者幾希則其旦晝之所為有梏亡之矣梏之反覆則其夜氣不足以存夜氣不足以存則其違禽獸不逺矣人見其禽獸也而以為未嘗有才焉者是豈人之情也哉故苟得其養無物不長苟失其養無物不消孔子曰操則存舍則亡出入無時莫知其鄉惟心之謂與仁人心也義人路也舍其路而弗由放其心而不知求哀哉人有雞犬放則知求之有放心而不知求學問之道無他求其放心而已矣並告子上右因論為學功夫而以理義之心言之愚案一章言理義之心人所固有而衆人梏之學者當有以養之也一章言理義之心人所當存而衆人放之學者當有以求之也操存是存養求放心是省察餘如存心養心之類與此類同亦以為學功夫言若孔子不踰矩則是志學之極功孟子不動心是知言養氣之成功孟子之言盡性是由知性而有其功大學言心正身修心廣體胖是格物致知誠意而致其功是雖深淺之不同皆即其功效而言者也又不動心是成徳之事動心忍性是進徳之事大人者不失其赤子之心者也離婁下鈞是人也或從其大體或從其小體何也曰耳目之官不思而蔽於物物交物則引之而已矣心之官則思思則得之不思則不得也此天之所與我者先立乎其大者則其小者不能奪也此為大人而已矣告子上右因論大人而以理義之心言之愚案一章功夫在思字一章功效在不失字思則得之得之即不失之謂也養心莫善於寡欲其為人也寡欲雖有不存焉者寡矣其為人也多欲雖有存焉者寡矣盡心下飢者甘食渴者甘飲是未得飲食之正也飢渴害之也豈惟口腹有飢渴之害人心亦皆有害人能無以飢渴之害為心害則不及人不為憂矣盡心上右因論理欲而以理義之心言之愚案一章言理欲相為勝負其要在寡欲二字一章言天理有人欲之害其要在無以為害四字飽食終日無所用心難矣哉不有博奕者乎為之猶賢乎已陽貨今有無名之指屈而不信非疾痛害事也如有能信之者則不逺秦楚之路為指之不若人也指不若人則知惡之心不若人則不知惡此之謂不知類也告子上山徑之蹊間介然用之而成路為間不用則茅塞之矣今茅塞子之心矣盡心下右因儆戒學者而以理義之心言之餘如失其本心人心有害放其良心放心不求皆是此類蓋惰者不能自强慾者不能自克此其所以為衆人也回也其心三月不違仁雍也右因稱許其仁而専以知覺之心言之勉齋黄氏曰心不違仁専以知覺言仁人心也合性與知覺言愚嘗以此推之凡以心與義理為一者合性與知覺言也以心與義理為二者専指知覺而言也仁義禮智根於心是合性與知覺言以仁存心以禮存心是専指知覺而言心不在焉専指知覺言心正而後身修合性與知覺言孟子之不動心合性與知覺而言也告子先我不動心専指知覺而言也推此類可見嘗有部使者案事於番問準軒吳先生論聖言心凡幾處亦有異同如何先生應言曰簡在帝心天之心也從心所欲不踰矩聖人之心也其心三月不違仁亞聖大賢之心也飽食終日無所用心衆人之心也使者愕然歎服身欲修其身者先正其心大學經一章右對心意而言之愚案修身先正其心是反而推之身與心對心正而後身修是順而達之心與身對内外不同分而言之者也壹是皆以修身為本大學經一章所謂齊其家在修其身者大學傳八章修身以道修道以仁仁者人也親親為大義者宜也尊賢為大親親之殺尊賢之等禮所生也故君子不可以不修身思修身不可以不事親思事親不可以不知人思知人不可以不知天齊明盛服非禮不動所以修身也並中庸二十章誠身有道不明乎善不誠乎身矣中庸二十章又離婁上守孰為大守身為大離婁上拱把之桐梓人苟欲生之皆知所以養之者至於身而不知所以養之者豈愛身不若桐梓哉弗思甚也告子上右包内外而言之愚案此以身言而心在其中然主乎理義而言曰養身主乎徳行而言曰守身主乎天理之實而言曰誠身主乎事理之正而言曰修身正心者修身之先務事親者修身之大節持敬者修身之要法體道者修身之實事又心以其所主宰者言敬以其所持養者言道以其所踐履者言之所親愛五者以其所應接者言人之於身也兼所愛兼所愛則兼所養也無尺寸之膚不愛焉則無尺寸之膚不養也所以考其善不善者豈有他哉於己取之而已矣體有貴賤有小大無以小害大無以賤害貴養其小者為小人養其大者為大人今有場師舍其梧檟養其樲棘則為賤場師焉養其一指而失其肩背而不知也則為狼疾人也飲食之人則人賤之矣為其養小以失大也飲食之人無有失也則口腹豈適為尺寸之膚哉告子上志附志氣三軍可奪帥也匹夫不可奪志也子罕王子墊問曰士何事孟子曰尚志曰何謂尚志曰仁義而已矣殺一無罪非仁也非其有而取之非義也居惡在仁是也路惡在義是也居仁由義大人之事備矣盡心上右専主乎志而言之愚謂孔子汎為學者言人不可以不尚志也孟子専為王子言為士者但當尚志也夫志氣之帥也氣體之充也夫志至焉氣次焉故曰持其志無暴其氣公孫丒上右兼主志氣而言之苟志於仁矣無惡也里仁士志於道而耻惡衣惡食者未足與議也里仁右専主一事而言之愚謂己上志字與志於學志於道父在觀其志隠居求志専心致志等為一類語勢皆重當以趨向期必言如以意逆志大畏民志又當為一類語勢稍輕但當以意之所在言顔淵季路侍子曰盍各言爾志子路曰願車馬衣輕裘與朋友共敝之而無憾顔淵曰願無伐善無施勞子路曰願聞子之志子曰老者安之朋友信之少者懐之公冶子路曽晳冉有公西華侍坐子曰以吾一日長乎爾毋吾以也居則曰不吾知也如或知爾則何以哉子路率爾而對曰千乗之國攝乎大國之間加之以師旅因之以饑饉由也為之比及三年可使有勇且知方也夫子哂之求爾何如對曰方六七十如五六十求也為之比及三年可使足民如其禮樂以俟君子赤爾何如對曰非曰能之願學焉宗廟之事如㑹同端章甫願為小相焉㸃爾何如鼓瑟希鏗爾舍瑟而作對曰異乎三子者之撰子曰何傷乎亦各言其志也曰莫春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸夫子喟然嘆曰吾與㸃也三子者出曽晳後曽晳曰夫三子者之言何如子曰亦各言其志也已矣曰夫子何哂由也曰為國以禮其言不讓是故哂之唯求則非邦也與安見方六七十如五六十而非邦也者唯赤則非邦也與宗廟㑹同非諸侯而何赤也為之小孰能為之大先進右即其所志而言之又見孔門弟子愚案此皆聖賢自言其志如此若伊尹之志是後賢追論其志如彼伊尹顔淵有隠顯不同而尹之志則顔所能為由求赤視顔氣象差小而所言皆其能事意欲正其心者先誠其意大學經一章右統以心之所發而言毋意毋必毋固毋我子罕右専以私心之發而言思心之官則思思則得之不思則不得也告子上周公思兼三王以施四事其有不合者仰而思之夜以繼日幸而得之坐以待旦離婁下君子有九思視思明聽思聰色思温貌思恭言思忠事思敬疑思問忿思難見得思義季氏唐棣之華偏其反而豈不爾思室是逺而子曰未之思也夫何逺之有子罕有弗思思之弗得弗措也中庸二十章學而不思則㒺思而不學則殆為政右以理言正言之也餘如思誠近思思無邪之類皆是吾嘗終日不食終夜不寢以思無益不如學也衛靈公右以理言有為而言之也季文子三思而後行子聞之曰再斯可矣公冶君子思不出其位憲問右以事言餘如不曰如之何如之何一章亦主乎臨事之思而言也但再斯可矣是思不可過吾末如之何是思不可不熟一則因文子三思而言一則為世之率意妄行者而言二章皆所以示戒也情附性情惻隠之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也公孫丑上惻隠之心仁也羞惡之心義也恭敬之心禮也是非之心智也告子上右専指其發於理者言之愚謂此與乃若其情豈人之情為一類即所謂道心者也身有所忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正大學傳七章喜怒哀樂之未發謂之中發而皆中節謂之和中庸一章右兼指其發於氣者言之愚案指人心之體用而言之曰性情即性情之徳而形容之曰中和耻人不可以無耻無耻之耻無耻矣耻之於人大矣並盡心下右自其固有之心而言愚謂無耻之耻則無耻所以勸也不耻不若人則不若人所以戒也二章正相表裏巧言令色足恭左丘明耻之丘亦耻之匿怨而友其人左丘明耻之丘亦耻之公冶憲問耻子曰邦有道榖邦無道榖耻也憲問邦有道貧且賤焉耻也邦無道富且貴焉耻也泰伯右即其可耻之事而言已上皆以道心言如耻惡衣惡食之耻則又人心之私也故衣敝緼袍而不耻乃所以為賢非所以為病也樂飯䟽食飲水曲肱而枕之樂亦在其中矣不義而富且貴於我如浮雲述而賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也雍也右自其固有之樂而言愚謂孔子渾然天理而無所不樂顔子克己之私而自有可樂所謂貧而樂者以此也又案貧而樂理之足以勝夫私也中天下而立定四海之民君子樂之者仁之可以廣其愛也富貴貧賤雖不同君子之樂無往而不在也君子有三樂而王天下不與存焉父母俱存兄弟無故一樂也仰不愧於天俯不怍於人二樂也得天下英才而教育之三樂也君子有三樂而王天下不與存焉反身而誠樂莫大焉並盡心上樂之實樂斯二者樂則生矣生則烏可已也離婁上有朋自逺方來不亦樂乎學而中天下而立定四海之民君子樂之盡心上右即其可樂之事而言愚謂君子之樂不同有天倫之樂有及人之樂有盡己之性而自謙以為樂是皆本乎道心之正也又案孟子告時君以與民同樂者凡三章此又樂之出於人心者也見君道類好惡惟仁者能好人能惡人里仁此謂惟仁人為能愛人能惡人大學傳十章惡紫之奪朱也惡鄭聲之亂雅樂也惡利口之覆邦家者君子亦有惡乎子曰有惡惡稱人之惡者惡居下流而訕上者惡勇而無禮者惡果敢而窒者曰賜也亦有惡乎惡徼以為知者惡不孫以為勇者惡訐以為直者並陽貨惡似而非者惡莠恐其亂苗也惡佞恐其亂義也惡利口恐其亂信也惡鄭聲恐其亂樂也惡紫恐其亂朱也惡鄉原恐其亂徳也盡心下民之所好好之民之所惡惡之大學傳十章右主乎正理而言之愚謂聖賢之好惡大抵好君子而惡小人此其所以為正也大學治國平天下章每反覆於好惡公私之間蓋以天下之治亂决於好惡之當否君子於此可不謹哉好勇疾貧亂也人而不仁疾之已甚亂也泰伯好人之所惡惡人之所好大學傳十章右即其私意而言之愚謂惡不仁之人本得好惡之正然疾之已甚則是惡之無節而流於不正矣又案不能去之而疾之已甚則致亂之由也力能去之則逬諸四夷不與同中國是除亂之本也此論語大學之言所以並行而不相悖與剛附强吾未見剛者或對曰申棖子曰棖也慾焉得剛公冶故君子和而不流强哉矯中立而不倚强哉矯國有道不變塞焉强哉矯國無道至死不變强哉矯中庸十章右主乎理義而言之餘如至大至剛發强剛毅雖柔必强皆是此類但吾未見剛與强哉矯以徳行言發强剛毅以徳性言至大至剛以浩氣體段言雖柔必强以學問功效言又如夫子言好剛不好學是亦以徳言之但不好學則有其蔽此正理義血氣之幾也剛毅木訥近仁子路右主乎氣質而言之南方之强與北方之强與中庸十章右兼氣稟習俗而言之愚謂南方之强近乎理義北方之强純是血氣勇知仁勇三者天下之達徳也中庸二十章昔者曽子謂子襄曰子好勇乎吾嘗聞大勇於夫子矣自反而不縮雖褐寛博吾不惴焉自反而縮雖千萬人吾往矣公孫丑上右理義之勇餘如仁者有勇勇者不懼知耻近乎勇見義不為無勇皆是此類而夫子之言何憂何懼曽子之言任重道逺孟子之言不動心文武之一怒而安天下皆理義之勇也君子尚勇乎子曰君子義以為上君子有勇而無義為亂小人有勇而無義為盗陽貨由也好勇過我無所取材公冶王請無好小勇夫撫劍疾視曰彼惡敢當我哉此匹夫之勇敵一人者也梁恵王下北宫黝之養勇也不膚撓不目逃思以一毫挫於人若撻之於市朝不受於褐寛博亦不受於萬乗之君視刺萬乗之君若刺褐夫無嚴諸侯惡聲至必反之孟施舍之所養勇也曰視不勝猶勝也量敵而後進慮勝而後㑹是畏三軍者也舍豈能為必勝哉能無懼而已矣公孫丑上右血氣之勇餘如好勇疾貧勇者不必有仁及勇而無禮者不孫以為勇者皆是此類而告子先我不動心亦血氣之勇也又案夫子之言勇而無禮則亂又言好勇不好學其蔽也亂是又可見理義血氣之幾在此非學以明之禮以節之則理義之勇亦流而為血氣之勇也若卞莊子之勇而文之以禮樂則血氣又可使為理義之歸矣道天命之謂性率性之謂道修道之謂教道也者不可須臾離也可離非道也是故君子戒慎乎其所不睹恐懼乎其所不聞莫見乎隠莫顯乎微故君子慎其獨也喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也致中和天地位焉萬物育焉中庸一章大哉聖人之道洋洋乎發育萬物峻極於天優優大哉禮儀三百威儀三千待其人而後行故曰苟不至徳至道不凝焉故君子尊徳性而道問學致廣大而盡精微極髙明而道中庸温故而知新敦厚以崇禮是故居上不驕為下不倍國有道其言足以興國無道其黙足以容詩曰既明且哲以保其身其此之謂與中庸二十七章右舉其全體而兼功夫效驗言之愚案率性謂道是兼人物言故推原其本大哉聖人之道是就聖人而言故贊美其大體道之極則位育之功無不臻其妙道無不體則身之所處無不適其宜又案戒懼慎獨是動静兼致其功而於道之體用無不盡也尊徳性道問學是明誠兼致其功而於道之大小無不凝也孔子登東山而小魯登泰山而小天下故觀於海者難為水遊於聖人之門者難為言觀水有術必觀其瀾日月有明容光必照焉流水之為物也不盈科不行君子之志於道也不成章不達盡心上右舉其本體而以用功之道言之愚案此章不成章不達是進道必以其序中庸行逺自邇登髙自卑及孟子身不行道不行於妻子皆是行道必以其序進道不以序則必躐等而陵節行道不以序或至倒行而逆施斯所以貴乎有序也道則髙矣美矣宜若登天然似不可及也何不使彼為可㡬及而日孳孳也孟子曰大匠不為拙工改廢繩墨羿不為拙射變其彀率君子引而不發躍如也中道而立能者從之盡心上右即其定體而以施敎之道言之人能𢎞道非道𢎞人衞靈公右自其本體無為而言之道不逺人人之為道而逺人不可以為道詩云伐柯伐柯其則不逺執柯以伐柯睨而視之猶以為逺故君子以人治人改而止忠恕違道不逺施諸已而不願亦勿施於人君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也庸徳之行庸言之謹有所不足不敢不勉有餘不敢盡言顧行行顧言君子胡不慥慥爾中庸十三章道在爾而求諸逺事在易而求諸難人人親其親長其長而天下平離婁上右自其易知易能而言之愚謂中庸所言是率性之道故始責於人而終責於己孟子所言是修道之教故始言其理終言其效君子之道費而隠夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉天地之大也人猶有所憾故君子語大天下莫能載焉語小天下莫能破焉詩云鳶飛戾天魚躍于淵言其上下察也君子之道造端乎夫婦及其至也察乎天地中庸十二章右自其發見昭著而言之愚案中庸首章道不可離以下専以道之在己者言此章費而隠以下兼以道之在萬物者言費而隠即是率性之道率性之道是費天命之性是隠子在川上曰逝者如斯夫不舍晝夜子罕右自其流行無間而言之參乎吾道一以貫之曽子曰唯子出門人問曰何謂也曽子曰夫子之道忠恕而已矣里仁右兼舉體用而言之愚案夫子之道忠恕而已是明其所以為體用也堯舜之道孝弟而已是即其一事以教人也堯舜之道不外乎孝弟夫子之道則因忠恕而可見也君子道者三我無能焉仁者不憂知者不惑勇者不懼子貢曰夫子自道也憲問君子所貴乎道者三動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣籩豆之事則有司存泰伯君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也中庸十三章右舉其節目而言之愚謂此皆自體道之中舉其節目而言之仁知勇是成徳之大目子臣弟友是盡倫之大目動容貌以下是修身出治之大目若子産有君子之道四則是於萬殊之中有此四者而已未可與體道君子同日語也朝聞道夕死可矣里仁誰能出不由户何莫由斯道也雍也道其不行矣夫中庸五章右通為衆人而言之愚謂朝聞夕死主乎知何莫由斯主乎行若道其不行之歎則所言者雖在乎行而所言之意則重在乎知也士志於道而耻惡衣惡食者未足與議也里仁行之而不著焉習矣而不察焉終身由之而不知其道者衆也盡心上右専為學者而言之愚謂士志於道章重在行行之不著章重在知未足與議是役於外之過終身不知是蔽於内之過二章皆為學者之戒也又人皆可為堯舜一章正為學者言之豈人所不能哉貴乎行也豈難知哉貴乎知也此兼知行而言者也道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也人莫不飲食也鮮能知味也中庸四章右専自過不及者而言之已上皆専以當行之路言之已上皆聖賢論道如此若五者天下之達道是以人倫為達道和者天下之達道是以情之正者為達道此又各有所主而言非正論道之所以為道也然就二達道言之則五者達道又不離和者達道之中苟能致和則經綸大經即此而在矣又如孔子之言性與天道孟子言聖人之於天道天道乃天理自然之本體此正道之來歴根源與率性之道相貫然一自造化而言一自人事而言固不可以不辨也道不同不相為謀衞靈公道二仁與不仁而已矣離婁上君子之道闇然而日章小人之道的然而日亡中庸末章右通以所由之路言之愚謂君子小人是非邪正皆以道言蓋趨向不同而各有所由之路也韓子言道與徳為虚位意謂道之為道可以通乎善惡而言之其說頗與聖賢之意相合餘如訓由訓行訓言者易辨此不具孝弟又見人倫類仁之實事親是也義之實從兄是也智之實知斯二者弗去是也禮之實節文斯二者是也樂之實樂斯二者樂則生矣生則惡可已也惡可已則不知足之蹈之手之舞之離婁上人之所不學而能者其良能也所不慮而知者其良知也孩提之童無不知愛其親也及其長也無不知敬其兄也親親仁也敬長義也無他達之天下也盡心上右以天性言愚謂自良心所𤼵而言則仁義之道莫先乎事親從兄也自人心所同而言則仁義之道正在於親親敬長也又案一章言仁義之實為道之根本而智禮樂在其中故悉言之使人於斯二者知所勉也一章言親親敬長之心出於同然而即所以為仁義之道故極言之使人信之而不疑也其為人也孝弟而好犯上者鮮矣不好犯上而好作亂者未之有也君子務本本立而道生孝弟也者其為仁之本與學而右以徳行言愚謂自推行仁道而言則孝弟皆是愛親故為為仁之本自良心之發見而言則仁主乎愛義主乎敬故為仁義之實況有子止言仁仁足以兼乎義也吾友汪國用曰有子言務本是用功即孟子智禮之實也其言本立是成功即孟子樂之實也但孟子専主事親從兄而言有子則言孝弟可以推之於仁民愛物其意有不同耳曽子有疾召門弟子曰啓予足啓予手詩云戰戰兢兢如臨深淵如履薄氷而今而後吾知免夫小子泰伯順乎親有道反諸身不誠不順乎親矣中庸二十章事孰為大事親為大守孰為大守身為大不失其身而能事其親者吾聞之矣失其身而能事其親者吾未之聞也離婁上右以事親之大節言之愚謂保其身者即所以事其親此孝之大者也誠身守身而後能事其親此欲盡其孝者之先務也誠身守身兼徳行言啓手足専以親之遺體言父在觀其志父没觀其行三年無改於父之道可謂孝矣學而事父母幾諌見志不從又敬不違勞而不怨父母在不逺遊遊必有方父母之年不可不知也一則以喜一則以懼並里仁養生者不足以當大事惟送死可以當大事離婁下右以事親之一節言之孟懿子問孝子曰無違樊遲御子告之曰孟孫問孝於我我對曰無違樊遲曰何謂也子曰生事之以禮死𦵏之以禮祭之以禮孟武伯問孝子曰父母唯其疾之憂子游問孝子曰今之孝者是謂能養至於犬馬皆能有養不敬何以别乎子夏問孝子曰色難有事弟子服其勞有酒食先生饌曾是以為孝乎並為政徐行後長者謂之弟疾行先長者謂之不弟夫徐行者豈人所不能哉所不為也堯舜之道孝弟而已矣告子下右各因其人而言之天下大悅而將歸已視天下悅而歸已猶草芥也惟舜為然不得乎親不可以為人不順乎親不可以為子舜盡事親之道而瞽瞍底豫瞽瞍㡳豫而天下化瞽瞍㡳豫而天下之為父子者定此之謂大孝離婁上大孝終身慕父母五十而慕者子於大舜見之矣孝子之至莫大乎尊親尊親之至莫大乎以天下養為天子父尊之至也以天下養養之至也詩曰永言孝思孝思維則此之謂也並萬章上舜其至孝矣五十而慕告子下武王周公其達孝矣乎夫孝者善繼人之志善述人之事者也踐其位行其禮奏其樂敬其所尊愛其所親事死如事生事亡如事存孝之至也並中庸十九章右據其事實而贊美之已下皆述聖賢之孝饒子曰舜之孝是充極一家者也武周之孝是放乎四海者也愚謂大孝至孝達孝不同以其不可名言謂之大孝無以復加謂之至孝天下稱之無異辭謂之達孝然至孝二字武周猶得而有之大孝二字獨以稱大舜也然則謂之大孝則至孝達孝有不必言者其輕重之等豈不可以槩見乎舜其大孝也與徳為聖人尊為天子富有四海之内宗廟饗之子孫保之故大徳必得其位必得其禄必得其名必得其夀故天之生物必因其材而篤焉故栽者培之傾者覆之詩曰嘉樂君子憲憲令徳冝民冝人受禄于天保佑命之自天申之故大徳者必受命中庸十七章右即其效驗而贊美之愚謂得其位禄名夀是驗諸天瞽瞍底豫而天下化是驗諸人曽子養曽晳必有酒肉將徹必請所與問有餘必曰有曽晳死曽元養曽子必有酒肉將徹不請所與問有餘曰亡矣將以復進也此所謂養口體者也若曽子則可謂養志也事親若曽子者可也離婁上曽晳嗜羊棗而曽子不忍食羊棗公孫丑問曰膾炙與羊棗孰美孟子曰膾炙哉公孫丑曰然則曽子何為食膾炙而不食羊棗曰膾炙所同也羊棗所獨也諱名不諱姓姓所同也名所獨也盡心下右據其事實而追論之愚聞之先君子曰曽子之孝見於論孟者凡三章養曾晳見其順親志啓手足見其重遺體養志是生能致其養不食羊棗是没能盡其思孝哉閔子騫人不閒於其父母昆弟之言先進右即其孚於人者而稱之愚謂見稱於天下為武周之孝見稱於衆人為子騫之孝見稱於宗族為士之次者之孝徳行有大小故其孚於人者有廣狹也孟莊子之孝也其他可能也其不改父之臣與父之政是難能也子張右因其一節而稱之忠恕夫子之道忠恕而已矣里仁右聖人忠恕愚聞之從兄文炳曰一貫忠恕體用而已矣曾子於此著明之而於大學尤推廣之修身以上所以體此忠也一之所以為體也齊家以下所以行此恕也貫之所以為用也此一貫忠恕為聖賢相傳之心法也忠恕違道不逺施諸己而不願亦勿施於人中庸十三章右學者忠恕恕有一言而可以終身行之者乎子曰其恕乎己所不欲勿施於人衞靈公强恕而行求仁莫近焉盡心上右愛人之恕餘如孔子告子貢以能近取譬告仲弓以不欲勿施皆是此類此所謂恕以及人為主蓋曰如愛己之心以愛人也大學之絜矩亦當以愛人之恕言之君子有諸己而后求諸人無諸己而后非諸人所藏乎身不恕而能喻諸人者未之有也大學傳九章右治人之恕愚案此所謂恕是治人以自治為主蓋曰如責己之心以責人也若中庸以人治人是治人以盡人道為主蓋以當人之道責其人也又如所求乎子臣弟友一節亦有諸己求諸人之意然大學則如責己之心以責人中庸則反以責人之心而責己此其所以不同者然推其㫖意則皆恕之事也忠信子以四教文行忠信述而仁義忠信樂善不倦此天爵也告子上君子有大道必忠信以得之大學傳十章右舉其全體而言餘如孔子之言主忠信孟子之言孝弟忠信皆是此類但主忠信以學言文行忠信以教言仁義忠信孝弟忠信及忠信得之皆兼徳行言為人謀而不忠乎與朋友交而不信乎學而右主乎一事而言餘如夫子以言忠信告子張亦是此類但夫子是専主於言而言之曽子是分主言行而言之十室之邑必有忠信如丘者焉公冶聖惟天下至聖為能聰明睿知足以有臨也寛裕温柔足以有容也發强剛毅足以有執也齊莊中正足以有敬也文理密察足以有别也溥博淵泉而時出之溥博如天淵泉如淵見而民莫不敬言而民莫不信行而民莫不恱是以聲名洋溢乎中國施及蠻貊舟車所至人力所通天之所覆地之所載日月所照霜露所隊凡有血氣者莫不尊親故曰配天中庸三十一章昔者子貢問於孔子曰夫子聖矣乎孔子曰聖則吾不能我學不厭而教不倦也子貢曰學不厭智也教不倦仁也仁且智夫子旣聖矣公孫丑上大而化之之謂聖盡心下右以全體至極言亦曰専言之者饒子曰生知安行是性之之聖大而化之是反之之聖愚謂凡言資質徳性與衆人異者此說性之之聖也自學力推之以至其極者此說反之之聖也孔子以性之之聖而加反之之功斯所以為聖之至與非其君不事非其民不使治則進亂則退伯夷也何事非君何使非民治亦進亂亦進伊尹也可以仕則仕可以止則止可以久則久可以速則速孔子也皆古聖人也吾未能有行焉乃所願則學孔子也公孫丑上伯夷聖之清者也伊尹聖之任者也栁下恵聖之和者也孔子聖之時者也孔子之謂集大成集大成也者金聲而玉振之也金聲也者始條理也玉振之也者終條理也始條理者智之事也終條理者聖之事也智譬則巧也聖譬則力也由射於百歩之外也其至爾力也其中非爾力也萬章下右以徳行造極言愚案孔子之聖以全體言三子之聖以一節言又案孟子之贊孔子自其知行兼備而言故合智聖而為聖子貢之贊孔子自其體用兼備而言故合智仁而為聖聖人百世之師也伯夷栁下恵是也故聞伯夷之風者頑夫㢘懦夫有立志聞栁下恵之風者薄夫敦鄙夫寛奮乎百世之上百世之下聞者莫不興起也非聖人而能若是乎而况於親炙之者乎盡心下右以一偏造極言亦曰偏言之者餘如大學彦聖之聖亦以徳之一端言猶智仁聖義忠和之為六徳也四書通㫖卷二
