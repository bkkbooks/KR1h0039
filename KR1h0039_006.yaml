body:
  text: 欽定四庫全書四書通㫖卷六元朱公遷撰出處去就篤信好學守死善道危邦不入亂邦不居天下有道則見無道則隠邦有道貧且賤焉恥也邦無道富且貴焉恥也泰伯仕而優則學學而優則仕子張子使漆雕開仕對曰吾斯之未能信子說公冶長子路使子羔為費宰子曰賊夫人之子先進右明體用之學愚案孔子之言體用貴乎兼備子夏之言體用貴乎相資若漆雕開可以仕而未肯仕則夫子說其篤志子羔未可以仕而使之仕則夫子以謂賊夫人其輕重先後又如此用之則行舍之則藏惟我與爾有是夫子路曰子行三軍則誰與子曰暴虎馮河死而無悔者吾不與也必也臨事而懼好謀而成者也述而有美玉於斯韞匵而藏諸求善賈而沽諸子曰沽之哉沽之哉我待賈者也子罕憲問恥子曰邦有道榖邦無道榖恥也賢者辟世其次辟地其次辟色其次辟言並憲問古之君子何如則仕孟子曰所就三所去三迎之致敬以有禮言將行其言也則就之禮貌未衰言弗行也則去之其次雖未行其言也迎之致敬以有禮則就之禮貌衰則去之其下朝不食夕不食飢餓不能出門戸君聞之曰吾大者不能行其道又不能從其言也使飢餓於我土地吾恥之周之亦可受也免死而已矣告子下右明處物之義愚謂用行舍藏待賈而沽三就三去皆以彼己遇合言賢者辟世以下及答原憲之語皆兼時勢可否言色斯舉矣翔而後集鄉黨無罪而殺士則大夫可以去無罪而戮民則士可以徙離婁下右明見㡬之智天下有道以道殉身天下無道以身殉道未聞以道殉乎人者也盡心上不見諸侯宜若小然今一見之大則以王小則以覇且志曰枉尺而直尋宜若可為也孟子曰昔齊景公田招虞人以旌不至將殺之志士不忘在溝壑勇士不忘喪其元孔子奚取焉取非其招不徃也如不待其招而徃何哉且夫枉尺而直尋者以利言也如以利則枉尋直尺而利亦可為與昔者趙簡子使王良與嬖奚乗終日而不獲一禽嬖奚反命曰天下之賤工也或以告王良良曰請復之强而後可一朝而獲十禽嬖奚反命曰天下之良工也簡子曰我使掌與女乗謂王良良不可曰吾為之範我馳驅終日不獲一為之詭遇一朝而獲十詩云不失其馳舍矢如破我不貫與小人乗請辭御者且羞與射者比比而得禽獸雖若邱陵弗為也如枉道而從彼何也且子過矣枉己者未有能直人者也古之君子仕乎孟子曰仕傳曰孔子三月無君則皇皇如也出疆必載質公明儀曰古之人三月無君則弔三月無君則弔不以急乎曰士之失位也猶諸侯之失國家也禮曰諸侯耕助以供粢盛夫人蠶繅以為衣服犧牲不成粢盛不潔衣服不備不敢以祭惟士無田則亦不祭牲殺器皿衣服不備不敢以祭則不敢以宴亦不足弔乎出疆必載質何也曰士之仕也猶農夫之耕也農夫豈為出疆舍其耒耜哉曰晉國亦仕國也未甞聞仕如此其急仕如此其急也君子之難仕何也曰丈夫生而願為之有室女子生而願為之有家父母之心人皆有之不待父母之命媒妁之言鑽穴隙相窺踰牆相從則父母國人皆賤之古之人未甞不欲仕也又惡不由其道不由其道而徃者與鑽穴隙之類也並滕文公下男女授受不親禮與孟子曰禮也曰嫂溺則援之以手乎曰嫂溺不援是豺狼也男女授受不親禮也嫂溺援之以手者權也曰今天下溺矣夫子之不援何也曰天下溺援之以道嫂溺援之以手子欲手援天下乎離婁上公孫衍張儀豈不誠大丈夫哉一怒而諸侯懼安居而天下熄孟子曰是焉得為大丈夫乎子未學禮乎丈夫之冠也父命之女子之嫁也母命之徃送之門戒之曰徃之女家必敬必戒無違夫子以順為正者妾婦之道也居天下之廣居立天下之正位行天下之大道得志與民由之不得志獨行其道富貴不能淫貧賤不能移威武不能屈此之謂大丈夫滕文公下敢問不見諸侯何義也孟子曰在國曰市井之臣在野曰草莽之臣皆謂庶人庶人不傳質為臣不敢見於諸侯禮也萬章曰庶人召之役則徃役君欲見之召之則不徃見之何也曰徃役義也徃見不義也且君之欲見之也何為也哉曰為其多聞也為其賢也曰為其多聞也則天子不召師而况諸侯乎為其賢也則吾未聞欲見賢而召之也繆公亟見於子思曰古千乗之國以友士何如子思不悅曰古之人有言曰事之云乎豈曰友之云乎子思之不悅也豈不曰以位則子君也我臣也何敢與君友也以徳則子事我者也奚可以與我友千乗之君求與之友而不可得也而況可召與齊景公田招虞人以旌不至將殺之志士不忘在溝壑勇士不忘喪其元孔子奚取焉取非其招不徃也曰敢問招虞人何以曰以皮冠庶人以旃士以旂大夫以旌以大夫之招招虞人虞人死不敢徃以士之招招庶人庶人豈敢徃哉況乎以不賢人之招招賢人乎欲見賢人而不以其道猶欲其入而閉之門也夫義路也禮門也惟君子能由是路出入是門也詩云周道如底其直如矢君子所履小人所視萬章曰孔子君命召不俟駕而行然則孔子非與曰孔子當仕有官職而以其官召之也萬章下右明守正之義古之賢王好善而忘勢古之賢士何獨不然樂其道而忘人之勢故王公不致敬盡禮則不得亟見之見且猶不得亟而況得而臣之乎子好遊乎吾語子遊人知之亦囂囂人不知亦囂囂曰何如斯可以囂囂矣曰尊徳樂義則可以囂囂矣故士窮不失義達不離道窮不失義故士得已焉達不離道故民不失望焉古之人得志澤加於民不得志修身見於世窮則獨善其身達則兼善天下並盡心上右明内外輕重之分先名實者為人也後名實者自為也夫子在三卿之中名實未加於上下而去之仁者固如此乎孟子曰居下位不以賢事不肖者伯夷也五就湯五就桀者伊尹也不惡汙君不辭小官者栁下恵也三子者不同道其趨一也一者何也曰仁也君子亦仁而已矣何必同曰魯繆公之時公儀子為政子栁子思為臣魯之削也滋甚若是乎賢者之無益於國也曰虞不用百里奚而亡秦穆公用之而覇不用賢則亡削何可得與曰昔者王豹處於淇而河西善謳緜駒處於高唐而齊右善歌華周杞梁之妻善哭其夫而變國俗有諸内必形諸外為其事而無其功者髠未甞覩之也是故無賢者也有則髠必識之曰孔子為魯司寇不用從而祭燔肉不至不稅冕而行不知者以為為肉也其知者以為為無禮也乃孔子則欲以微罪行不欲為茍去君子之所為衆人固不識也告子下右明仁賢之心不見諸侯何義孟子曰古者不為臣不見段干木踰垣而辟之泄栁閉門而不内是皆已甚廹斯可以見矣陽貨欲見孔子而惡無禮大夫有賜於士不得受於其家則徃拜其門陽貨矙孔子之亡也而饋孔子蒸豚孔子亦矙其亡也而徃拜之當是時陽貨先豈得不見曽子曰脅肩諂笑病於夏畦子路曰未同而言觀其色赧赧然非由之所知也由是觀之則君子之所養可知已矣滕文公下右明中正之道仕非為貧也而有時乎為貧娶妻非為養也而有時乎為養為貧者辭尊居卑辭富居貧辭尊居卑辭富居貧惡乎宜乎抱關擊柝孔子甞為委吏矣曰會計當而已矣甞為乗田矣曰牛羊茁壯長而已矣位卑而言高罪也立乎人之本朝而道不行恥也萬章下右専言為貧而仕之義子奚不為政子曰書云孝乎惟孝友于兄弟施于有政是亦為政奚其為為政為政齊景公待孔子曰若季氏則吾不能以季孟之閒待之曰吾老矣不能用也孔子行齊人歸女樂季桓子受之三日不朝孔子行並微子衛靈公問陳於孔子孔子對曰爼豆之事則甞聞之矣軍旅之事未之學也明日遂行衛靈公季氏使閔子騫為費宰閔子騫曰善為我辭焉如有復我者則吾必在汶上矣雍也孟子去齊宿於晝有欲為王留行者坐而言不應隠几而卧客不悅曰弟子齊宿而後敢言夫子卧而不聽請勿復敢見矣曰坐我明語子昔者魯繆公無人乎子思之側則不能安子思泄栁申詳無人乎繆公之側則不能安其身子為長者慮而不及子思子絶長者乎長者絶子乎孟子去齊居休公孫丑問曰仕而不受禄古之道乎曰非也於崇吾得見王退而有去志不欲變故不受也繼而有師命不可以請久於齊非我志也並公孫丑齊饑陳臻曰國人皆以夫子將復為發棠殆不可復孟子曰是為馮婦也晉人有馮婦者善搏虎卒為善士則之野有衆逐虎虎負嵎莫之敢攖望見馮婦趨而迎之馮婦攘臂下車衆皆悅之其為士者笑之盡心下右聖賢見㡬之智愚謂此皆於智之中有制事之義若孔子去魯遲遲吾行與燔肉不至不稅冕而行則智之中有愛君之仁又案齊人歸女樂孔子行是孔子所以去之本意燔肉不至而孔子行則以明其用心之忠且厚也孔子之仕也非事道與曰事道也事道奚獵較也曰孔子先簿正祭器不以四方之食供簿正曰奚不去也曰為之兆也兆足以行矣而不行而後去是以未甞有所終三年淹也孔子有見行可之仕有際可之仕有公養之仕於季桓子見行可之仕也於衛靈公際可之仕也於衛孝公公養之仕也孔子之去齊接淅而行去魯曰遲遲吾行也去父母國之道也並萬章下禹稷當平世三過其門而不入孔子賢之顔子當亂世居於陋巷一簞食一瓢飲人不堪其憂顔子不改其樂孔子賢之孟子曰禹稷顔回同道禹思天下有溺者由已溺之也稷思天下有飢者由已飢之也是以如是其急也禹稷顔子易地則皆然今有同室之人鬭者救之雖被髮纓冠而救之可也鄉鄰有鬭者被髮纓冠而徃救之則惑也雖閉戸可也曽子子思易地則皆然並離婁下孟子謂蚳鼃曰子之辭靈丘而請士師似也為其可以言也今既數月矣未可以言與蚳鼃諫於王而不用致為臣而去齊人曰所以為蚳鼃則善矣所以自為則吾不知也公都子以告曰吾聞之也有官守者不得其職則去有言責者不得其言則去我無官守我無言責也則吾進退豈不綽綽然有餘裕哉公孫丑下右聖賢處物之義愚謂禹稷顔子以時位之顯晦言曽子之與子思孟子之視蚳鼃以地位之尊卑言孔子去齊去魯以勢分之親踈言行可際可公養之仕以遇合之淺深言公山弗擾以費畔召子欲徃子路不說曰末之也已何必公山氏之之也子曰夫召我者而豈徒哉如有用我者吾其為東周乎佛肸召子欲徃子路曰昔者由也聞諸夫子曰親於其身為不善者君子不入也佛肸以中牟畔子之徃也如之何子曰然有是言也不曰堅乎磨而不磷不曰白乎湼而不緇吾豈匏𤓰也哉焉能繫而不食並陽貨孟子去齊尹士語人曰不識王之不可以為湯武則是不明也識其不可然且至則是干澤也千里而見王不遇故去三宿而後出晝是何濡滯也士則兹不悅高子以告曰夫尹士惡知予哉千里而見王是予所欲也不遇故去豈予所欲哉予不得已也予三宿而出晝於予心猶以為速王庶㡬改之王如改諸則必反予夫出晝而王不予追也予然後浩然有歸志予雖然豈舍王哉王猶足用為善王如用予則豈徒齊民安天下之民舉安王庶㡬改之予日望之予豈若是小丈夫然哉諫於其君而不受則怒悻悻然見於其面去則窮日之力而後宿哉尹士聞之曰士誠小人也公孫丑下右聖賢行道之心愚謂此皆聖賢不忘天下之仁心也然孔子之不果去則仁之中有智存焉孟子之不果留則仁之中有義存焉苟有用我者朞月而已可也三年有成子路道不行乗桴浮於海從我者其由與子路聞之喜子曰由也好勇過我無所取材公冶長子欲居九夷或曰陋如之何子曰君子居之何陋之有子罕子在陳曰歸與歸與吾黨之小子狂簡斐然成章不知所以裁之公冶長甚矣吾衰也久矣吾不復夢見周公述而鳳鳥不至河不出圖吾已矣夫子罕右聖人歎道不行之辭儀封人請見曰君子之至於斯也吾未甞不得見也從者見之出曰二三子何患於喪乎天下之無道也久矣天將以夫子為木鐸八佾公伯寮愬子路於季孫子服景伯以告曰夫子固有惑志於公伯寮吾力猶能肆諸市朝子曰道之將行也與命也道之將廢也與命也公伯寮其如命何憲問孟子去齊充虞路問曰夫子若有不豫色然前日虞聞諸夫子曰君子不怨天不尤人曰彼一時此一時也五百年必有王者興其間必有名世者由周而來七百有餘歳矣以其數則過矣以其時考之則可矣夫天未欲平治天下也如欲平治天下當今之世舍我其誰也吾何為不豫哉公孫丑下魯平公將出嬖人臧倉者請曰他日君出則必命有司所之今乗輿已駕矣有司未知所之敢請公曰將見孟子曰何哉君所為輕身以先於匹夫者以為賢乎禮義由賢者出而孟子之後喪踰前喪君無見焉公曰諾樂正子入見曰君奚為不見孟軻也曰或告寡人曰孟子之後喪踰前喪是以不徃見也曰何哉君所謂踰者前以士後以大夫前以三鼎而後以五鼎與曰否謂棺槨衣衾之美也曰非所謂踰也貧富不同也樂正子見孟子曰克告於君君為來見也嬖人有臧倉者沮君君是以不果來也曰行或使之止或尼之行止非人所能也吾之不遇魯侯天也臧氏之子焉能使予不遇哉梁惠王下右論出處而以天命決之愚謂聖賢蓋以天命曉人封人則以天意觀聖人者也又案此一類専以窮達言真氏以伯寮之愬臧倉之沮夫子莫我知之歎孟子何為不豫之語皆為安義命之事愚聞之叔父闕君曰不怨天不尤人為聖人自道之辭則可若以此論聖人則不可蓋不怨不尤不足以言聖人故也故充虞又聞於孟子是孟子甞以此教人而亦以此自居矣中庸又以歸之素位而行之君子其所謂君子蓋通聖賢而言者也叔父名可傳微子去之箕子為之奴比干諫而死孔子曰殷有三仁焉微子居下位不以賢事不肖者伯夷也五就湯五就桀者伊尹也不惡汙君不辭小官者栁下恵也三子者不同道其趨一也一者何也曰仁也告子下直哉史魚邦有道如矢邦無道如矢君子哉蘧伯玊邦有道則仕邦無道則可卷而懐之衛靈公寗武子邦有道則知邦無道則愚其知可及也其愚不可及也公冶長右論人出處而以德行稱之餘如孟子以清和任稱夷恵伊尹亦是此類人有言伊尹以割烹要湯有諸孟子曰否不然伊尹耕於有莘之野而樂堯舜之道焉非其義也非其道也禄之以天下弗顧也繫馬千駟弗視也非其義也非其道也一介不以與人一介不以取諸人湯使人以幣聘之囂囂然曰我何以湯之聘幣為哉我豈若處畎畆之中由是以樂堯舜之道哉湯三使徃聘之既而幡然改曰與我處畎畆之中由是以樂堯舜之道吾豈若使是君為堯舜之君哉吾豈若使是民為堯舜之民哉吾豈若於吾身親見之哉天之生此民也使先知覺後知使先覺覺後覺也予天民之先覺者也予將以斯道覺斯民也非予覺之而誰也思天下之民匹夫匹婦有不被堯舜之澤者若己推而内之溝中其自任以天下之重如此故就湯而說之以伐夏救民吾未聞枉己而正人者也況辱己以正天下者乎聖人之行不同也或逺或近或去或不去歸潔其身而已矣吾聞其以堯舜之道要湯未聞以割烹也伊訓曰天誅造攻自牧宫朕載自亳或曰百里奚自鬻於秦養牲者五羊之皮食牛以要秦穆公信乎孟子曰否不然好事者為之也百里奚虞人也晉人以垂棘之璧與屈産之乗假道於虞以伐虢宫之竒諫百里奚不諫知虞公之不可諫而去之秦年已七十矣曽不知以食牛干秦穆公之為汗也可謂智乎不可諫而不諫可謂不智乎知虞公之將亡而先去之不可謂不智也時舉於秦知穆公之可與有行也而相之可謂不智乎相秦而顯其君於天下可傳於後世不賢而能之乎自鬻以成其君鄉黨自好者不為而謂賢者為之乎並萬章上右論人出處而以事理明之愚謂伊尹得聖人之任孟子蓋已稱之百里奚於去就之際甚明其智亦有合於聖賢者故在所取焉然王者之師伯者之佐相去亦已逺矣若比寗武子可及之知則百里又當為優也伯夷非其君不事非其友不友不立於惡人之朝不與惡人言立於惡人之朝與惡人言如以朝衣朝冠坐於塗炭推惡惡之心思與鄉人立其冠不正望望然去之若將浼焉是故諸侯雖有善其辭命而至者不受也不受也者是亦不屑就已栁下恵不羞汙君不卑小官進不隠賢必以其道遺佚而不怨阨窮而不憫故曰爾為爾我為我雖袒裼裸裎於我側爾焉能浼我哉故由由然與之偕而不自失焉援而止之而止援而止之而止者是亦不屑去已孟子曰伯夷隘栁下恵不恭隘與不恭君子不由也公孫丑上右論人出處而以一偏之敝言之伯夷伊尹何如曰不同道非其君不事非其民不使治則進亂則退伯夷也何事非君何使非民治亦進亂亦進伊尹也可以仕則仕可以止則止可以久則久可以速則速孔子也皆古聖人也吾未能有行焉乃所願則學孔子也公孫丑上伯夷目不視惡色耳不聽惡聲非其君不事非其民不使治則進亂則退横政之所出横民之所止不忍居也思與鄉人處如以朝衣朝冠坐於塗炭也當紂之時居北海之濵以待天下之清也故聞伯夷之風者頑夫廉懦夫有立志伊尹曰何事非君何使非民治亦進亂亦進曰天之生斯民也使先知覺後知使先覺覺後覺予天民之先覺者也予將以此道覺此民也思天下之民匹夫匹婦有不與被堯舜之澤者若已推而内之溝中其自任以天下之重也栁下恵不羞汙君不辭小官進不隠賢必以其道遺佚而不怨阨窮而不憫與鄉人處由由然不忍去也爾為爾我為我雖袒裼裸裎於我側爾焉能浼我哉故聞栁下恵之風者鄙夫寬薄夫敦孔子之去齊接淅而行去魯曰遲遲吾行也去父母國之道也可以速而速可以久而久可以處而處可以仕而仕孔子也孟子曰伯夷聖之清者也伊尹聖之任者也栁下恵聖之和者也孔子聖之時者也孔子之謂集大成集大成也者金聲而玉振之也金聲也者始條理也玊振之也者終條理也始條理者智之事也終條理者聖之事也智譬則巧也聖譬則力也由射於百歩之外也其至爾力也其中非爾力也萬章下右論人出處而以聖人折𠂻之愚謂孔子之無所不可者由其有處物之義三子之各極其一偏者以其於義猶未精也作者七人矣子路宿於石門晨門曰奚自子路曰自孔氏曰是知其不可而為之者與並憲問楚狂接輿歌而過孔子曰鳳兮鳳兮何徳之衰徃者不可諫來者猶可追已而已而今之從政者殆而孔子下欲與之言趨而辟之不得與之言太師摯適齊亞飯干適楚三飯繚適蔡四飯缺適秦鼔方叔入於河播鼗武入於漢少師陽擊磬襄入於海並微子右記隠遯以明高世之行丘何為是栖栖者與無乃為佞乎孔子曰非敢為佞也疾固也子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎既而曰鄙哉硜硜乎莫己知也斯己而已矣深則厲淺則揭子曰果哉末之難矣並憲問長沮桀溺耦而耕孔子過之使子路問津焉長沮曰夫執輿者為誰子路曰為孔丘曰是魯孔丘與曰是也曰是知津矣問於桀溺桀溺曰子為誰曰為仲由曰是魯孔丘之徒與對曰然曰滔滔者天下皆是也而誰以易之且而與其從辟人之士也豈若從辟世之士哉耰而不輟子路行以告夫子憮然曰鳥獸不可與同羣吾非斯人之徒與而誰與天下有道丘不與易也子路從而後遇丈人以杖荷蓧子路問曰子見夫子乎丈人曰四體不勤五榖不分孰為夫子植其杖而芸子路拱而立止子路宿殺雞為黍而食之見其二子焉明日子路行以告子曰隠者也使子路反見之至則行矣子路曰不仕無義長幼之節不可廢也君臣之義如之何其廢之欲潔其身而亂大倫君子之仕也行其義也道之不行已知之矣逸民伯夷叔齊虞仲夷逸朱張栁下恵少連子曰不降其志不辱其身伯夷叔齊與謂栁下恵少連降志辱身矣言中倫行中慮其斯而已矣謂虞仲夷逸隠居放言身中清廢中權我則異於是無可無不可並微子右記隠遯而見聖人中庸之道治道又見君道王道子適衛冉有僕子曰庶矣哉冉有曰既庶矣又何加焉曰富之曰既富矣又何加焉曰教之子路右緫以為治之道言之亦曰為治之序所謂治國必先齊其家者其家不可教而能教人者無之故君子不出家而成教於國孝者所以事君也弟者所以事長也慈者所以使衆也康誥曰如保赤子心誠求之雖不中不逺矣未有學養子而后嫁者也一家仁一國興仁一家讓一國興讓一人貪戾一國作亂其機如此此謂一言僨事一人定國堯舜帥天下以仁而民從之桀紂帥天下以暴而民從之其所令反其所好而民不從是故君子有諸已而后求諸人無諸已而后非諸人所藏乎身不恕而能喻諸人者未之有也故治國在齊其家詩云桃之夭夭其葉蓁蓁之子于歸宜其家人宜其家人而后可以教國人詩云宜兄宜弟宜兄宜弟而后可以教國人詩云其儀不忒正是四國其為父子兄弟足法而后民法之也此謂治國在齊其家傳九章上老老而民興孝上長長而民興弟上恤孤而民不倍傳十章慎終追逺民徳歸厚矣學而君子篤於親則民興於仁故舊不遺則民不偷泰伯上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情子路上好禮則民易使也憲問君仁莫不仁君義莫不義離婁上右正以感化之機言之亦曰以教言季康子問使民敬忠以勸如之何子曰臨之以莊則敬孝慈則忠舉善而教不能則勸為政季康子患盜問於孔子孔子對曰苟子之不欲雖賞之不竊顔淵右因其人而以感化之機言之亦曰以教言為政以德譬如北辰居其所而衆星共之為政知及之仁不能守之雖得之必失之知及之仁能守之不莊以涖之則民不敬知及之仁能守之莊以涖之動之不以禮未善也衛靈公苟正其身矣於從政乎何有不能正其身如正人何子路能以禮讓為國乎何有不能以禮讓為國如禮何里仁右正論其所存者以出治之本言之已下皆以政言愚案為政以徳一章以本效相貫言重在徳字知及仁守一章以本末相資言重在仁字禮讓為國及苟正其身二章皆以得失相對言重在讓字與正字出治之本雖不同要皆本之吾身而已故舉徳之一字言則知仁莊禮禮讓在其中舉正身而言則所謂徳者又在其中若孟子言為政不難不得罪於巨室是亦主於正身而言之然不得罪於巨室之云乃當時為政之一道耳非以此為不易之常法也顔淵問為邦子曰行夏之時乗殷之輅服周之冕樂則韶舞放鄭聲逺佞人鄭聲淫佞人殆衛靈公子之武城聞弦歌之聲夫子莞爾而笑曰割雞焉用牛刀子游對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也子曰二三子偃之言是也前言戲之耳陽貨道在爾而求諸逺事在易而求諸難人人親其親長其長而天下平離婁上右正論其所施者以立治之本言之愚謂親親長長所謂道也禮者所以教人履此道樂者所以教人樂此道立治之本無他焉亦曰修道以為教耳政者正也子帥以正孰敢不正如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之徳風小人之徳草草上之風必偃並顔淵右因其人而論其所存者以出治之本言之亦曰以教言君君臣臣父父子子公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸顔淵衛君待子而為政子將奚先子曰必也正名乎子路曰有是哉子之迂也奚其正子曰野哉由也君子於其所不知蓋闕如也名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足故君子名之必可言也言之必可行也君子於其言無所苟而已矣子路右因其人而論其所施者以立治之本言之道千乗之國敬事而信節用而愛人使民以時學而雍也可使南面仲弓問子桑伯子子曰可也簡仲弓曰居敬而行簡以臨其民不亦可乎居簡而行簡無乃太簡乎子曰雍之言然雍也魯欲使樂正子為政孟子曰吾聞之喜而不寐公孫丑曰樂正子强乎曰否有知慮乎曰否多聞識乎曰否然則奚為喜而不寐曰其為人也好善好善足乎曰好善優於天下而況魯國乎夫茍好善則四海之内皆將輕千里而來告之以善夫茍不好善則人將曰訑訑予既已知之矣訑訑之聲音顔色距人於千里之外士止於千里之外則讒諂面諛之人至矣與讒諂面諛之人居國欲治可得乎告子下右正論其所存者以為治之要言之先有司赦小過舉賢才曰焉知賢才而舉之曰舉爾所知爾所不知人其舍諸子路足食足兵民信之矣子貢曰必不得已而去於斯三者何先曰去兵子貢曰必不得已而去於斯二者何先曰去食自古皆有死民無信不立顔淵右正論其所施者以為治之要言之愚案孔子論政皆言其常而去食去兵則言其變蓋子貢有不得已之問聖言所以處不得已之勢也居之無倦行之以忠顔淵先之勞之請益曰無倦子夏為莒父宰問政子曰無欲速無見小利欲速則不達見小利則大事不成並子路右因其人而論其所存者以為治之要言之近者說逺者來子路右以治功之次第言之亦曰致治之效子産聽鄭國之政以其乗輿濟人於溱洧孟子曰恵而不知為政歳十一月徒杠成十二月輿梁成民未病渉也君子平其政行辟人可也焉得人人而濟之故為政者每人而悅之日亦不足矣離婁下右以為治之大體言之尊五美屏四惡斯可以從政矣子張曰何謂五美子曰君子恵而不費勞而不怨欲而不貪泰而不驕威而不猛子張曰何謂恵而不費子曰因民之所利而利之斯不亦恵而不費乎擇可勞而勞之又誰怨欲仁而得仁又焉貪君子無衆寡無小大無敢慢斯不亦泰而不驕乎君子正其衣冠尊其瞻視儼然人望而畏之斯不亦威而不猛乎子張曰何謂四惡子曰不教而殺謂之虐不戒視成謂之暴慢令致期謂之賊猶之與人也出納之吝謂之有司堯曰所謂平天下在治其國者上老老而民興孝上長長而民興弟上恤孤而民不倍是以君子有絜矩之道也所惡於上毋以使下所惡於下毋以事上所惡於前毋以先後所惡於後毋以從前所惡於右毋以交於左所惡於左毋以交於右此之謂絜矩之道詩云樂只君子民之父母民之所好好之民之所惡惡之此之謂民之父母詩云節彼南山維石巖巖赫赫師尹民具爾瞻有國者不可以不慎辟則為天下僇矣詩云殷之未喪師克配上帝儀監於殷峻命不易道得衆則得國失衆則失國是故君子先慎乎徳有徳此有人有人此有土有土此有財有財此有用徳者本也財者末也外本内末爭民施奪是故財聚則民散財散則民聚是故言悖而出者亦悖而入貨悖而入者亦悖而出康誥曰惟命不于常道善則得之不善則失之矣楚書曰楚國無以為寶惟善以為寶舅犯曰亡人無以為寶仁親以為實秦誓曰若有一个臣斷斷兮無他技其心休休焉其如有容焉人之有技若己有之人之彦聖其心好之不啻若自其口出寔能容之以能保我子孫黎民尚亦有利哉人之有技媢疾以惡之人之彦聖而違之俾不通寔不能容以不能保我子孫黎民亦曰殆哉唯仁人放流之迸諸四夷不與同中國此謂唯仁人為能愛人能惡人見賢而不能舉舉而不能先命也見不善而不能退退而不能逺過也好人之所惡惡人之所好是謂拂人之性菑必逮夫身是故君子有大道必忠信以得之驕泰以失之生財有大道生之者衆食之者寡為之者疾用之者舒則財恒足矣仁者以財發身不仁者以身發財未有上好仁而下不好義者也未有好義其事不終者也未有府庫財非其財者也孟獻子曰畜馬乗不察於雞豚伐氷之家不畜牛羊百乗之家不畜聚斂之臣與其有聚斂之臣寧有盜臣此謂國不以利為利以義為利也長國家而務財用者必自小人矣彼為善之小人之使為國家菑害竝至雖有善者亦無如之何矣此謂國不以利為利以義為利也傳十章哀公問政子曰文武之政布在方䇿其人存則其政舉其人亡則其政息人道敏政地道敏樹夫政也者蒲盧也故為政在人取人以身修身以道修道以仁仁者人也親親為大義者宜也尊賢為大親親之殺尊賢之等禮所生也故君子不可以不修身思修身不可以不事親思事親不可以不知人思知人不可以不知天天下之達道五所以行之者三曰君臣也父子也夫婦也昆弟也朋友之交也五者天下之達道也知仁勇三者天下之達徳也所以行之者一也或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉强而行之及其成功一也子曰好學近乎知力行近乎仁知恥近乎勇知斯三者則知所以修身知所以修身則知所以治人知所以治人則知所以治天下國家矣凡為天下國家有九經曰修身也尊賢也親親也敬大臣也體羣臣也子庶民也來百工也柔逺人也懐諸侯也修身則道立尊賢則不惑親親則諸父昆弟不怨敬大臣則不眩體羣臣則士之報禮重子庶民則百姓勸來百工則財用足柔逺人則四方歸之懐諸侯則天下畏之齊明盛服非禮不動所以修身也去讒逺色賤貨而貴徳所以勸賢也尊其位重其禄同其好惡所以勸親親也官盛任使所以勸大臣也忠信重禄所以勸士也時使薄斂所以勸百姓也日省月試既稟稱事所以勸百工也送徃迎來嘉善而矜不能所以柔逺人也繼絶世舉廢國治亂持危朝聘以時厚徃而薄來所以懐諸侯也凡為天下國家有九經所以行之者一也凡事豫則立不豫則廢言前定則不跲事前定則不困行前定則不疚道前定則不窮在下位不獲乎上民不可得而治矣獲乎上有道不信乎朋友不獲乎上矣信乎朋友有道不順乎親不信乎朋友矣順乎親有道反諸身不誠不順乎親矣誠身有道不明乎善不誠乎身矣誠者天之道也誠之者人之道也誠者不勉而中不思而得從容中道聖人也誠之者擇善而固執之者也博學之審問之慎思之明辨之篤行之有弗學學之弗能弗措也有弗問問之弗知弗措也有弗思思之弗得弗措也有弗辨辨之弗明弗措也有弗行行之弗篤弗措也人一能之已百之人十能之已千之果能此道矣雖愚必明雖柔必强中庸二十章右合身心政事所存所施而詳言之愚案大學所言其要在絜矩中庸所言其要在誠身孔子所以告子張者主於正身愛物則仁之與敬乃其本與道之以政齊之以刑民免而無恥道之以徳齊之以禮有恥且格為政仁言不如仁聲之入人深也善政不如善教之得民也善政民畏之善教民愛之善政得民財善教得民心盡心上右以政教淺深之效言之苟有用我者朞月而已可也三年有成如有王者必世而後仁善人為邦百年亦可以勝殘去殺矣善人教民七年亦可以即戎矣並子路右以政成遲速之效言之饒子曰朞月而紀綱布三年而政化行一世而教化浹此是聖人作為久近之效七年而可即戎比之三年有勇知方者有閒百年而可勝殘去殺比之必世後仁者逺甚此是善人作為久近之效愚謂三年有勇知方是勇於義者作為之效三年而可足民是多才能者作為之效五年七年而為政於天下是師文王者作為之效皆非善人之可能也集注以謂教之孝弟忠信之行務農講武之法則所以富之者固在教之之中矣湯放桀武王伐紂有諸孟子對曰於傳有之曰臣弑其君可乎曰賊仁者謂之賊賊義者謂之殘殘賊之人謂之一夫聞誅一夫紂矣未聞弑君也梁恵王下盡信書則不如無書吾於武城取二三䇿而已矣仁人無敵於天下以至仁伐至不仁而何其血之流杵也有人曰我善為陳我善為戰大罪也國君好仁天下無敵焉南面而征北狄怨東面而征西夷怨曰奚為後我武王之伐殷也革車三百兩虎賁三千人王曰無畏寧爾也非敵百姓也若崩厥角稽首征之為言正也各欲正己也焉用戰並盡心下齊人伐燕勝之宣王問曰或謂寡人勿取或謂寡人取之以萬乗之國伐萬乗之國五旬而舉之人力不至於此不取必有天殃取之何如孟子對曰取之而燕民悅則取之古之人有行之者武王是也取之而燕民不悅則勿取古之人有行之者文王是也以萬乗之國伐萬乗之國簞食壺漿以迎王師豈有他哉避水火也如水益深如火益熱亦運而已矣齊人伐燕取之諸侯將謀救燕宣王曰諸侯多謀伐寡人者何以待之孟子對曰臣聞七十里為政於天下者湯是也未聞以千里畏人者也書曰湯一征自葛始天下信之東面而征西夷怨南面而征北狄怨曰奚為後我民望之若大旱之望雲霓也歸市者不止耕者不變誅其君而弔其民若時雨降民大悅書曰徯我后后來其蘇今燕虐其民王徃而征之民以為將拯已於水火之中也簞食壺漿以迎王師若殺其父兄係累其子弟毁其宗廟遷其重器如之何其可也天下固畏齊之强也今又倍地而不行仁政是動天下之兵也王速出令反其旄倪止其重器謀於燕衆置君而後去之則猶可及止也並梁恵王下沈同以其私問曰燕可伐與孟子曰可子噲不得與人燕子之不得受燕於子噲有仕於此而子悅之不告於王而私與之吾子之禄爵夫士也亦無王命而私受之於子則可乎何以異於是齊人伐燕或問曰勸齊伐燕有諸曰未也沈同問燕可伐與吾應之曰可彼然而伐之也彼如曰孰可以伐之則將應之曰為天吏則可以伐之今有殺人者或問之曰人可殺與則將應之曰可彼如曰孰可以殺之則將應之曰為士師則可以殺之今以燕伐燕何為勸之哉燕人畔王曰吾甚慙於孟子陳賈曰王無患焉王自以為與周公孰仁且智王曰惡是何言也曰周公使管叔監殷管叔以殷畔知而使之是不仁也不知而使之是不智也仁智周公未之盡也而況於王乎賈請見而解之見孟子問曰周公何人也曰古聖人也曰使管叔監殷管叔以殷畔也有諸曰然曰周公知其將畔而使之與曰不知也然則聖人且有過與曰周公弟也管叔兄也周公之過不亦宜乎且古之君子過則改之今之君子過則順之古之君子其過也如日月之食民皆見之及其更也民皆仰之今之君子豈徒順之又從為之辭公孫丑下宋小國也今將行王政齊楚惡而伐之則如之何孟子曰湯居亳與葛為鄰葛伯放而不祀湯使人問之曰何為不祀曰無以供犧牲也湯使遺之牛羊葛伯食之又不以祀湯又使人問之曰何為不祀曰無以供粢盛也湯使亳衆徃為之耕老弱饋食葛伯率其民要其有酒食黍稻者奪之不授者殺之有童子以黍肉餉殺而奪之書曰葛伯仇餉此之謂也為其殺是童子而征之四海之内皆曰非富天下也為匹夫匹婦復讎也湯始征自葛載十一征而無敵於天下東面而征西夷怨南面而征北狄怨曰奚為後我民之望之若大旱之望雨也歸市者弗止芸者不變誅其君弔其民如時雨降民大悅書曰徯我后后來其無罰有攸不為臣東征綏厥士女匪厥𤣥黄紹我周王見休惟臣附於大邑周其君子實𤣥黄于匪以迎其君子其小人簞食壺漿以迎其小人救民於水火之中取其殘而已矣大誓曰我武惟揚侵于之疆則取于殘殺伐用張于湯有光不行王政云爾苟行王政四海之内皆舉首而望之欲以為君齊楚雖大何畏焉滕文公下季氏將伐顓臾冉有季路見於孔子曰季氏將有事於顓臾孔子曰求無乃爾是過與夫顓臾昔者先王以為東蒙主且在邦域之中矣是社稷之臣也何以伐為冉有曰夫子欲之吾二臣者皆不欲也孔子曰求周任有言曰陳力就列不能者止危而不持顛而不扶則將焉用彼相矣且爾言過矣虎兕出於柙龜玉毁於櫝中是誰之過與冉有曰今夫顓臾固而近於費今不取後世必為子孫憂孔子曰求君子疾夫舍曰欲之而必為之辭丘也聞有國有家者不患寡而患不均不患貧而患不安蓋均無貧和無寡安無傾夫如是故逺人不服則修文徳以來之既來之則安之今由與求也相夫子逺人不服而不能來也邦分崩離析而不能守也而謀動干戈於邦内吾恐季孫之憂不在顓臾而在蕭牆之内也季氏魯欲使慎子為將軍孟子曰不教民而用之謂之殃民殃民者不容於堯舜之世一戰勝齊遂有南陽然且不可慎子勃然不悅曰此則滑釐所不識也曰吾明告子天子之地方千里不千里不足以待諸侯諸侯之地方百里不百里不足以守宗廟之典籍周公之封於魯為方百里也地非不足而儉於百里大公之封於齊也亦為方百里也地非不足也而儉於百里今魯方百里者五子以為有王者作則魯在所損乎在所益乎徒取諸彼以與此然且仁者不為況於殺人以求之乎君子之事君也務引其君以當道志於仁而已告子下春秋無義戰彼善於此則有之矣征者上伐下也敵國不相征也盡心下右明興師之義愚謂弔民伐罪興師之義也湯武之師是已春秋彼善於此者假義而已若魯欲伐齊則貪昧而不知義齊欲滅燕則暴虐而不合義季氏欲伐公臣則强僣而犯義宋不度徳量力而稱兵於倍地之四鄰是又衡行賊義以取敗亡者也子之所慎齊戰疾子行三軍則誰與子曰暴虎馮河死而無悔者吾不與也必也臨事而懼好謀而成者也並述而右臨兵制勝之道愚謂行師之要主敬而已夫子之所慎敬也夫子之言臨事而懼亦敬也敬則心有主宰而能謀故好謀而成必先之以懼也四書通㫖卷六
