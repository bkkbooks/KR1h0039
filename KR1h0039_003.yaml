body:
  text: 欽定四庫全書四書通㫖卷三元朱公遷撰氣敢問何謂浩然之氣曰難言也其為氣也至大至剛以直養而無害則塞於天地之間其為氣也配義與道無是餒也是集義所生者非義襲而取之也行有不慊於心則餒矣我故曰告子未嘗知義以其外之也必有事焉而勿正心勿忘勿助長也無若宋人然宋人有閔其苗之不長而揠之者芒芒然歸謂其人曰今日病矣豫助苗長矣其子趨而往視之苗則槁矣天下之不助苗長者寡矣以為無益而舍之者不耘苗者也助之長者揠苗者也非徒無益而又害之公孫丑上右理義之氣餘如平旦夜氣亦理義之氣也但夜旦之氣甚微浩然之氣盛大至大至剛乃浩然之氣之體假配義與道乃浩然之氣之功用若平旦夜氣只是指其清明虛靜之境界氣象而言蓋浩然之氣盛大故足以配道義夜氣虛靜故足以存良心旦氣清明故足以驗夫仁義之心也斯義也友人劉晉昭相與辨之君子有三戒少之時血氣未定戒之在色及其壯也血氣方剛戒之在鬬及其老也血氣既衰戒之在得季氏孟施舍之守氣又不如曾子之守約也公孫丑上右血氣之氣又如告子言不得於心勿求於氣告子之勿求者只是血氣之氣孟子引來反覆說到浩然之氣乃是理義之氣氣質剛毅木訥近仁子路右以質之美者言之餘如善人有恆者皆是也然此亦是質之偏者但於偏之中得其美者焉視偏於惡者為不同也若論其至極則惟聰明睿知生知安行者足以當之狂而不直侗而不願悾悾而不信吾不知之矣泰伯右以質之惡者言之柴也愚參也魯師也辟由也唁先進右自其質之所偏而言之餘如狂簡狷者皆是也惟上知與下愚不移陽貨道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也人莫不飲食也鮮能知味也中庸四章右専以氣質不同而言之古者民有三疾今也或是之亡也古之狂也肆今之狂也蕩古之矜也廉今之矜也忿戾古之愚也直今之愚也詐而已矣陽貨右以氣質兼乎習俗而言之生而知之者上也學而知之者次也困而學之又其次也困而不學民斯為下矣季氏或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉强而行之及其成功一也雖愚必明雖柔必強並中庸二十章右因氣質不同主乎學力而言也愚案言困而不學民斯為下者使學者知所戒言必明必強知之成功而一者使學者知所勉才附才德如有周公之才之美使驕且吝其餘不足觀也已泰伯右兼氣質言愚謂此與才難之才及才養不才教育英材成德達財因材篤焉為一類由其氣質有不同是以才亦有不同也又案凡以才德相對則所謂才者皆兼氣質言之才之美與驥不稱其力皆是才之美者才為輕而德為重也其為人也小有才是才之劣者有才無德所以取禍也此皆聖賢垂教之意也若夫為不善非才之罪也或相倍蓰而無算者不能盡其才者也非天之降才爾殊也人見其禽獸也而以為未嘗有才焉者此豈人之情也哉並告子上右専以理言鬼神附神鬼神之為德其盛矣乎視之而弗見聽之而弗聞體物而不可遺使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右詩曰神之格思不可度思矧可射思夫微之顯誠之不可掩如此夫中庸十六章季路問事鬼神子曰未能事人焉能事鬼先進敬鬼神而逺之雍也質諸鬼神而無疑知天也中庸二十九章非其鬼而祭之諂也為政子不語怪力亂神述而右自造化而言愚謂自造化而言是専言之也主乎祭祀而言是偏言之也於二氣良能之中我祭其氣之與我相接者則理之正也鬼神為德質諸鬼神怪力亂神皆泛以造化之鬼神言齊明盛服以下及敬鬼神事鬼神非其鬼而祭之皆特舉其祭祀之鬼神言也又祭祀之可格者是鬼神之靈質之而無疑者是鬼神之理夫子之不語者是鬼神之妙故至誠如神中庸二十四章右自人心而言愚案至誠如神是鬼神之神若所存者神聖不可測之謂神則是神妙之神聖不可測是専言其德行所存者神是兼言其德業禮樂文之以禮樂憲問立於禮成於樂泰伯右因論為學兼本與文而言之愚謂文之一字是用功處立字成字是成功處禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉陽貨人而不仁如禮何人而不仁如樂何八佾右因論其文反推其本而言之愚案一為強僭者言故以仁為禮樂之本一為文勝之敝而言故以敬與和為禮樂之本先進於禮樂野人也後進於禮樂君子也如用之則吾從先進先進右因論其文矯其偏勝而言之愚案夫子一言從先進一言吾從周蓋先進禮樂即成周郁郁之文也樂樂之實樂斯二者樂則生矣生則惡可已也惡可已則不知足之蹈之手之舞之離婁上右自人心主乎一事而言之子謂韶盡美矣又盡善也謂武盡美矣未盡善也八佾子在齊聞韶三月不知肉味曰不圖為樂之至於斯也述而右自樂之中兼聲容情實而言之愚案盡美言其文盡善言其本集注於聞韶之下言有以極其情文之備情則其盡善者文則其盡美者也子語魯大師樂曰樂其可知也始作翕如也從之純如也皎如也繹如也以成八佾師摰之始關雎之亂洋洋乎盈耳哉泰伯吾自衛反魯然後樂正雅頌各得其所子罕右自樂之中専主聲音而言之愚案前一章言正樂之道後二章見聖人正樂之功今王鼓樂於此百姓聞王鐘鼓之聲管籥之音舉疾首蹙頞而相告曰吾王之好鼓樂夫何使我至於此極也父子不相見兄弟妻子離散今王田獵於此百姓聞王車馬之音見羽旄之美舉疾首蹙頞而相告曰吾王之好田獵夫何使我至於此極也父子不相見兄弟妻子離散此無他不與民同樂也今王鼓樂於此百姓聞王鐘鼓之聲管籥之音舉欣欣然有喜色而相告曰吾王庶幾無疾病與何以能鼓樂也今王田獵於此百姓聞王車馬之音見羽旄之美舉欣欣然有喜色而相告曰吾王庶幾無疾病與何以能田獵也此無他與民同樂也梁惠王下右因人君好樂専主人和而言之八佾舞於庭是可忍也孰不可忍也三家者以雍徹子曰相維辟公天子穆穆奚取於三家之堂並八佾右因人臣僭樂専以等殺而言之禮制子張問十世可知也子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也為政右自其因革可推者而言之夏禮吾能言之把不足徵也殷禮吾能言之宋不足徵也文獻不足故也足則吾能徴之矣八佾愚而好自用賤而好自専生乎今之世反古之道如此者烖及其身者也非天子不議禮不制度不考文今天下車同軌書同文行同倫雖有其位苟無其德不敢作禮樂焉雖有其德苟無其位亦不敢作禮樂焉子曰吾說夏禮杞不足徴也吾學殷禮有宋存焉吾學周禮今用之吾從周中庸二十八章王天下有三重焉其寡過矣乎上焉者雖善無徴無徴不信不信民弗從下焉者雖善不尊不尊不信不信民弗從故君子之道本諸身徴諸庶民考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑質諸鬼神而無疑知天也百世以俟聖人而不惑知人也是故君子動而世為天下道行而世為天下法言而世為天下則逺之則有望近之則不厭詩曰在彼無惡在此無射庶幾夙夜以永終譽君子未有不如此而蚤有譽於天下者也中庸二十九章右自其損益不常者而言之愚案中庸二章前章為在下位者言之故重在位後章為在上位者言之故重在德有德有位斯可用損益之權矣又案論語言宋不足徴中庸言有宋存焉先儒之意以謂自二代之禮言之則杞宋皆不足徵自杞宋二國言之則杞比於宋尤不足徴是也愚竊謂以二代之禮言之則杞宋皆可歎已對時王之禮言之則夫子殷人也不忍言宋之不足徵也故夏禮曰說殷禮周禮皆曰學而幸其有宋存焉然雖有僅存而非當世之法也故又曰吾學周禮今用之吾從周親親而尊尊有哀傷不滿之意焉又如孟子以貢助徹告滕文公以班爵祿答北宫錡亦皆制度之損益不常者可言其略而不可言其詳也然北宫錡但欲聞其制而已故特誦其所聞如此文公則欲見諸施行故即其所聞而復以意推廣之蓋其答北宫錡者即夫子文獻不足之歎也其所以告文公君臣者即夫子告顔淵以為邦之道也聖賢所言之意有相類者若此顔淵問為邦子曰行夏之時乘殷之輅服周之冕樂則韶舞放鄭聲逺佞人鄭聲淫佞人殆衛靈公右自其可以通乎萬世者而言之權可與共學未可與適道可與適道未可與立可與立未可與權子罕右泛以稱物之權言之愚案此章所言之權義兼小大大而處人倫之變小而適事變之宜皆在其中矣若孟子言執中無權又言權然後知輕重則各因一事而言之只是於常道之中用權以適其宜而已此則直謂之義可也餘如君子時中時措之宜皆與權字異名而同義嫂溺援之以手者權也離婁上右専以處變之權言之愚謂此於常道不可行之時然後用權以通之如湯武之放伐伊尹之放廢周公之誅管叔大舜之不告而娶是皆權之大者異乎經而不離乎經也不可常者也淳于髠欲論出處乃以嫂溺援手而為喻是豈切當之論乎廢中權微子右即其一事而稱之人人之生也直罔之生也幸而免雍也右以理言無惻隱之心非人也無羞惡之心非人也無辭讓之心非人也無是非之心非人也惻隱之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也人之有是四端也猶其有四體也公孫丑上人之所以異於禽獸者幾希庶民去之君子存之舜明於庶物察於人倫由仁義行非行仁義也離婁下右以心言愚謂人之所同然者此心也人與物之所以不同者亦此心也知其無不同則當擴之以滿其本然之量知其有不同則當存之以全其所受之正此皆示人以用功之要也又前章兼性情言後章専以性言人之有道也飽食暖衣逸居而無教則近於禽獸聖人有憂之使契為司徒教以人倫父子有親君臣有義夫婦有别長幼有序朋友有信滕文公上右以道言愚謂指其異於禽獸者明君子當全天命之性以自别於禽獸也憂其近於禽獸者見聖人必明修道之教以别人於禽獸也言人之生也直則欲人因其生理而順之言無惻隱羞惡辭讓是非之心則非人則欲人因其本心而擴充之皆恐人之不能盡人道也人品見善如不及見不善如探湯吾見其人矣吾聞其語矣隱居以求其志行義以達其道吾聞其語矣未見其人也季氏右兼德行事業而言有事君人者事是君則為容悅者也有安社稷臣者以安社稷為悅者也有天民者達可行於天下而後行之者也有大人者正已而物正者也盡心上右兼心志德業而言聖人吾不得而見之矣得見君子者斯可矣善人吾不得而見之矣得見有恆者斯可矣亡而為有虛而為盈約而為泰難乎有恆矣述而生而知之者上也學而知之者次也困而學之又其次也困而不學民斯為下矣季氏或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉強而行之及其成功一也中庸二十章樂正子何人也孟子曰善人也信人也何謂善何謂信曰可欲之謂善有諸已之謂信充實之謂美充實而有光輝之謂大大而化之之謂聖聖而不可知之之謂神樂正子二之中四之下也盡心下右兼資質學力而言道統由堯舜至於湯五百有餘嵗若禹臯陶則見而知之若湯則聞而知之由湯至於文王五百有餘嵗若伊尹萊朱則見而知之若文王則聞而知之由文王至於孔子五百有餘嵗若太公望散宜生則見而知之若孔子則聞而知之由孔子而來至於今百有餘嵗去聖人之世若此其未逺也近聖人之居若此其甚也然而無有乎爾則亦無有乎爾盡心下仲尼祖述堯舜憲章文武中庸三十章仲尼焉學子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫子焉不學而亦何常師之有子張子畏於匡曰文王既沒文不在兹乎天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如子何子罕君子之澤五世而斬小人之澤五世而斬豫未得為孔子徒也豫私淑諸人也離婁下右道學相傳之統愚謂聖賢或正言以叙道統之所得或因言而見道統之所在或直以為任或謙不敢當語不無少異也其在孔門則克已復禮之功吾道一貫之㫖乃其正言者若喟然之歎三省之學如愚之氣象皆因言而可見者也又竊論之孔子之道有自來矣然子思則兼堯舜文武言子貢則専以文武言孟子又専以文王言孔子亦自言文王既沒文不在兹乎蓋道一而已前而堯舜之道亦文王之道也下而武王之道亦文王之道也近舉文王而堯舜之道在其中上舉文王而武王之道在其中不必疑其言之異也又見堯舜禹湯文武周公類咨爾舜天之厯數在爾躬允執其中四海困窮天祿永終舜亦以命禹曰豫小子履敢用𤣥牡敢昭告于皇皇后帝有罪不敢赦帝臣不蔽簡在帝心朕躬有罪無以萬方萬方有罪罪在朕躬周有大賚善人是富雖有周親不如仁人百姓有過在豫一人謹權量審法度修廢官四方之政行焉興滅國繼絶世舉逸民天下之民歸心焉所重民食喪祭寬則得衆信則民任焉敏則有功公則說堯曰右治道相傳之統餘如孔子告顔子以四代禮樂告子張以尊美屏惡之類及子貢稱夫子之得邦家者中庸哀公問政章大學治國平天下章孟子所論王道諸章皆可以見治統之相傳者如此蓋設施之當其可者即聖人授受之中也堯舜禹湯文武周公堯舜性之也湯武身之也盡心上克舜性者也湯武反之也盡心下右以德性言愚案身之兼用功而言反之舉成功而言惟其能身之所以能反之也又見性類舜之居深山之中與木石居與鹿豕遊其所以異於深山之野人者幾希及其聞一善言見一善行若决江河沛然莫之能禦也盡心上禹聞善言則拜大舜有大焉善與人同舍已從人樂取於人以為善自耕稼陶漁以至為帝無非取於人者取諸人以為善是與人為善者也故君子莫大乎與人為善公孫丑上右以德行言亦曰聖人樂善之誠大哉堯之為君也巍巍乎惟天為大唯堯則之蕩蕩乎民無能名焉巍巍乎其有成功也煥乎其有文章泰伯右兼德業言愚案主乎君道而言者凡四章此章及舜大知無為而治禹無間然皆以贊其為君之道若堯舜猶病及文王視民如傷則所以形容其愛人之心舜生於諸馮遷於負夏卒於鳴條東夷之人也文王生於岐周卒於畢郢西夷之人也地之相去也千有餘里世之相後也千有餘嵗得志行乎中國若合符節先聖後聖其揆一也離婁下右以道統言愚案論語末篇之首章孟子末篇之末章皆是此意但彼則主乎道統而言故厯述其相傳之緒此則主乎聖人而言故舉其相去之最逺者以為例見其無不同也穆穆文王於緝熙敬止大學傳三章右以學業言餘如堯舜之執中舜之好問察言明物察倫由仁義行樂取諸人若决江河而莫禦禹拜善言惡㫖酒湯執中湯武身之反之文王望道而未之見周公仰而思之夜以繼日凡若此類固皆以聖人德行事實而言其實可見聖人學業之盛也昔者禹抑洪水而天下平周公兼夷狄驅猛獸而百姓寧孔子成春秋而亂臣賊子懼滕文公下右以事功言舜其大孝也與德為聖人尊為天子富有四海之內宗廟饗之子孫保之故大德必得其位必得其祿必得其名必得其夀故天之生物必因其材而篤焉故栽者培之傾者覆之詩曰嘉樂君子憲憲令德宜民宜人受祿于天保佑命之自天申之故大德者必受命中庸十七章右以德行效驗言無為而治者其舜也與夫何為哉恭已正南靣而已矣衛靈公右以臨民氣象言舜其大知也與舜好問而好察邇言隱惡而揚善執其兩端用其中於民其斯以為舜乎中庸六章舜之飯糗茹草也若將終身焉及其為天子也被袗衣鼓琴二女果若固有之盡心下巍巍乎舜禹之有天下也而不與焉泰伯禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宫室而盡力乎溝洫禹吾無間然矣泰伯禹惡㫖酒而好善言湯執中立賢無方文王視民如傷望道而未之見武王不泄邇不忘逺周公思兼三王以施四事其有不合者仰而思之夜以繼日幸而得之坐以待旦離婁下右兼德行事實而言餘如孟子論舜所以事親者所以處人倫之變者亦即其事實言之而德行因可見也見孝弟及人倫類孔子子絶四毋意毋必毋固毋我子罕右以心言顔淵喟然歎曰仰之彌髙鑽之彌堅瞻之在前忽焉在後夫子循循然善誘人博我以文約我以禮欲罷不能既竭吾才如有所立卓爾雖欲從之末由也已子罕叔孫武叔毁仲尼子貢曰無以為也仲尼不可毁也他人之賢者丘陵也猶可踰也仲尼日月也無得而踰焉人雖欲自絶其何傷於日月乎多見其不知量也子張右以道言愚案顔子贊其道之妙言其不易學者如此子貢贊其道之髙言其不可毁者如此學不厭智也教不倦仁也仁且智夫子既聖矣公孫丑上右以德言江漢以濯之秋陽以暴之皓皓乎不可尚已滕文公上子貢賢於仲尼子服景伯以告子貢子貢曰譬之宫牆賜之牆也及肩窺見室家之好夫子之牆數仞不得其門而入不見宗廟之美百官之富得其門者或寡矣夫子之云不亦宜乎子張右兼道德言仲尼不為已甚者離婁下右以德行言愚案孟子言仲尼不為已甚孔子自言君子依乎中庸二說互相發也陳子禽謂子貢曰子為恭也仲尼豈賢於子乎子貢曰君子一言以為知一言以為不知言不可不慎也夫子之不可及也猶天之不可階而升也夫子之得邦家者所謂立之斯立道之斯行綏之斯來動之斯和其生也榮其死也哀如之何其可及也子張右以功用言以子觀於夫子賢於堯舜逺矣公孫丑上世衰道微邪說暴行有作臣弒其君者有之子弒其父者有之孔子懼作春秋春秋天子之事也是故孔子曰知我者其惟春秋乎罪我者其惟春秋乎滕文公下右以事功言愚謂繼往聖開來學則其功賢於堯舜撥亂世而反諸正則其功著於春秋宰我舉其統體言孟子即其一事言見其禮而知其政聞其樂而知其德由百世之後等百世之王莫之能違也自生民以來未有夫子也公孫丑上右以禮樂言豈惟民哉麒麟之於走獸鳳凰之於飛鳥泰山之於丘垤河海之於行潦類也聖人之於民亦類也出於其類拔乎其萃自生民以來未有盛於孔子也公孫丑上右兼資質德行言仲尼祖述堯舜憲章文武上律天時下襲水土辟如天地之無不持載無不覆幬辟如四時之錯行如日月之代明萬物並育而不相害道並行而不相悖小德川流大德敦化此天地之所以為大也中庸三十章孔子之謂集大成集大成也者金聲而玉振之也金聲也者始條理也玉振之也者終條理也始條理者智之事也終條理者聖之事也智譬則巧也聖譬則力也由射於百步之外也其至爾力也其中非爾力也萬章下右兼德行學業言子之所慎齊戰疾子釣而不綱弋不射宿並述而右兼德行事實言子所雅言詩書執禮皆雅言也述而子罕言利與命與仁子罕子不語怪力亂神述而右以言辭言子溫而厲威而不猛恭而安述而君子有三變望之儼然即之也溫聽其言也厲子張子之燕居申申如也夭夭如也述而寢不尸居不容鄉黨夫子至於是邦也必聞其政求之與抑與之與子貢曰夫子溫良恭儉讓以得之夫子之求之也其諸異乎人之求之與學而右氣象見於容貌之間老者安之朋友信之少者懷之公冶子入太廟每事問或曰孰謂鄹人之子知禮乎入太廟每事問子聞之曰是禮也八佾陳司敗問昭公知禮乎孔子曰知禮孔子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎君取於吳為同姓謂之吳孟子君而知禮孰不知禮巫馬期以告子曰丘也幸茍有過人必知之述而右氣象見於言辭之間子食於有喪者之側未嘗飽也子於是日哭則不歌子與人歌而善必使反之而後和之並述而子見齊衰者冕衣裳者與瞽者見之雖少必作過之必趨子罕孔子於鄉黨恂恂如也似不能言者其在宗廟朝廷便便言唯謹爾朝與下大夫言侃侃如也與上大夫言誾誾如也食不語寢不言雖疏食菜羮瓜祭必齊如也席不正不坐鄉人飲酒杖者出斯出矣鄉人儺朝服而立於阼階見齊衰者雖狎必變見冕者與瞽者雖褻必以貌凶服者式之式負版者有盛饌必變色而作迅雷風烈必變升車必正立執綏車中不內顧不疾言不親指並鄉黨師冕見及階子曰階也及席子曰席也皆坐子告之曰某在斯某在斯師冕出子張問曰與師言之道與子曰然固相師之道也衛靈公右氣象見於應物之際愚案此有哀矜閔恤之仁有節文委曲之禮所謂充積極其盛發見當其可也君在踧踖如也與與如也君召使擯色勃如也足躩如也揖所與立左右手衣前後襜如也趨進翼如也賔退必復命曰賔不顧矣入公門鞠躬如也如不容立不中門行不履閾過位色勃如也足躩如也其言似不足者攝齊升堂鞠躬如也屏氣似不息者出降一等逞顔色怡怡如也沒階趨翼如也復其位踧踖如也執圭鞠躬如也如不勝上如揖下如授勃如戰色足縮縮如有循享禮有容色私覿愈愈如也君賜食必正席先嘗之君賜腥必熟而薦之君賜生必畜之侍食於君君祭先飯疾君視之東首加朝服拖紳並鄉黨右氣象見於事君之際述而不作信而好古竊比於我老彭默而識之學而不厭誨人不倦何有於我哉蓋有不知而作之者我無是也多聞擇其善者而從之多見而識之知之次也若聖與仁則吾豈敢抑為之不厭誨人不倦則可謂云爾已矣公西華曰正唯弟子不能學也並述而吾有知乎哉無知也有鄙夫問於我空空如也我叩其兩端而竭焉出則事公卿入則事父兄喪事不敢不勉不為酒困何有於我哉並子罕君子道者三我無能焉仁者不憂知者不惑勇者不懼子貢曰夫子自道也憲問右自謙之辭吾十有五而志于學三十而立四十而不惑五十而知天命六十而耳順七十而從心所欲不踰矩為政十室之邑必有忠信如丘者焉不如丘之好學也公冶我非生而知之者好古敏以求之者也德之不修學之不講聞義不能徙不善不能改是吾憂也加我數年五十以學易可以無大過矣文莫吾猶人也躬行君子則吾未之有得並述而右謙已誨人之辭孔門弟子柴也愚參也魯師也辟由也唁先進右以質言子貢問師與商也孰賢子曰師也過商也不及曰然則師愈與子曰過猶不及先進右兼才學言回也其心三月不違仁其餘則日月至焉而已矣雍也子夏子游子張皆有聖人之一體冉牛閔子顔淵則具體而微公孫丑上右以德行言孟武伯問子路仁乎子曰不知也又問子曰由也千乘之國可使治其賦也不知其仁也求也何如子曰求也千室之邑百乘之家可使為之宰也不知其仁也赤也何如子曰赤也束帶立於朝可使與賔客言也不知其仁也公冶右兼才德言回也其庶乎屢空賜不受命而貨殖焉億則屢中先進右兼學問心志言已上皆評論之辭賜也何如子曰女器也曰何器也曰瑚璉也公冶季康子問仲由可使從政也與子曰由也果於從政乎何有曰賜也可使從政也與曰賜也達於從政乎何有曰求也可使從政也與曰求也藝於從政乎何有雍也右以才言吾與回言終日不違如愚退而省其私亦足以發回也不愚為政語之而不惰者其回也與子罕回也非助我者也於吾言無所不說先進以能問於不能以多問於寡有若無實若虛犯而不校昔者吾友嘗從事於斯矣泰伯回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣中庸八章子路有聞未之能行惟恐有聞公冶由之瑟奚為於丘之門門人不敬子路子曰由也升堂矣未入於室也先進子路人告之以有過則喜公孫丑上子使漆雕開仕對曰吾斯之未能信子說公冶南容三復白圭孔子以其兄之子妻之先進右以學言餘如夫子許商賜可與言詩亦是此類女與回也孰愈對曰賜也何敢望回回也聞一以知十賜也聞一以知二子曰弗如也吾與女弗如也公冶從我於陳蔡者皆不及門也德行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子游子夏先進宰我子貢善為說辭冉牛閔子顔淵善言德行公孫丑上右兼才學言犂牛之子騂且角雖欲勿用山川其舍諸雍也孝哉閔子騫人不閒於其父母昆弟之言先進片言可以折獄者其由也與顔淵子謂子賤君子哉若人魯無君子者斯焉取斯子謂公冶長可妻也雖在縲絏之中非其罪也以其子妻之子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之並公冶右以德行言餘如雍也可使南面又以德量言與此類大同小異子游為武城宰子曰女得人焉爾乎曰有淡臺滅明者行不由徑非公事未嘗至於偃之室也雍也右以操履言賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也雍也衣敝緼袍與衣狐貉者立而不恥者其由也與不忮不求何用不臧子路終身誦之子曰是道也何足以臧子罕右兼德行心志言已上皆稱之之辭餘如閔子騫之言必有中南宫適之君子尚德哉若人亦皆夫子稱之之辭也已上稱許之辭凡二十四章其為夫子之言者十有六但由之瑟一章是先警之而又稱贊之衣敝緼袍一章是先稱之而又警教之此聖人之善教也堂堂乎張也難與並為仁矣吾友張也為難能也然而未仁並子張右以德行言已上皆貶之之辭哀公問弟子孰為好學孔子對曰有顔回者好學不遷怒不二過不幸短命死矣今也則亡未聞好學者也雍也季康子問弟子孰為好學孔子對曰有顔回者好學不幸短命死矣今也則亡先進惜乎吾見其進也未見其止也子罕右以學言已上皆傷歎之辭餘如顔淵之死伯牛之疾夫子皆有傷歎之辭然於顔淵則歸之於天於伯牛則歸之於命莫之為而為莫之致而致蓋亦末如之何也已又有聖人責之之辭見於論語者凡十章如子路使門人為臣求也為季氏聚斂冉有季路欲佐季氏伐顓臾此是因其行事之失而責之宰我之問喪樊遲之問稼圃則因其請問之失而責之宰我言使民戰栗子路言有是哉子之迂則因其言辭之失而責之至於子貢方人而疏於自治冉求之畫宰豫之晝寢而甘於自棄亦皆有責之之辭蓋聖人欲人有過則改之責之之深者所以為愛之之至也閔子侍側誾誾如也子路行行如也冉有子貢侃侃如也先進右以氣象言餘如不違如愚是顔子之氣象堂堂乎張也是子張之氣象與此類同皆氣象見於容貌之間者也又案顔淵季路侍一章見二子之氣象見於言辭之間者如此子路曽晳冉有公西華侍坐一章見四子氣象見於言辭之間者如此然浴沂詠歸有髙明廣大之氣象朋友共敝有勇知方有敦厚質實之氣象顔淵之氣象則近於孔子之自然冉有公西華之氣象則亞於子路之篤實者也子思昔者魯繆公無人乎子思之側則不能安子思公孫丑下子思居於衛有齊寇或曰寇至盍去諸子思曰如伋去君誰與守離婁下右聖賢去就之義繆公之於子思也亟問亟餽鼎肉子思不悅於卒也摽使者出諸大門之外北面稽首再拜而不受曰今而後知君之犬馬畜伋蓋自是臺無餽也繆公亟見於子思曰古千乘之國以友士何如子思不悅曰古之人有言曰事之云乎豈曰友之云乎並萬章右聖賢交際之道愚謂於衛見子思盡人臣之道於魯見子思居賔師之道大扺子思為人方正而嚴毅上可以見曽子之傳下可以見孟子之所傳孟子豫未得為孔子徒也豫私淑諸人也離婁下右以道統自任愚案無有乎爾之云亦是此類雖為自謙之辭實則自任之意也我知言我善養吾浩然之氣公孫丑上右以聖學自任我亦欲正人心息邪說距詖行放淫辭以承三聖者豈好辨哉豫不得已也滕文公下右以闢異端自任夫子當路於齊管仲晏子之功可復許乎孟子曰子誠齊人也知管仲晏子而已矣或問乎曽西曰吾子與子路孰賢曽西蹴然曰吾先子之所畏也曰然則吾子與管仲孰賢曽西艴然不悅曰爾何曽比豫於管仲管仲得君如彼其專也行乎國政如彼其久也功烈如彼其卑也爾何曽比豫於是曰管仲以其君霸晏子以其君顯管仲晏子猶不足為與曰以齊王由反手也公孫丑上右以行王道自任愚案所謂四十不動心者亦是此意但此則知時識勢見孟子之智彼則勝重任大見孟子之勇又案孟子每多自任之辭如教亦多術及引而不發是以教人之道自任我非堯舜之道不敢陳於王前是以格君之道自任當今之世舍我其誰是以平治天下之道自任至論孔門弟子則曰姑舍是述道統則不及曽子子思論夷惠伊尹則曰願學孔子皆可見其以聖人之道自任處古今人物伯夷叔齊不念舊惡怨是用希公冶管仲之器小哉或曰管仲儉乎曰管氏有三歸官事不攝焉得儉然則管仲知禮乎曰邦君樹塞門管氏亦樹塞門邦君為兩君之好有反坫管氏亦有反坫管氏而知禮孰不知禮八佾右以量言愚謂一為清者之量一為霸者之量蘧伯玉使人於孔子孔子與之坐而問焉曰夫子何為對曰夫子欲寡其過而未能也使者出子曰使乎使乎憲問右以學言愚謂使者以願學之心稱伯玉可謂知賢者矣若公明賈以時然後言以下三者稱文子則是以德行之美贊之不幾過其實乎故夫子一信一疑之伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨述而微子去之箕子為之奴比干諫而死孔子曰殷有三仁焉微子三子者不同道其趨一也一者何也曰仁也告子下直哉史魚邦有道如矢邦無道如矢君子哉蘧伯玉邦有道則仕邦無道則可卷而懷之衛靈公寧武子邦有道則知邦無道則愚其知可及也其愚不可及也公冶孟莊子之孝也其他可能也其不改父之臣與父之政是難能也子張右以德行言孟公綽為趙魏老則優不可以為滕薛大夫憲問盆成括仕於齊孟子曰死矣盆成括盆成括見殺門人問曰夫子何以知其將見殺曰其為人也小有才未聞君子之大道也則足以殺其軀而已矣盡心下右以才德言愚謂孟公綽優於德而短於才盆成括有其才而無其德也桓公殺公子糾召忽死之管仲不死曰未仁乎子曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁管仲非仁者與桓公殺公子糾不能死又相之子曰管仲相桓公霸諸侯一匡天下民到于今受其賜微管仲吾其被髮左袵矣豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也並憲問管仲得君如彼其専也行乎國政如彼其久也功烈如彼其卑也公孫丑上右以事功言愚謂孔子志在尊王室故稱管仲之功孟子志在行王道故卑管仲之功又子路子貢不知管仲有及人之功故孔子稱之公孫丑又但知有管晏而不知王道之大故孟子貶之栁下惠不以三公易其介盡心上右以操守言子謂子産有君子之道四焉其行已也恭其事上也敬其養民也惠其使民也義孔文子何以謂之文也子曰敏而好學不恥下問是以謂之文也晏平仲善與人交久而敬之並公冶孟之反不伐奔而殿將入門策其馬曰非敢後也馬不進也雍也子謂衛公子荆善居室始有曰苟合矣少有曰苟完矣富有曰苟美矣子路公叔文子之臣大夫僎與文子同升諸公子聞之曰可以為文矣憲問季文子三思而後行子聞之曰再斯可矣公冶臧文仲其竊位者與知栁下惠之賢而不與立也衛靈公臧武仲以防求為後於魯雖曰不要君吾不信也憲問子産聽鄭國之政以其乘輿濟人於溱洧孟子曰惠而不知為政嵗十一月徒杠成十二月輿梁成民未病涉也君子平其政行辟人可也焉得人人而濟之故為政者每人而悅之日亦不足矣離婁下臧文仲居蔡山節藻棁何如其知也令尹子文三仕為令尹無喜色三已之無愠色舊令尹之政必以告新令尹何如子曰忠矣曰仁矣乎曰未知焉得仁崔子弒齊君陳文子有馬十乘棄而違之至於他邦則曰猶吾大夫崔子也違之之一邦則又曰猶吾大夫崔子也違之何如子曰清矣曰仁矣乎曰未知焉得仁孰謂微生髙直或乞醯焉乞諸其鄰而與之並公冶陳仲子豈不誠廉士哉居於陵三日不食耳無聞目無見也井上有李螬食實者過半矣匍匐往將食之三咽然後耳有聞目有見孟子曰於齊國之士吾必以仲子為巨擘焉雖然仲子惡能廉充仲子之操則蚓而後可者也夫蚓上食槁壤下飲黃泉仲子所居之室伯夷之所築與抑亦盜跖之所築與所食之粟伯夷之所樹與抑亦盜跖之所樹與是未可知也曰是何傷哉彼身織屨妻辟纑以易之也曰仲子齊之世家也兄戴蓋祿萬鍾以兄之祿為不義之祿而不食也以兄之室為不義之室而不居也辟兄離母處於於陵他日歸則有饋其兄生鵝者已頻顣曰惡用是鶂鶂者為哉他日其母殺是鵝也與之食之其兄自外至曰是鶂鶂之肉也出而哇之以母則不食以妻則食之以兄之室則弗居以於陵則居之是尚為能充其類也乎若仲子者蚓而後充其操者也滕文公下仲子不義與之齊國而弗受人皆信之是舍簞食豆羮之義也人莫大焉亡親戚君臣上下以其小者信其大者奚可哉盡心上右以事言浩生不害問曰樂正子何人也孟子曰善人也信人也何謂善何謂信曰可欲之謂善有諸已之謂信充實之謂美充實而有光輝之謂大大而化之之謂聖聖而不可知之之謂神樂正子二之中四之下也盡心下右以人品言逸民伯夷叔齊虞仲夷逸朱張栁下惠少連子曰不降其志不辱其身伯夷叔齊與謂栁下惠少連降志辱身矣言中倫行中慮其斯而已矣謂虞仲夷逸隱居放言身中清廢中權微子右兼德行志節言愚謂泰伯仲雍俱是以天下讓而夫子稱之有輕重不同蓋泰伯乃太王長子確然當有國者而見幾明决用意忠厚當其挾仲雍俱逃之時仲雍未必能及此只從其兄所為耳况仲不去太王亦豈舍季厯乎或問子産子曰惠人也問子西曰彼哉彼哉問管仲曰人也奪伯氏駢邑三百飯疏食沒齒無怨言憲問右兼人品事實言愚案聖賢論人有不同者同一子産也舉其重而言曰惠人數其事而稱之曰養民也惠即其乘輿濟人之事而言之曰惠而不知為政同一伯夷也孔子以統體言而曰賢孟子以一偏言而曰聖同一夷惠也以一事言之曰聖人百世之師以一德名之曰聖之清聖之和以一偏之敝言之曰伯夷隘栁下惠不恭大人大人者不失其赤子之心者也大人者言不必信行不必果惟義所在非禮之禮非義之義大人弗為並離婁下惟大人為能格君心之非離婁上有大人者正已而物正者也盡心上右以德言為聖人之稱愚案格君心之非正已而物正専主為人臣者而言其餘則通乎上下而言鈞是人也或為大人或為小人何也孟子曰從其大體為大人從其小體為小人曰鈞是人也或從其大體或從其小體何也曰耳目之官不思而蔽於物物交物則引之而已矣心之官則思思則得之不思則不得也此天之所與我者先立乎其大者則其小者不能奪也此為大人而已矣告子上右以德言為聖人君子通稱說大人則藐之勿視其巍巍然堂髙數仞榱題數尺我得志弗為也食前方丈侍妾數百人我得志弗為也般樂飲酒驅騁田獵後車千乘我得志弗為也在彼者皆我所不為也在我者皆古之制也吾何畏彼哉盡心下右以勢位言畏大人季氏居仁由義大人之事備矣盡心上右兼德位言君子君子不重則不威學則不固主忠信無友不如已者過則勿憚改君子食無求飽居無求安敏於事而慎於言就有道而正焉可謂好學也已並學而君子博學於文約之以禮亦可以弗畔矣夫雍也君子有九思視思明聽思聰色思溫貌思恭言思忠事思敬疑思問忿思難見得思義季氏君子尊德性而道問學致廣大而盡精微極髙明而道中庸溫故而知新敦厚以崇禮中庸二十七章右以德言為學者之稱亦曰以學言人不知而不愠不亦君子乎學而君子不器為政君子之於天下也無適也無莫也義之與比里仁君子病無能焉不病人之不已知也君子疾沒世而名不稱焉君子矜而不爭羣而不黨君子貞而不諒並衛靈公右以德言為成德之稱正言之也子路問君子子曰修己以敬曰如斯而已乎曰修已以安人曰如斯而已乎曰修已以安百姓修已以安百姓堯舜其猶病諸憲問子貢問君子子曰先行其言而後從之為政君子不憂不懼曰不憂不懼斯謂之君子矣乎子曰內省不疚夫何憂何懼顔淵右以德言徹上徹下之道因其人而言之也夫君子所過者化所存者神上下與天地同流豈曰小補之哉君子有三樂而王天下不與存焉父母俱存兄弟無故一樂也仰不愧於天俯不怍於人二樂也得天下英才而教育之三樂也君子有三樂而王天下不與存焉廣土衆民君子欲之所樂不存焉中天下而立定四海之民君子樂之所性不存焉君子所性雖大行不加焉雖窮居不損焉分定故也君子所性仁義禮智根於心其生色也睟然見於面盎於背施於四體四體不言而喻並盡心上君子依乎中庸遁世不見知而不悔唯聖者能之中庸十一章君子篤恭而天下平中庸末章右以德言為聖人之稱愚案四書所言君子甚多其等第不一今略取其的然有所指者以為發例餘不能悉舉者可以類推君子篤於親則民興於仁故舊不遺則民不偷泰伯君子正其衣冠尊其瞻視儼然人望而畏之斯不亦威而不猛乎堯曰君子有大道必忠信以得之驕泰以失之大學傳十章右以位言愚謂以位言者必有其德而後稱其位故聖賢凡以君子為為人上者之稱必言所以為人上者之道微意可見也侍於君子有三愆季氏右兼德位言士士不可以不𢎞毅任重而道逺仁以為已任不亦重乎死而後已不亦逺乎泰伯王子墊問曰士何事孟子曰尚志曰何謂尚志曰仁義而已矣殺一無罪非仁也非其有而取之非義也居惡在仁是也路惡在義是也居仁由義大人之事備矣盡心上志士仁人無求生以害仁有殺身以成仁衛靈公待文王而後興者凡民也若夫豪傑之士雖無文王猶興盡心上士見危致命見得思義祭思敬喪思哀其可已矣子張古之賢王好善而忘勢古之賢士何獨不然樂其道而忌人之勢故王公不致敬盡禮則不得亟見之見且猶不得亟而况得而臣之乎故士窮不失義達不離道窮不失義故士得已焉達不離道故民不失望焉古之人得志澤加於民不得志修身見於世窮則獨善其身達則兼善天下並盡心上士志於道而耻惡衣惡食者未足與議也里仁士而懷居不足以為士矣憲問右以人品言正言之也愚案任重道逺以學力言居仁由義以趨向言雖無文王猶興以才智言殺身成仁忘人之勢以操守言見危致命以下兼有學有守言窮不失義達不離道則兼有守有為而言若士而懷居及耻惡衣惡食亦以志趣而言之此則為士者之戒也子路問曰何如斯可謂之士矣子曰切切偲偲怡怡如也可謂士矣朋友切切偲偲兄弟怡怡子貢問曰何如斯可謂之士矣子曰行已有耻使於四方不辱君命可謂士矣曰敢問其次曰宗族稱孝焉鄉黨稱弟焉曰敢問其次曰言必信行必果硜硜然小人哉抑亦可以為次矣曰今之從政者何如子曰噫斗筲之人何足算也並子路右以人品言因其人而言之也愚案夫子之告子貢者是兼才能德行而言所謂因其材而篤之也其告子路者是専主人倫而言所謂因其失而救之也上士一位中士一位下士一位上士倍中士中士倍下士並萬章下右以爵祿言餘如無罪而殺士亦是専指在位者言之與此類同善人附有恆者子張問善人之道子曰不踐迹亦不入於室先進浩生不害問曰樂正子何人也孟子曰善人也信人也何謂善何謂信曰可欲之謂善有諸已之謂信充實之謂美充實而有光輝之謂大大而化之之謂聖聖而不可知之之謂神樂正子二之中四之下也盡心下善人吾不得而見之矣得見有恆者斯可矣亡而為有虛而為盈約而為泰難乎有恆矣述而人而無恆不可以作巫醫善夫不恆其德或承之羞子曰不占而已矣子路右自其資質而言愚謂自賦質而言善人生質雖美然必學而後可以入道也自進德而言善人有恆者皆有入道之資此其所以為可取也又案人而無恆一章言凡人皆不可以無恆亡而為有一節言欲學聖人者尤不可以無恆善人為邦百年亦可以勝殘去殺矣誠哉是言也善人教民七年亦可以即戎矣並子路右自其設施而言愚謂論其人則皆以資質言也論其事則此以設施言也狂狷不得中行而與之必也狂狷乎枉者進取狷者有所不為也子路萬章問曰孔子在陳曰盍歸乎來吾黨之士狂簡進取不忘其初孔子在陳何思魯之狂士孟子曰孔子不得中道而與之必也狂狷乎狂者進取狷者有所不為也孔子豈不欲中道哉不可必得故思其次也敢問何如斯可謂狂矣曰如琴張曽晳牧皮者孔子之所謂狂矣何以謂之狂也曰其志嘐嘐然曰古之人古之人夷考其行而不掩焉者也狂者又不可得欲得不屑不潔之士而與之是狷也是又其次也盡心下右自其志節而言之子在陳曰歸與歸與吾黨之小子狂簡斐然成章不知所以裁之公冶右指其所習而言之鄉原鄉原德之賊也陽貨右正其罪而言之過我門而不入我室我不憾焉者其惟鄉原乎鄉原德之賊也曰何如斯可謂之鄉原矣曰何以是嘐嘐也言不顧行行不顧言則曰古之人古之人行何為踽踽涼涼生斯世也為斯世也善斯可矣閹然媚於世也者是鄉原也萬章曰一鄉皆稱原人焉無所往而不為原人孔子以為德之賊何哉曰非之無舉也刺之無刺也同乎流俗合乎汙世居之似忠信行之似廉潔衆皆恱之自以為是而不可與入堯舜之道故曰德之賊也孔子曰惡似而非者惡莠恐其亂苗也惡佞恐其亂義也惡利口恐其亂信也惡鄭聲恐其亂樂也惡紫恐其亂朱也惡鄉原恐其亂德也君子反經而已矣經正則庶民興庶民興斯無邪慝矣盡心下右極其情狀而言之君子小人君子周而不比小人比而不周為政君子和而不同小人同而不和君子泰而不驕小人驕而不泰並子路君子喻於義小人喻於利里仁君子坦蕩蕩小人長戚戚述而君子成人之美不成人之惡小人反是顔淵君子易事而難說也說之不以道不說也及其使人也器之小人難事而易說也說之雖不以道說也及其使人也求備焉子路君子而不仁者有矣夫未有小人而仁者也君子上達小人下達並憲問君子懷德小人懷土君子懷刑小人懷惠里仁君子求諸己小人求諸人君子不可小知而可大受也小人不可大受而可小知也並衛靈公君子有三畏畏天命畏大人畏聖人之言小人不知天命而不畏也狎大人侮聖人之言季氏君子固窮小人窮斯濫矣衛靈公君子中庸小人反中庸君子之中庸也君子而時中小人之中庸也小人而無忌憚也中庸二章君子居易以俟命小人行險以徼幸中庸十四章君子之道暗然而日章小人之道的然而日亡中庸末章右以德言饒子曰所謂小人有數樣硜硜小人以其器量之淺狹也樊須小人以其所務者小也無為小人儒以其所業雖正而用心則私也至以小人與君子對言者則指其心術渾然不好底為小人宜與君子每每相反也愚謂以君子小人對言之正以明其德行心術之不同均可謂之以德言者蓋德有凶有吉也女為君子儒毋為小人儒雍也右以學言君子之德風小人之德草草上之風必偃顔淵君子有勇而無義為亂小人有勇而無義為盜君子學道則愛人小人學道則易使也並陽貨君子犯義小人犯刑離婁上君子賢其賢而親其親小人樂其樂而利其利大學傳三章右以位言四書通㫖卷三
