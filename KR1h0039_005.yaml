body:
  text: 欽定四庫全書四書通㫖卷五元朱公遷撰人倫天下之達道五所以行之者三曰君臣也父子也夫婦也昆弟也朋友之交也五者天下之達道也中庸二十章人之有道也飽食煖衣逸居而無教則近於禽獸聖人有憂之使契為司徒教以人倫父子有親君臣有義夫婦有别長幼有序朋友有信滕文公上右即其常道而言之愚謂孟子自教而言故先父子中庸自政而言故先君臣中庸不言親義别序信而道之一字足以兼之矣又案大學止善之目於五品遺其二則欲人推類以盡其餘也中庸君子之道四於五品遺其一則道所當然非所求之閨門婦女也夫婦之别必君子道之使由之豈待以責彼之道自責乎舜徃于田號泣于旻天何為其號泣也孟子曰怨慕也萬章曰父母愛之喜而不忘父母惡之勞而不怨然則舜怨乎曰長息問於公明高曰舜徃于田則吾既得聞命矣號泣于旻天于父母則吾不知也公明高曰是非爾所知也夫公明高以孝子之心為不若是恝我竭力耕田共為子職而已矣父母之不我愛於我何哉帝使其子九男二女百官牛羊倉廩備以事舜於畎畆之中天下之士多就之者帝將胥天下而遷之焉為不順於父母如窮人無所歸天下之士悅之人之所欲也而不足以解憂好色人之所欲妻帝之二女而不足以解憂富人之所欲富有天下而不足以解憂貴人之所欲貴為天子而不足以解憂人悅之好色富貴無足以解憂者惟順於父母可以解憂人少則慕父母知好色則慕少艾有妻子則慕妻子仕則慕君不得於君則熱中大孝終身慕父母五十而慕者予於大舜見之矣父母使舜完廩捐階瞽瞍焚廩使浚井出從而揜之象曰謨蓋都君咸我績牛羊父母倉廩父母干戈朕琴朕弤朕二嫂使治朕棲象徃入舜宫舜在牀琴象曰欝陶思君爾忸怩舜曰惟兹臣庶汝其于予治不識舜不知象之將殺已與曰奚而不知也象憂亦憂象喜亦喜曰然則舜偽喜者與曰否昔者有饋生魚於鄭子産子産使校人畜之池校人烹之反命曰始舍之圉圉焉少則洋洋焉攸然而逝子産曰得其所哉得其所哉校人出曰孰謂子産智予既烹而食之曰得其所哉得其所哉故君子可欺以其方難罔以非其道彼以愛兄之道來故誠信而喜之奚偽焉象日以殺舜為事立為天子則放之何也孟子曰封之也或曰放焉萬章曰舜流共工於幽州放驩兠于崇山殺三苖于三危殛鯀于羽山四罪而天下咸服誅不仁也象至不仁封之有庳有庳之人奚罪焉仁人固如是乎在他人則誅之在弟則封之曰仁人之於弟也不藏怒焉不宿怨焉親愛之而已矣親之欲其貴也愛之欲其富也封之有庳富貴之也身為天子弟為匹夫可謂親愛之乎敢問或曰放者何謂也曰象不得有為於其國天子使吏治其國而納其貢稅焉故謂之放豈得暴彼民哉雖然欲常常而見之故源源而來不及貢以政接於有庳此之謂也並萬章上小弁小人之詩也孟子曰何以言之曰怨曰固哉高叟之為詩也有人於此越人關弓而射之則己談笑而道之無他䟽之也其兄關弓而射之則己垂涕泣而道之無他戚之也小弁之怨親親也親親仁也固矣夫高叟之為詩也曰凱風何以不怨曰凱風親之過小者也小弁親之過大者也親之過大而不怨是愈䟽也親之過小而怨是不可磯也愈䟽不孝也不可磯亦不孝也孔子曰舜其至孝矣五十而慕告子下右以順處其變者言之愚謂不得乎親而怨慕者孝之至弟至不仁而誠信喜之者友之至此其不失乎常者也封之有庳而富貴之常道之中雖有權而均之不失天理之常也又案旻天之怨怨乎已小弁之怨怨乎親其實有不同者然自小弁而言則太子之怨不失乎親親之心可引舜事以為證不必辨其怨之同異也此孟子論小弁之意也吾友操公琬之言曰大舜之於象也誠信喜之則聖人自然之天所以盡其愛之之心也封之有庳則聖人處事之法所以全其愛之之道也舜之處象者如此而周公之處管叔者不同其說則先儒之論備矣公名不孝有三無後為大舜不告而娶為無後也君子以為猶告也離婁下娶妻如之何必告父母信斯言也冝莫如舜舜之不告而娶何也孟子曰告則不得娶男女居室人之大倫也如告則廢人之大倫以懟父母是以不告也萬章曰舜之不告而娶則吾既得聞命矣帝之妻舜而不告何也曰帝亦知告焉則不得妻也萬章上湯放桀武王伐紂有諸孟子對曰於傳有之曰臣弑其君可乎曰賊仁者謂之賊賊義者謂之殘殘賊之人謂之一夫聞誅一夫紂矣未聞弑君也梁恵王下右以通其變者言之愚謂此類皆當以權言之伊尹放廢之事見臣道類語云盛徳之士君不得而臣父不得而子舜南面而立堯帥諸侯北面而朝之瞽瞍亦北面而朝之舜見瞽瞍其容有蹙孔子曰於斯時也天下殆哉岌岌乎不識此語誠然乎哉孟子曰否此非君子之言齊東野人之語也堯老而舜攝也堯典曰二十有八載放勲乃徂落百姓如喪考妣三年四海遏宻八音孔子曰天無二日民無二王舜既為天子矣又帥天下諸侯以為堯三年喪是二天子矣咸丘蒙曰舜之不臣堯則吾既得聞命矣詩云普天之下莫非王土率土之濵莫非王臣而舜既為天子矣敢問瞽瞍之非臣如何曰是詩也非是之謂也勞於王事而不得養父母也曰此莫非王事我獨賢勞也故說詩者不以文害辭不以辭害志以意逆志是為得之如以辭而已矣雲漢之詩曰周餘黎民靡有孑遺信斯言也是周無遺民也孝子之至莫大乎尊親尊親之至莫大乎以天下養為天子父尊之至也以天下養養之至也詩曰永言孝思孝思維則此之謂也書曰祗載見瞽瞍䕫䕫齊栗瞽瞍亦允若是為父不得而子也萬章上右以其不可變者言之父子又見孝弟類中也養不中才也養不才故人樂有賢父兄也如中也棄不中才也棄不才則賢不肖之相去其間不能以寸離婁下右主乎教育而言之愚謂此是父施化於其子若孟子所論父不得而子者是父見化於其子此為衆人之事彼為聖人之事其父攘羊而子證之孔子曰吾黨之直者異於是父為子隠子為父隠直在其中矣子路君子之不教子何也孟子曰勢不行也教者必以正以正不行繼之以怒繼之以怒則反夷矣夫子教我以正夫子未出於正也則是父子相夷也父子相夷則惡矣古者易子而教之父子之間不責善責善則離離則不祥莫大焉離婁上舜為天子臯陶為士瞽瞍殺人則如之何孟子曰執之而已矣然則舜不禁與曰夫舜惡得而禁之夫有所受之也然則舜如之何曰舜視棄天下猶棄敝蹝也竊負而逃遵海濵而處終身訢然樂而忘天下盡心上右主乎恩愛而言之愚謂父子相隠即孟子論大舜之心為可見君子不親教子即孔子之於伯魚為可見伯魚未學詩禮孔子必問之而後知則其受教於他人也審矣君臣定公問君使臣臣事君如之何孔子對曰君使臣以禮臣事君以忠八佾規矩方圓之至也聖人人倫之至也欲為君盡君道欲為臣盡臣道二者皆法堯舜而已矣不以舜之所以事堯事君不敬其君者也不以堯之所以治民治民賊其民者也孔子曰道二仁與不仁而已矣暴其民甚則身弑國亡不甚則身危國削名之曰幽厲雖孝子慈孫百世不能改也詩云殷鑒不逺在夏后之世此之謂也離婁上右各以當然之理言之愚案孟子汎言君臣之道故以治民事君對言之孔子答定公之問而論君臣之交故以使臣之禮事君之忠對言之君之視臣如手足則臣視君如腹心君之視臣如犬馬則臣視君如國人君之視臣如土芥則臣視君如宼讎王曰禮為舊君有服何如斯可為服矣曰諫行言聽膏澤下於民有故而去則君使人導之出疆又先於其所徃去三年不反然後收其田里此之謂三有禮焉如此則為之服矣今也為臣諫則不行言則不聽膏澤不下於民有故而去則君搏執之又極之於其所徃去之日遂收其田里此之謂寇讎寇讎何服之有離婁下右専以報施之道言之亦曰有為而言之君位堯以天下與舜有諸孟子曰否天子不能以天下與人然則舜有天下也孰與之曰天與之天與之者諄諄然命之乎曰否天不言以行與事示之而已矣曰以行與事示之者如之何曰天子能薦人於天不能使天與之天下諸侯能薦人於天子不能使天子與之諸侯大夫能薦人於諸侯不能使諸侯與之大夫昔者堯薦舜於天而天受之暴之於民而民受之故曰天不言以行與事示之而已矣曰敢問薦之於天而天受之暴之於民而民受之如何曰使之主祭而百神享之是天受之使之主事而事治百姓安之是民受之也天與之人與之故曰天子不能以天下與人舜相堯二十有八載非人之所能為也天也堯崩三年之喪畢舜避堯之子於南河之南天下諸侯朝覲者不之堯之子而之舜訟獄者不之堯之子而之舜謳歌者不謳歌堯之子而謳歌舜故曰天也夫然後之中國踐天子位焉而居堯之宫逼堯之子是篡也非天與也泰誓曰天視自我民視天聽自我民聽此之謂也萬章上右専明禪受之義人有言至於禹而徳衰不傳於賢而傳於子有諸孟子曰否不然也天與賢則與賢天與子則與子昔者舜薦禹於天十有七年舜崩三年之喪畢禹避舜之子於陽城天下之民從之若堯崩之後不從堯之子而從舜也禹薦益於天七年禹崩三年之喪畢益避禹之子於箕山之隂朝覲訟獄者不之益而之啟曰吾君之子也謳歌者不謳歌益而謳歌啟曰吾君之子也丹朱之不肖舜之子亦不肖舜之相堯禹之相舜也歴年多施澤於民乆啟賢能敬承繼禹之道益之相禹也歴年少施澤於民未乆舜禹益相去乆逺其子之賢不肖皆天也非人之所能為也莫之為而為者天也莫之致而至者命也匹夫而有天下者徳必若舜禹而又有天子薦之者故仲尼不有天下繼世以有天下天之所廢必若桀紂者也故益伊尹周公不有天下伊尹相湯以王於天下湯崩太丁未立外丙二年仲壬四年大甲顛覆湯之典刑伊尹放之於桐三年大甲悔過自怨自艾於桐處仁遷義三年以聽伊尹之訓已也復歸于亳周公之不有天下猶益之於夏伊尹之於殷也孔子曰唐虞禪夏后殷周繼其義一也萬章上右兼明繼禪之義君道又見治道王道人有恒言皆曰天下國家天下之本在國國之本在家家之本在身愛人不親反其仁治人不治反其智禮人不答反其敬行有不得者皆反求諸已其身正而天下歸之詩云永言配命自求多福並離婁上其身正不令而行其身不正雖令不從子路右専以出治之本言之愚案孟子兩章之㫖不同一自天下國家推至於身是反推其本一言反求諸已而天下歸之是極言其效論語之言則勸戒之意具焉不信仁賢則國空虚無禮義則上下亂無政事則財用不足盡心下右通以致治之要言之無或乎王之不智也雖有天下易生之物也一日暴之十日寒之未有能生者也吾見亦罕矣吾退而寒之者至矣吾如有萌焉何哉今夫弈之為數小數也不専心致志則不得也弈秋通國之善弈者也使弈秋誨二人弈其一人専心致志惟弈秋之為聽一人雖聽之一心以為有鴻鵠將至思援弓繳而射之雖與之俱學弗若之矣為是其智弗若與曰非然也告子上右論養心之道専以用人言之定宇陳氏曰此章兩段前謂交修者不得常用其力後謂自修者不肯専用其力陳氏名櫟寡人願安承教孟子對曰殺人以梃與刃有以異乎曰無以異也以刃與政有以異乎曰無以異也曰庖有肥肉廐有肥馬民有饑色野有餓莩此率獸而食人也獸相食且人惡之為民父母行政不免於率獸而食人惡在其為民父母也仲尼曰始作俑者其無後乎為其象人而用之也如之何其使斯民飢而死也望之不似人君就之而不見所畏焉卒然問曰天下惡乎定吾對曰定於一孰能一之對曰不嗜殺人者能一之孰能與之對曰天下莫不與也王知夫苖乎七八月之閒旱則苖槁矣天油然作雲沛然下雨則苖浡然興之矣其如是孰能禦之今夫天下之人牧未有不嗜殺人者也如有不嗜殺人者則天下之民皆引領而望之矣誠如是也民歸之由水之就下沛然誰能禦之並梁恵王上鄒與魯閧穆公問曰吾有司死者三十三人而民莫之死也誅之則不可勝誅不誅則疾視其長上之死而不救如之何則可也孟子對曰凶年饑嵗君之民老弱轉乎溝壑壯者散而之四方者㡬千人矣而君之倉廩實府庫充有司莫以告是上慢而殘下也曽子曰戒之戒之出乎爾者反乎爾者也夫民今而後得反之也君無尤焉君行仁政斯民親其上死其長矣梁恵王下桀紂之失天下也失其民也失其民者失其心也得天下有道得其民斯得天下矣得其民有道得其心斯得民矣得其心有道所欲與之聚之所惡勿施爾也民之歸仁也猶水之就下獸之走壙也故為淵敺魚者獺也為叢敺爵者鸇也為湯武敺民者桀與紂也今天下之君有好仁者則諸侯皆為之敺矣雖欲無王不可得已今之欲王者猶七年之病求三年之艾也茍為不畜終身不得茍不志於仁終身憂辱以陷於死亡詩云其何能淑載胥及溺此之謂也離婁上以佚道使民雖勞不怨以生道殺民雖死不怨殺者盡心上右論得民之道専以愛民言之愚案言率獸食人者欲其持儉徳以足民言不嗜殺人者欲其推仁心以育民言以佚道使民者欲其為所當為以服民言上慢而殘下者欲散其所斂以救民若謂所欲與之聚之者則兼此四章之意也孟子見梁恵王王立于沼上顧鴻鴈麋鹿曰賢者亦樂此乎孟子對曰賢者而後樂此不賢者雖有此不樂也詩云經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來王在靈囿麀鹿攸伏麀鹿濯濯白鳥鶴鶴王在靈沼於牣魚躍文王以民力為臺為沼而民歡樂之謂其臺曰靈臺謂其沼曰靈沼樂其有麋鹿魚鼈古之人與民偕樂故能樂也湯誓曰時日害喪予及女偕亡民欲與之偕亡雖有臺池鳥獸豈能獨樂哉梁恵王上齊宣王見孟子於雪宫王曰賢者亦有此樂乎孟子對曰有人不得則非其上矣不得而非其上者非也為民上而不與民同樂者亦非也樂民之樂者民亦樂其樂憂民之憂者民亦憂其憂樂以天下憂以天下然而不王者未之有也昔者齊景公問於晏子曰吾欲觀於轉附朝儛遵海而南放於琅邪吾何修而可以比於先王觀也晏子對曰善哉問也天子適諸侯曰廵狩廵狩者廵所守也諸侯朝於天子曰述職述職者述所職也無非事者春省耕而補不足秋省斂而助不給夏諺曰吾王不遊吾何以休吾王不豫吾何以助一遊一豫為諸侯度今也不然師行而糧食飢者弗食勞者弗息睊睊胥讒民乃作慝方命虐民飲食若流流連荒亡為諸侯憂從流下而忘反謂之流從流上而忘反謂之連從獸無厭謂之荒樂酒無厭謂之亡先王無流連之樂荒亡之行惟君所行也景公說大戒於國出舍於郊於是始興發補不足召太師曰為我作君臣相說之樂蓋徴招角招是也其詩曰畜君何尤畜君者好君也王語暴以好樂暴未有以對也曰好樂何如孟子曰王之好樂甚則齊國其庶㡬乎他日見於王曰王甞語莊子以好樂有諸王變乎色曰寡人非能好先王之樂也直好世俗之樂耳曰王之好樂甚則齊其庶㡬乎今之樂由古之樂也曰可得聞與曰獨樂樂與人樂樂孰樂曰不若與人曰與少樂樂與衆樂樂孰樂曰不若與衆臣請為王言樂今王鼔樂於此百姓聞王鐘鼔之聲管籥之音舉疾首蹙頞而相告曰吾王之好鼓樂夫何使我至於此極也父子不相見兄弟妻子離散今王田獵於此百姓聞王車馬之音見羽旄之美舉疾首蹙頞而相告曰吾王之好田獵夫何使我至於此極也父子不相見兄弟妻子離散此無他不與民同樂也今王鼔樂於此百姓聞王鐘鼓之聲管籥之音舉欣欣然有喜色而相告曰吾王庶㡬無疾病與何以能鼓樂也今王田獵於此百姓聞王車馬之音見羽旄之美舉欣欣然有喜色而相告曰吾王庶㡬無疾病與何以能田獵也此無他與民同樂也今王與百姓同樂則王矣文王之囿方七十里有諸孟子對曰於傳有之曰若是其大乎曰民猶以為小也曰寡人之囿方四十里民猶以為大何也曰文王之囿方七十里芻蕘者徃焉雉兔者徃焉與民同之民以為小不亦宜乎臣始至於境問國之大禁然後敢入臣聞郊關之内有囿方四十里殺其麋鹿者如殺人之罪則是方四十里為阱於國中民以為大不亦宜乎並梁恵王下右専以與民同樂言之定宇陳氏曰沼上之對就賢者樂此說雪宫之對就有此樂說不答賢者字愚謂沼上之對引詩書語則具有勸戒之意雪宫之對引晏子語所以作其倣古愛民之心好樂之論姑以正夫樂之本四十里之囿所以正其刑之失大哉堯之為君也巍巍乎惟天為大唯堯則之蕩蕩乎民無能名焉巍巍乎其有成功也煥乎其有文章秦伯無為而治者其舜也與夫何為哉恭已正南靣而已矣衛靈公禹吾無閒然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宫室而盡力乎溝洫禹吾無間然矣泰伯右舉其標凖而言之已上皆緫為人君言愚案堯之大哉以徳業言舜之恭己以君人氣象言禹之無閒然兼徳行事實言餘如定公問一言可以興邦章法語之言能無從乎章皆即君道而言之一言人君當存謹畏而逺諂諛恒言之是非不可不察也一言面悅面從非難而真知實行為難為人君者當有誠心以受教也諸侯之寳三土地人民政事寳珠玉者殃必及身盡下心右舉其大務而言之已下皆専為諸侯言愚案此與不信仁賢一章相對彼言治國此言治國有仁賢乃有禮義有土地乃有人民若政事者則又本於禮義而加諸人民者也此二章所言之序也交鄰國有道乎孟子對曰有惟仁者為能以大事小是故湯事葛文王事昆夷惟智者為能以小事大故太王事獯鬻勾踐事呉以大事小者樂天者也以小事大者畏天者也樂天者保天下畏天者保其國詩云畏天之威于時保之王曰大哉言矣寡人有疾寡人好勇對曰王請無好小勇夫撫劍疾視曰彼惡敢當我哉此匹夫之勇敵一人者也王請大之詩云王赫斯怒爰整其旅以遏徂莒以篤周祜以對于天下此文王之勇也文王一怒而安天下之民書曰天降下民作之君作之師惟曰其助上帝寵之四方有罪無罪惟我在天下曷敢有越厥志一人衡行於天下武王恥之此武王之勇也而武王亦一怒而安天下之民今王亦一怒而安天下之民民惟恐王之不好勇也梁恵王下右因其非心而格之饒子曰齊王交鄰國欲以術孟子說出來渾是義理愚謂恤小事大正是交鄰國之道恭者不侮儉者不奪亦是交鄰國之道不侮即能事大不奪即能事小仁智恭儉未甞不相表裏也仁則榮不仁則辱今惡辱而居不仁是猶惡濕而居下也如惡之莫如貴徳而尊士賢者在位能者在職國家閒暇及是時明其政刑雖大國必畏之矣詩云迨天之未隂雨徹彼桑土綢繆牖戸今此下民或敢侮予孔子曰為此詩者其知道乎能治其國家誰敢侮之今國家閒暇及是時般樂怠敖是自求禍也禍福無不自已求之者詩云永言配命自求多福太甲曰天作孽猶可違自作孽不可活此之謂也矢人豈不仁於函人哉矢人惟恐不傷人函人惟恐傷人巫匠亦然故術不可不慎也孔子曰里仁為美擇不處仁焉得智夫仁天之尊爵也人之安宅也莫之禦而不仁是不智也不仁不智無禮無義人役也人役而恥為役由弓人而恥為弓矢人而恥為矢也如恥之莫如為仁仁者如射射者正己而後發發而不中不怨勝己者反求諸己而已矣並公孫丑上天下有道小徳役大徳小賢役大賢天下無道小役大弱役强斯二者天也順天者存逆天者亡齊景公曰既不能令又不受命是絶物也涕出而女於呉今也小國師大國而恥受命焉是猶弟子而恥受命於先師也如恥之莫若師文王師文王大國五年小國七年必為政於天下矣詩云商之孫子其麗不億上帝既命侯于周服侯服于周天命靡常殷士膚敏裸將于京孔子曰仁不可為衆也夫國君好仁天下無敵今也欲無敵於天下而不以仁是猶執熱而不以濯也詩云誰能執熱逝不以濯離婁上右因其愧怍之心而勉之愚謂此皆勉諸侯為仁之辭為仁則不受辱受役矣然其㫖意亦有不同仁則榮章言榮辱在所自取而禍福當知嚮背矢人豈不仁章言擇術不可不慎而仁道所當自勉天下有道一章言事理不可不明而當求聖人以為師滕小國也閒於齊楚事齊乎事楚乎孟子對曰是謀非吾所能及也無己則有一焉鑿斯池也築斯城也與民守之效死而民弗去則是可為也齊人將築薛吾甚恐如之何則可孟子對曰昔者大王居邠狄人侵之去之岐山之下居焉非擇而取之不得已也茍為善後世子孫必有王者矣君子創業垂統為可繼也若夫成功則天也君如彼何哉彊為善而已矣滕小國也竭力以事大國則不得免焉如之何則可孟子對曰昔者大王居邠狄人侵之事之以皮幣不得免焉事之以犬馬不得免焉事之以珠玉不得免焉乃屬其耆老而告之曰狄人之所欲者吾土地也吾聞之也君子不以其所以養人者害人二三子何患乎無君我將去之去邠踰梁山邑于岐山之下居焉邠人曰仁人也不可失也從之者如歸市或曰世守也非身之所能為也效死勿去君請擇於斯二者並梁恵王下右因其疑懼之心而解之愚謂此皆國君處憂患之道然必民不忍叛而後可與效死而弗去民不忍離而後可與遷國而圖存事雖不同而皆以得民心為本也臣道附賔師有事君人者事是君則為容悅者也有安社稷臣者以安社稷為悅者也有天民者達可行於天下而後行之者也有大人者正己而物正者也盡心上右以人品言孟子之平陸謂其大夫曰子之持㦸之士一日而三失伍則去之否乎曰不待三然則子之失伍也亦多矣凶年饑嵗子之民老羸轉於溝壑壯者散而之四方者㡬千人矣曰此非距心之所得為也曰今有受人之牛羊而為之牧之者則必為之求牧與芻矣求牧與芻而不得則反諸其人乎抑亦立而視其死與曰此則距心之罪也他日見於王曰王之為都者臣知五人焉知其罪者惟孔距心為王誦之王曰此則寡人之罪也公孫丑下右以職任言愚謂居其位則當保其民不能保民則當去其位孟子與距心言而又為王誦之亦有儆戒人君之意焉王何卿之問也王曰卿不同乎曰不同有貴戚之卿有異姓之卿王曰請問貴戚之卿曰君有大過則諫反覆之而不聽則易位王勃然變乎色曰王勿異也王問臣臣不敢不以正對王色定然後請問異姓之卿曰君有過則諫反覆之而不聽則去萬章下右以親踈勢分言可以托六尺之孤可以寄百里之命臨大節而不可奪也君子人與君子人也泰伯右以才能節操言事君盡禮人以為諂也八佾事君敬其事而後其食衛靈公子路問事君子曰勿欺也而犯之憲問陳力就列不能者止危而不持顛而不扶則將焉用彼相矣季氏人不足與適也政不足閒也惟大人為能格君心之非君仁莫不仁君義莫不義君正莫不正一正君而國定矣離婁上責難於君謂之恭陳善閉邪謂之敬吾君不能謂之賊離婁上君子之事君也務引其君以當道志於仁而已矣告子下子欲子之王之善與我明告子有楚大夫於此欲其子之齊語也則使齊人傅諸使楚人傅諸曰使齊人傅之曰一齊人傅之衆楚人咻之雖日撻而求其齊也不可得矣引而置之莊嶽之閒數年雖日撻而求其楚亦不可得矣子謂薛居州善士也使之居於王所在於王所者長幼卑尊皆薛居州也王誰與為不善在王所者長幼卑尊皆非薛居州也王誰與為善一薛居州獨如宋王何滕文公下右以事君之道言愚案聖賢之言有以謙卑順承為主者有以維持調䕶為主者蓋事君之禮匡君之義莫非臣道之當然也微子去之箕子為之奴比干諫而死孔子曰殷有三仁焉微子伊尹相湯以王於天下湯崩太丁未立外丙二年仲壬四年大甲顛覆湯之典刑伊尹放之於桐三年大甲悔過自怨自艾於桐處仁遷義三年以聽伊尹之訓己也復歸于亳萬章上伊尹曰子不狎于不順放大甲於桐民大悅大甲賢又反之民大悅賢者之為人臣也其君不賢則固可放與孟子曰有伊尹之志則可無伊尹之志則篡也盡心上右以處變之道言鄙夫可與事君也與哉其未得之也患得之既得之患失之苟患失之無所不至矣陽貨長君之惡其罪小逢君之惡其罪大今之大夫皆逢君之惡故曰今之大夫今之諸侯之罪人也告子下右以小人心術言餘如孟子論今之事君者及善戰者連諸侯者辟草萊任土地者皆謂當時人臣各以異端小道事其君亦鄙夫罪人之徒也故特深闢之見異端類又有陳賈為齊王文過一章亦責賈以小人之道事其君也賈之為人也内而有患得患失之心外而有長惡逢惡之術故順之而又為之辭如此三章之㫖自可互相發也孟子將朝王王使人來曰寡人如就見者也有寒疾不可以風朝將視朝不識可使寡人得見乎對曰不幸而有疾不能造朝明日出弔於東郭氏公孫丑曰昔者辭以病今日弔或者不可乎曰昔者疾今日愈如之何不弔王使人問疾醫來孟仲子對曰昔者有王命有采薪之憂不能造朝今病小愈趨造於朝我不識能至否乎使數人要於路曰請必無歸而造於朝不得已而之景丑氏宿焉景子曰内則父子外則君臣人之大倫也父子主恩君臣主敬丑見王之敬子也未見所以敬王也曰惡是何言也齊人無以仁義與王言者豈以仁義為不美也其心曰是何足與言仁義也云爾則不敬莫大乎是我非堯舜之道不敢以陳於王前故齊人莫如我敬王也景子曰否非此之謂也禮曰父召無諾君命召不俟駕固將朝也聞王命而遂不果宜與夫禮若不相似然曰豈謂是與曽子曰晉楚之富不可及也彼以其富我以吾仁彼以其爵我以吾義吾何慊乎哉夫豈不義而曽子言之是或一道也天下有達尊三爵一齒一徳一朝廷莫如爵鄉黨莫如齒輔世長民莫如徳惡得有其一以慢其二哉故將大有為之君必有所不召之臣欲有謀焉則就之其尊徳樂道不如是不足與有為也故湯之於伊尹學焉而後臣之故不勞而王桓公之於管仲學焉而後臣之故不勞而覇今天下地醜徳齊莫能相尚無他好臣其所教而不好臣其所受教湯之於伊尹桓公之於管仲則不敢召管仲且猶不可召而況不為管仲者乎公孫丑右言賔師自處之道曽子居武城有越寇或曰寇至盍去諸曰無寓人於我室毁傷其薪木寇退則曰修我牆屋我將反寇退曽子反左右曰待先生如此其忠且敬也寇至則先去以為民望寇退則反殆於不可沈猶行曰是非汝所知也昔沈猶有負芻之禍從先生者七十人未有與焉子思居於衛有齊寇或曰寇至盍去諸子思曰如伋去君誰與守孟子曰曽子子思同道曽子師也父兄也子思臣也微也曽子子思易地則皆然離婁下子之辭靈丘而請士師似也為其可以言也今既數月矣未可以言與蚳鼃諫於王而不用致為臣而去齊人曰所以為蚳鼃則善矣所以自為則吾不知也公都子以告曰吾聞之也有官守者不得其職則去有言責者不得其言則去我無官守我無言責也則吾進退豈不綽綽然有餘裕哉公孫丑下右言賔師臣道之不同朋友益者三友損者三友友直友諒友多聞益矣友便辟友善柔友便倿損矣季氏工欲善其事必先利其器居是邦也事其大夫之賢者友其士之仁者衛靈公君子以文會友以友輔仁顔淵三人行必有我師焉擇其善者而從之其不善者而改之述而無友不如己者學而一鄉之善士斯友一鄉之善士一國之善士斯友一國之善士天下之善士斯友天下之善士以友天下之善士為未足又尚論古之人頌其詩讀其書不知其人可乎是以論其世也是尚友也萬章下子夏之門人問交於子張子張曰子夏云何對曰子夏曰可者與之其不可者拒之子張曰異乎吾所聞君子尊賢而容衆嘉善而矜不能我之大賢與於人何所不容我之不賢與人將拒我如之何其拒人也子張右自取友而言之愚謂孔曽之言以知人為本而取友不可以不慎孟子之言以進善為本而取友不可以自足凡此皆主乎修己而言進徳之事也若朋來逺方則主乎及人而言成徳之事也餘有逢蒙學射一章亦自取友而言但其人其事無足論者今不具與國人交止於信大學傳三章晏平仲善與人交久而敬之公冶忠告而善道之不可則止無自辱焉顔淵朋友死無所歸曰於我殯朋友之饋雖車馬非祭肉不拜鄉黨敢問友孟子曰不挾長不挾貴不挾兄弟而友友也者友其徳也不可以有挾也孟獻子百乗之家也有友五人焉樂正裘牧仲其三人則予忘之矣獻子之與此五人者友也無獻子之家者也此五人者亦有獻子之家則不與之友矣非惟百乗之家為然也雖小國之君亦有之費恵公曰吾於子思則師之矣吾於顔般則友之矣王順長息則事我者也非惟小國之君為然也雖大國之君亦有之晉平公之於亥唐也入云則入坐云則坐食云則食雖䟽食菜羹未甞不飽蓋不敢不飽也然終於此而已矣弗與共天位也弗與治天職也弗與食天禄也士之尊賢者也非王公之尊賢也舜尚見帝帝館甥於貳室亦饗舜迭為賔主是天子而友匹夫也用下敬上謂之貴貴用上敬下謂之尊賢貴貴尊賢其義一也萬章下右自交友而言之愚謂不可有挾者交友之誠主乎敬信者交友之本車馬不拜者交友之義不可則止所以全其友也死於我殯所以盡其交也此則友道之變也餘如切切偲偲責善朋友之道朋友數斯䟽矣皆是此類名分八佾舞於庭是可忍也孰不可忍也三家者以雍徹子曰相維辟公天子穆穆奚取於三家之堂季氏旅於泰山子謂冉有曰女弗能救與對曰不能子曰嗚呼曽謂泰山不如林放乎禘自既灌而徃者吾不欲觀之矣夷狄之有君不如諸夏之亡也並八佾天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出自諸侯出蓋十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣天下有道則政不在大夫天下有道則庶人不議祿之去公室五世矣政逮於大夫四世矣故夫三桓之子孫微矣並季氏右聖人憫亂之心愚案此皆為諸侯大夫强僣而發而其辭則有輕重不同孰不可忍責之也奚取於三家之堂譏之也夷狄之有君傷之也嗚呼於泰山之旅不觀於既灌之後歎之也五世三世希不失以至三桓子孫之微則皆儆戒之微意也季子然問仲由冉求可謂大臣與子曰吾以子為異之問曽由與求之問所謂大臣者以道事君不可則止今由與求也可謂具臣矣曰然則從之者與子曰弑父與君亦不從也先進冉子退朝子曰何晏也對曰有政子曰其事也如有政雖不吾以吾其與聞之子路右聖人防亂之意陳成子弑簡公孔子沐浴而朝告於哀公曰陳恒弑其君請討之公曰告夫三子孔子曰以吾從大夫之後不敢不告也君曰告夫三子者之三子告不可孔子曰以吾從大夫之後不敢不告也憲問右聖人撥亂之志衛君待子而為政子將奚先子曰必也正名乎子路曰有是哉子之迂也奚其正子曰野哉由也君子於其所不知蓋闕如也名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足故君子名之必可言也言之必可行也君子於其言無所茍而已矣子路右聖人救亂之本愚案衛輙之事兩見於論語必也正名是夫子正言其義不為衛君是因論夷齊而知夫子不與之心大抵衛輙之事非夫子不能正夫子之心非子貢不能知世俗夷狄之有君不如諸夏之亡也射不主皮為力不同科古之道也並八佾不有祝鮀之佞而有宋朝之美難乎免於今之世矣中庸之為徳也其至矣乎民鮮久矣並雍也中庸其至矣乎民鮮能久矣中庸三章魯衛之政兄弟也子路吾猶及史之闕文也有馬者借人乗之今亡已夫衛靈公古者民有三疾今也或是之亡也古之狂也肆今之狂也蕩古之矜也廉今之矜也忿戾古之愚也直今之愚也詐而已矣陽貨古之為關也將以禦暴今之為關也將以為暴賢者以其昭昭使人昭昭今以其昬昬使人昭昭並盡心下右歎時之衰林放問禮之本子曰大哉問禮與其奢也寧儉喪與其易也寧戚八佾先進於禮樂野人也後進於禮樂君子也如用之則吾從先進先進以約失之者鮮矣里仁奢則不孫儉則固與其不孫也寧固述而右救時之弊麻冕禮也今也純儉吾從衆拜下禮也今拜乎上泰也雖違衆吾從下子罕右明處世之道齊一變至於魯魯一變至於道雍也右明政俗美惡之不同知人不知言無以知人也堯曰右明知人之本視其所以觀其所由察其所安人焉廋哉人焉廋哉為政存乎人者莫良於眸子眸子不能掩其惡胷中正則眸子瞭焉胷中不正則眸子眊焉聽其言也觀其眸子人焉廋哉離婁上父在觀其志父没觀其行三年無改於父之道可謂孝矣學而觀過斯知仁矣里仁始吾於人也聽其言而信其行今吾於人也聽其言而觀其行於予與改是公冶長論篤是與君子者乎色莊者乎先進君子不可小知而可大受也小人不可大受而可小知也衆惡之必察焉衆好之必察焉並衛靈公鄉人皆好之何如子曰未可也鄉人皆惡之何如子曰未可也不如鄉人之善者好之其不善者惡之子路好名之人能讓千乗之國茍非其人簞食豆羹見於色盡心下右明觀人之道愚謂自知言而言之則知言可以知人自觀人而言之則容貌辭氣乃觀人之一節故孔子於論篤猶有疑孟子謂聽其言而又必觀其眸子也又知言知人是汎言其理聽言觀行是因宰我而言之用人君子不施其親不使大臣怨乎不以故舊無大故則不棄也無求備於一人微子國君進賢如不得已將使卑踰尊䟽踰戚可不慎與左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之左右皆曰不可勿聽諸大夫皆曰不可勿聽國人皆曰不可然後察之見不可焉然後去之為巨室則必使工師求大木工師得大木則王喜以為能勝其任也匠人斵而小之則王怒以為不勝其任矣夫人幼而學之壯而欲行之王曰姑舍女所學而從我則何如今有璞玉於此雖萬鎰必使玉人彫琢之至於治國家則曰姑舍女所學而從我則何以異於教玉人彫琢玉哉梁恵王下右明用人之道何為則民服孔子對曰舉直錯諸枉則民服舉枉錯諸直則民不服為政舜有臣五人而天下治武王曰予有亂臣十人孔子曰才難不其然乎唐虞之際於斯為盛有婦人焉九人而已三分天下有其二以服事殷周之徳其可謂至徳也已矣泰伯舜有天下選於衆舉臯陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣顔淵子言衛靈公之無道也康子曰夫如是奚而不喪孔子曰仲叔圉治賔客祝鮀治宗廟王孫賈治軍旅夫如是奚其喪為命裨諶草創之世叔討論之行人子羽修飾之東里子産潤色之並憲問右明用人之效交際信近於義言可復也恭近於禮逺恥辱也因不失其親亦可宗也學而右明持身取友之道愛之能勿勞乎忠焉能勿誨乎憲問右明上下相與之道不逆詐不億不信抑亦先覺者是賢乎憲問可與言而不與之言失人不可與言而與之言失言知者不失人亦不失言衛靈公事君數斯辱矣朋友數斯䟽矣里仁右明見㡬之智侍於君子有三愆言未及之而言謂之躁言及之而不言謂之隠未見顔色而言謂之瞽季氏右明事上之禮惟女子與小人為難養也近之則不孫逺之則怨陽貨右明御下之道食而弗愛豕交之也愛而不敬獸畜之也盡心上右明待賢之禮愚案此章是君交乎臣所主者在愛敬之實萬章問交際一章是臣交乎君所主者在禮義之正若繆公之於子思亟問亟餽鼎肉是知愛敬而不知所以愛敬之道子思以為君之犬馬畜伋也此謂君之於臣不以私恵而為禮臣之於君不以小恩而為徳此與豕交獸畜之㫖相發云問人於他邦再拜而送之康子饋藥拜而受之曰丘未達不敢甞鄉黨右聖人待物之誠子見南子子路不說夫子矢之曰予所否者天厭之天厭之雍也右聖人事上之禮陽貨欲見孔子孔子不見歸孔子豚孔子時其亡也而徃拜之遇諸塗謂孔子曰來予與爾言曰懐其寳而迷其邦可謂仁乎曰不可好從事而亟失時可謂知乎曰不可日月逝矣嵗不我與孔子曰諾吾將仕矣陽貨陽貨欲見孔子而惡無禮大夫有賜於士不得受於其家則徃拜其門陽貨矙孔子之亡也而饋孔子蒸豚孔子亦矙其亡也而徃拜之當是時陽貨先豈得不見滕文公下孟子居鄒季任為任處守以幣交受之而不報處於平陸儲子為相以幣交受之而不報他日由鄒之任見季子由平陸之齊不見儲子屋廬子喜曰連得間矣問曰夫子之任見季子之齊不見儲子為其為相與曰非也書曰享多儀儀不及物曰不享惟不役志于享為其不成享也屋廬子悅或問之屋廬子曰季子不得之鄒儲子得之平陸告子下右聖賢處物之義愚謂子見南子是委曲以盡當時之禮徃拜陽貨而時其亡是於禮之中而裁之以義也孺悲欲見孔子孔子辭以疾將命者出戸取瑟而歌使之聞之陽貨右聖人教人之道餘如孟子隠几以絶留行者亦是此類或謂孔子於衛主癰疽於齊主侍人瘠環有諸乎孟子曰否不然也好事者為之也於衛主顔讎由彌子之妻與子路之妻兄弟也彌子謂子路曰孔子主我衛卿可得也子路以告孔子曰有命孔子進以禮退以義得之不得曰有命而主癰疽與侍人瘠環是無義無命也孔子不悅於魯衛遭宋桓司馬將要而殺之微服而過宋是時孔子當阨主司城貞子為陳侯周臣吾聞觀近臣以其所為主觀逺臣以其所主若孔子主癰疽與侍人瘠環何以為孔子萬章上右聖人親賢之實互鄉難與言童子見門人惑子曰與其進也不與其退也惟何甚人潔已以進與其潔也不保其徃也述而右聖人容物之仁餘如孟子與匡章遊亦是此類孟子為卿於齊出弔於滕王使蓋大夫王驩為輔行王驩朝暮見反齊滕之路未甞與之言行事也公孫丑曰齊卿之位不為小矣齊滕之路不為近矣反之而未甞與言行事何也曰夫既或治之予何言哉公孫丑下公行子有子之喪右師徃弔入門有進而與右師言者有就右師之位而與右師言者孟子不與右師言右師不悅曰諸君子皆與驩言孟子獨不與驩言是簡驩也孟子聞之曰禮朝廷不歴位而相與言不踰階而相揖也我欲行禮子敖以我為簡不亦異乎離婁下右聖賢惡惡之義原壤夷俟子曰幼而不孫弟長而無述焉老而不死是為賊以杖叩其脛憲問樂正子從於子敖之齊樂正子見孟子孟子曰子亦來見我乎曰先生何為出此言也曰子來㡬日矣曰昔者曰昔者則我出此言也不亦宜乎曰舍館未定曰子聞之也舍館定然後求見長者乎曰克有罪子之從於子敖來徒餔啜也我不意子學古之道而以餔啜也並離婁上右聖賢責善之道愚謂孔子之於原壤是待故人之意故猶忠誠愷切以責之也孟子之於右師是待小人之道則嚴以自持絶之而已矣餘見孔子氣象類義命君子素其位而行不願乎其外素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難君子無入而不自得焉在上位不陵下在下位不援上正己而不求於人則無怨上不怨天下不尤人故君子居易以俟命小人行險以徼幸子曰射有似乎君子失諸正鵠反求諸其身中庸十四章右兼義命言不在其位不謀其政泰伯君子思不出其位憲問右専以分義言愚謂思不出位汎以地位言不在其位専以職位言富貴貧賤欲貴者人之同心也人人有貴於己者弗思耳人之所貴者非良貴也趙孟之所貴趙孟能賤之詩云既醉以酒既飽以徳言飽乎仁義也所以不願人之膏粱之味也令聞廣譽施於身所以不願人之文繡也有天爵者有人爵者仁義忠信樂善不倦此天爵也公卿大夫此人爵也古之人修其天爵而人爵從之今之人修其天爵以要人爵既得人爵而棄其天爵則惑之甚者也終亦必亡而已矣並告子上廣土衆民君子欲之所樂不存焉中天下而立定四海之民君子樂之所性不存焉君子所性雖大行不加焉雖窮居不損焉分定故也君子所性仁義禮智根於心其生色也睟然見於面盎於背施於四體四體不言而喻盡心上君子謀道不謀食耕也餒在其中矣學也禄在其中矣君子憂道不憂貧衛靈公不仁者不可以久處約不可以長處樂仁者安仁知者利仁富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也君子去仁惡乎成名君子無終食之閒違仁造次必於是顛沛必於是士志於道而恥惡衣惡食者未足與議也並里仁附之以韓魏之家如其自視欿然則過人逺矣飢者甘食渴者甘飲是未得飲食之正也飢渴害之也豈惟口腹有飢渴之害人心亦皆有害人能無以飢渴之害為心害則不及人不為憂矣並盡心上右以内外輕重而言之富貴在天顔淵富而可求也雖執鞭之士吾亦為之如不可求從吾所好述而賜不受命而貨殖焉先進右以命分而言之餘如孔子得之不得曰有命亦是此意但聖人於此初不以命決之顧義理何如耳其以命言者皆儆人之辭也求則得之舍則失之是求有益於得也求在我者也求之有道得之有命是求無益於得也求在外者也盡心上右兼義命而言之餘如君子素位而行一章亦是此類若孟子乞墦之喻則為不知義命者言之使知所戒焉又此類之反對也貧而無怨難富而無驕易憲問右自常情而言之說大人則藐之勿視其巍巍然堂高數仞榱題數尺我得志弗為也食前方丈侍妾數百人我得志弗為也般樂飲酒驅騁田獵後車千乗我得志弗為也在彼者皆我所不為也在我者皆古之制也吾何畏彼哉盡心下右即其所守而言之貧而無諂富而無驕何如子曰可也未若貧而樂富而好禮者也子貢曰詩云如切如磋如琢如磨其斯之謂與子曰賜也始可與言詩已矣告諸徃而知來者學而衣敝緼袍與衣狐貉者立而不恥者其由也與不忮不求何用不臧子路終身誦之子曰是道也何足以臧子罕右即其所能而勉之愚謂無諂無驕是子貢之所能不受命而貨殖者是子貢之所失夫子以不受命之語儆之無諂無驕必因是而後有得也賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也雍也回也其庶乎屢空先進右即其所能而稱之愚謂顔淵子路子貢孟子皆為以理自守者然守之近於自然者顔子也守之篤而其進未己者子貢也守之固而自許其能者子路也守之嚴而不免以已方人者孟子也是其所守者雖同而其氣象不同則如此巍巍乎舜禹之有天下也而不與焉泰伯舜之飯糗茹草也若將終身焉及其為天子也被袗衣鼔琴二女果若固有之盡心下飯䟽食飲水曲肱而枕之樂亦在其中矣不義而富且貴於我如浮雲述而右即其心之所安而言之愚謂有天下不與者是不為外物所役若將終身若固有之者是不為外物所遷飯䟽食飲水樂在其中者是不為外物所累安土敦仁聖之至也又案孔子渾然天理故貧富不能動其心顔子能克己復禮故不以貧富動其心此孔顔之所以分也困窮患難天生徳於予桓魋其如予何述而文不在兹乎天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如予何子罕右聖人知天之智愚謂二章之㫖一以道自任一以徳自任聖人於此不待決之於天而後泰然特以曉當時從行者而安其心耳在陳絶糧從者病莫能興子路愠見曰君子亦有窮乎子曰君子固窮小人窮斯濫矣衛靈公右聖人安土之仁已上三章見孔子處困戹之道若孟子言無上下之交則明孔子離困戹之由其如予何是知天之智微服過宋是處物之義思患豫防正以順乎天也此所謂並行而不相悖也又孔子兩言其如予何一言其如命何饒子曰如命何是我之命在天如予何是天之命在我在天者不可必在我者可必子畏於匡顔淵後子曰吾以女為死矣曰子在回何敢死先進右聖賢處物之義餘如孔子言殺身成仁孟子言舍生取義皆明處憂患之道也朱子曰孔子之言是以仁決之孟子之言是以義決之蓋仁人不以所惡傷所好之體義士不以所賤易所貴之宜舜發於畎畆之中傅說舉於版築之間膠鬲舉於魚鹽之中管夷吾舉於士孫叔敖舉於海百里奚舉於市故天將降大任於是人也必先苦其心志勞其筋骨餓其體膚空乏其身行拂亂其所為所以動心忍性曽益其所不能人恒過然後能改困於心衡於慮而後作徴於色發於聲而後喻入則無法家拂士出則無敵國外患者國恒亡然後知生於憂患而死於安樂也告子下人之有徳慧術知者恒存乎疢疾獨孤臣孽子其操心也危其慮患也深故達盡心上右以困窮患難為修省之㡬辭受取予可以取可以無取取傷廉可以與可以無與與傷恵離婁下右正言取與之義愚案舍生取義一章自一簞食以下可與此章互相發明此欲人於取與之際審夫義理之中彼欲人於辭受之際存其本心之正好名之人能讓千乗之國苟非其人簞食豆羹見於色盡心下右専論觀人之法子華使於齊冉子為其母請粟子曰與之釜請益曰與之庾冉子與之粟五秉子曰赤之適齊也乗肥馬衣輕裘吾聞之也君子周急不繼富原思為之宰與之粟九百辭子曰毋以與爾鄰里鄉黨乎雍也顔淵死顔路請子之車以為之椁子曰才不才亦各言其子也鯉也死有棺而無椁吾不徒行以為之椁以吾從大夫之後不可徒行也先進右因用財而見處物之義前日於齊王餽兼金一百而不受於宋餽七十鎰而受於薛餽五十鎰而受前日之不受是則今日之受非也今日之受是則前日之不受非也夫子必居一於此矣孟子曰皆是也當在宋也予將有逺行行者必以贐辭曰餽贐予何為不受當在薛也予有戒心辭曰聞戒故為兵餽之予何為不受若於齊則未有處也無處而餽之是貨之也焉有君子而可以貨取乎公孫丑下士之不託諸侯何也孟子曰不敢也諸侯失國而後託於諸侯禮也士之託於諸侯非禮也萬章曰君餽之粟則受之乎曰受之受之何義也曰君之於氓也固周之曰周之則受賜之則不受何也曰不敢也曰敢問其不敢何也曰抱關擊柝者皆有常職以食於上無常職而賜於上者以為不恭也曰君餽之則受之不識可常繼乎曰繆公之於子思也亟問亟餽鼎肉子思不悅於卒也摽使者出諸大門之外北面稽首再拜而不受曰今而後知君之犬馬畜伋蓋自是臺無餽也悅賢不能舉又不能養也可謂悅賢乎曰敢問國君欲養君子如何斯可謂養矣曰以君命將之再拜稽首而受其後廩人繼粟庖人繼肉不以君命將之子思以為鼎肉使已僕僕爾亟拜也非養君子之道也堯之於舜也使其子九男事之二女女焉百官牛羊倉廩備以養舜於畎畆之中後舉而加諸上位故曰王公之尊賢者也萬章下孟子去齊居休公孫丑問曰仕而不受禄古之道乎曰非也於崇吾得見王退而有去志不欲變故不受也繼而有師命不可以請久於齊非我志也孟子致為臣而歸王就見孟子曰前日願見而不可得得侍同朝甚喜今又棄寡人而歸不識可以繼此而得見乎對曰不敢請耳固所願也他日王謂時子曰我欲中國而授孟子室養弟子以萬鍾使諸大夫國人皆有所矜式子盍為我言之時子因陳子而以告孟子陳子以時子之言告孟子孟子曰然夫時子惡知其不可也如使予欲富辭十萬而受萬是為欲富乎季孫曰異哉子叔疑使己為政不用則亦已矣又使其子弟為卿人亦孰不欲富貴而獨於富貴之中有私龍斷焉古之為市者以其所有易其所無者有司者治之耳有賤丈夫焉必求龍斷而登之以左右望而罔市利人皆以為賤故從而征之征商自此賤丈夫始矣並公孫丑下彭更問曰後車數十乗從者數百人以傳食於諸侯不以泰乎孟子曰非其道則一簞食不可受於人如其道則舜受堯之天下不以為泰子以為泰乎曰否士無事而食不可也曰子不通功易事以羡補不足則農有餘粟女有餘布子如通之則梓匠輪輿皆得食於子於此有人焉入則孝出則弟守先王之道以待後之學者而不得食於子子何尊梓匠輪輿而輕為仁義者哉曰梓匠輪輿其志將以求食也君子之為道也其志亦將以求食與曰子何以其志為哉其有功於子可食而食之矣且子食志乎食功乎曰食志曰有人於此毁瓦畫墁其志將以求食也則子食之乎曰否曰然則子非食志也食功也滕文公下詩曰不素餐兮君子之不耕而食何也孟子曰君子居是國也其君用之則安富尊榮其子弟從之則孝弟忠信不素餐兮孰大於是盡心上右因論辭受而見處物之義愚謂仕不受禄與不受萬鍾則義之中有見㡬之智孟子之於齊宋薛子思之於魯繆公則義之中見交際之禮傳食諸侯一章則言人之有功者我當食其人主於食人者而言也不素餐兮一章則言見食於人者必有功於人主於食人之食者而言也是皆孟子自道之辭所以解門人之惑者如此萬章問交際一章亦兼辭受之義與交際之禮而言之而闕文疑義居多故不具伊尹耕於有莘之野而樂堯舜之道焉非其義也非其道也禄之以天下弗顧也繫馬千駟弗視也非其義也非其道也一介不以與人一介不以取諸人萬章上孰謂微生高直或乞醯焉乞諸其隣而與之公冶長陳仲子豈不誠廉士哉居於陵三日不食耳無聞目無見也井上有李螬食實者過半矣匍匐徃將食之三咽然後耳有聞目有見孟子曰於齊國之士吾必以仲子為巨擘焉雖然仲子惡能廉充仲子之操則蚓而後可者也夫蚓上食槁壤下飲黄泉仲子所居之室伯夷之所築與抑亦盜跖之所築與所食之粟伯夷之所樹與抑亦盜跖之所樹與是未可知也曰是何傷哉彼身織屨妻辟纑以易之也曰仲子齊之世家也兄戴蓋禄萬鍾以兄之禄為不義之禄而不食也以兄之室為不義之室而不居也辟兄離母處於於陵他日歸則有饋其兄生䳘者已頻顣曰惡用是鶃鶃者為哉他日其母殺是䳘也與之食之其兄自外至曰是鶃鶃之肉也出而哇之以母則不食以妻則食之以兄之室則弗居以於陵則居之是尚為能充其類也乎若仲子者蚓而後充其操者也滕文公下仲子不義與之齊國而弗受人皆信之是舍簞食豆羹之義也人莫大焉亡親戚君臣上下以其小者信其大者奚可哉盡心上右因論人而見處物之義愚謂伊尹之一介不取與亦其義之合於聖人者故孟子稱之如此若微生之與害於直仲子之操害於廉則皆不合於義者也是故夫子以微事斷之孟子以大節斷之欲人以之為戒耳四書通㫖卷五
